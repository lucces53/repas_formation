<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Dashboard restaurateur</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2563eb">

<style>

body{
font-family:Arial;
margin:20px;
background:#f4f6f8;
}

h1{
margin-bottom:10px;
}

button{
padding:10px 15px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
margin-bottom:20px;
}

.jour{
background:white;
padding:15px;
border-radius:8px;
margin-bottom:10px;
}

.commande{
display:flex;
justify-content:space-between;
padding:6px 0;
border-bottom:1px solid #eee;
}

.total{
font-weight:bold;
margin-top:10px;
}

/* MODE CUISINE */

#cuisine{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:white;
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:9999;
}

#cuisine h2{
font-size:60px;
margin-bottom:40px;
}

.ligne-cuisine{
font-size:40px;
margin:10px 0;
}

.total-cuisine{
font-size:60px;
margin-top:40px;
color:#22c55e;
}

#closeCuisine{
position:absolute;
top:20px;
right:20px;
background:red;
font-size:20px;
}

</style>

</head>

<body>

<h1>Commandes du jour</h1>

<button onclick="openCuisine()">📺 Mode cuisine plein écran</button>

<div id="dashboard"></div>

<div id="cuisine">

<button id="closeCuisine" onclick="closeCuisine()">❌</button>

<h2 id="cuisine-date"></h2>

<div id="cuisine-liste"></div>

<div class="total-cuisine" id="cuisine-total"></div>

</div>

<script>

const commandes = [
{ formation:"Formation JS", repas:12 },
{ formation:"Formation IA", repas:8 },
{ formation:"Formation Marketing", repas:5 }
]

function afficherDashboard(){

const container = document.getElementById("dashboard")

let total = 0

commandes.forEach(c=>{
total += c.repas
})

let html = `<div class="jour">`

commandes.forEach(c=>{

html += `
<div class="commande">
<div>${c.formation}</div>
<div>${c.repas}</div>
</div>
`

})

html += `<div class="total">TOTAL : ${total} repas</div>`

html += `</div>`

container.innerHTML = html

}

function openCuisine(){

document.getElementById("cuisine").style.display = "flex"

const liste = document.getElementById("cuisine-liste")

let total = 0

let html = ""

commandes.forEach(c=>{

total += c.repas

html += `<div class="ligne-cuisine">${c.formation} : ${c.repas}</div>`

})

liste.innerHTML = html

document.getElementById("cuisine-total").innerText = "TOTAL : "+total

const date = new Date()

document.getElementById("cuisine-date").innerText =
date.toLocaleDateString("fr-FR",{weekday:'long',day:'numeric',month:'long'}).toUpperCase()

}

function closeCuisine(){

document.getElementById("cuisine").style.display = "none"

}

document.addEventListener("keydown",function(e){

if(e.key === "Escape"){
closeCuisine()
}

})

afficherDashboard()

if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("/sw.js")
}

</script>

</body>
</html>
