<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Planning livraisons</title>

<style>

body{
font-family:Arial;
background:#f3f4f6;
margin:0;
}

/* HEADER */

header{
background:#2563eb;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
background:white;
border:none;
padding:8px 12px;
border-radius:6px;
font-weight:bold;
cursor:pointer;
margin-left:5px;
}

/* PAGE */

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.summary{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
display:flex;
justify-content:space-around;
font-weight:bold;
font-size:18px;
}

.day{
background:white;
border-radius:10px;
padding:15px;
margin-bottom:20px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.date{
font-size:18px;
font-weight:bold;
color:#1e3a8a;
margin-bottom:10px;
}

.row{
border-top:1px solid #eee;
padding:10px 0;
display:flex;
justify-content:space-between;
}

.info{
max-width:70%;
}

.formation{
font-weight:bold;
}

.adresse{
font-size:13px;
color:#6b7280;
}

.qty{
font-size:22px;
font-weight:bold;
color:#2563eb;
}

/* MODE CUISINE */

.cuisineMode{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:white;
display:none;
flex-direction:column;
align-items:center;
padding:40px;
z-index:9999;
}

.cuisine-top{
text-align:center;
margin-bottom:30px;
}

.cuisine-date{
font-size:60px;
font-weight:bold;
margin-bottom:20px;
}

.cuisine-alert{
font-size:40px;
font-weight:bold;
margin:10px 0;
padding:15px 25px;
border-radius:10px;
text-align:center;
}

.cuisine-alert20{background:#dc2626;}
.cuisine-alert40{background:#b91c1c;}
.cuisine-alert80{background:#7f1d1d;}

.cuisine-address-alert{
font-size:35px;
background:#f59e0b;
padding:12px 20px;
border-radius:10px;
margin-top:10px;
text-align:center;
}

.cuisine-list{
width:70%;
margin-top:20px;
}

.cuisine-row{
margin:20px 0;
}

.cuisine-line{
display:flex;
justify-content:space-between;
font-size:55px;
}

.cuisine-qty{
color:#22c55e;
font-weight:bold;
}

.cuisine-adresse{
font-size:28px;
color:#d1d5db;
margin-top:5px;
}

.cuisine-total{
font-size:65px;
font-weight:bold;
margin-top:40px;
}

.closeCuisine{
position:fixed;
top:20px;
right:20px;
background:#ef4444;
color:white;
border:none;
padding:15px 20px;
border-radius:10px;
font-size:22px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<header>

Planning des livraisons

<div>
<button onclick="openCuisine()">📺 Mode cuisine</button>
</div>

</header>

<div class="container">

<div class="summary" id="summary"></div>

<div id="planning"></div>

</div>

<!-- MODE CUISINE -->

<div id="cuisineMode" class="cuisineMode">

<button class="closeCuisine" onclick="closeCuisine()">❌</button>

<div class="cuisine-top">

<div id="cuisineDate" class="cuisine-date"></div>

<div id="cuisineAlert"></div>

</div>

<div id="cuisineList" class="cuisine-list"></div>

<div id="cuisineTotal" class="cuisine-total"></div>

</div>

<script>

function normalize(d){
const n=new Date(d)
n.setHours(0,0,0,0)
return n
}

let todayEvents=[]

async function load(){

const config=await fetch("/api/config").then(r=>r.json())
const meals=await fetch("/api/meals").then(r=>r.json())

const formations=config.formations||[]
const livraisons=config.livraisons||{}

const today=normalize(new Date())

let todayTotal=0
todayEvents=[]

let html=""

Object.entries(livraisons).forEach(([formationId,dates])=>{

const formation=formations.find(f=>f.id===formationId)
if(!formation) return

Object.entries(dates).forEach(([date,restos])=>{

const d=normalize(date)
if(d.getTime()!==today.getTime()) return

html+=`<div class="day">`
html+=`<div class="date">${date}</div>`

Object.entries(restos).forEach(([resto,data])=>{

const qty=meals?.[formationId]?.[date]?.[resto]??0
if(qty<=0) return

todayTotal+=qty

const event={
formation:formation.name,
adresse:data.adresse||"",
qty
}

todayEvents.push(event)

html+=`
<div class="row">

<div class="info">
<div class="formation">${formation.name}</div>
<div class="adresse">${data.adresse||""}</div>
</div>

<div class="qty">${qty}</div>

</div>
`

})

html+=`</div>`

})

})

document.getElementById("planning").innerHTML=html

document.getElementById("summary").innerHTML=
`AUJOURD'HUI : ${todayTotal} repas`

}

function openCuisine(){

if(todayEvents.length===0){
alert("Aucune commande aujourd'hui")
return
}

document.getElementById("cuisineMode").style.display="flex"

if(document.documentElement.requestFullscreen)
document.documentElement.requestFullscreen()

let total=0
let html=""
let adresses=new Set()

todayEvents.forEach(e=>{

total+=e.qty
if(e.adresse) adresses.add(e.adresse)

html+=`

<div class="cuisine-row">

<div class="cuisine-line">
<div>${e.formation}</div>
<div class="cuisine-qty">${e.qty}</div>
</div>

<div class="cuisine-adresse">${e.adresse}</div>

</div>

`

})

document.getElementById("cuisineList").innerHTML=html
document.getElementById("cuisineTotal").innerText="TOTAL : "+total+" repas"

const date=new Date().toLocaleDateString("fr-FR",{
weekday:"long",
day:"numeric",
month:"long"
})

document.getElementById("cuisineDate").innerText=date.toUpperCase()

let alertHTML=""

if(total>80)
alertHTML=`<div class="cuisine-alert cuisine-alert80">🚨 SERVICE EXCEPTIONNEL : ${total} REPAS</div>`
else if(total>40)
alertHTML=`<div class="cuisine-alert cuisine-alert40">🔴 GROS SERVICE : ${total} REPAS</div>`
else if(total>20)
alertHTML=`<div class="cuisine-alert cuisine-alert20">⚠️ ATTENTION : ${total} REPAS</div>`

if(adresses.size>1)
alertHTML+=`<div class="cuisine-address-alert">📍 ${adresses.size} ADRESSES DIFFÉRENTES</div>`

document.getElementById("cuisineAlert").innerHTML=alertHTML

}

function closeCuisine(){

document.getElementById("cuisineMode").style.display="none"

if(document.fullscreenElement)
document.exitFullscreen()

}

load()

setInterval(load,30000)

</script>

</body>
</html>
