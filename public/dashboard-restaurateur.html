<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Planning livraisons</title>

<style>

body{
font-family:Arial;
background:#f3f4f6;
margin:0;
}

header{
background:#2563eb;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
background:white;
border:none;
padding:8px 12px;
border-radius:6px;
font-weight:bold;
cursor:pointer;
margin-left:10px;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.summary{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
display:flex;
justify-content:space-around;
font-weight:bold;
font-size:18px;
}

.day{
background:white;
border-radius:10px;
padding:15px;
margin-bottom:20px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.alert{
padding:10px;
border-radius:6px;
font-weight:bold;
text-align:center;
margin-bottom:10px;
color:white;
}

.alert20{background:#dc2626;}
.alert40{background:#b91c1c;}
.alert80{background:#7f1d1d;}

.addressAlert{
background:#f59e0b;
color:white;
padding:6px;
border-radius:6px;
text-align:center;
font-weight:bold;
margin-bottom:10px;
}

.date-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.date{
font-size:18px;
font-weight:bold;
color:#1e3a8a;
}

.row{
border-top:1px solid #eee;
padding:10px 0;
display:flex;
justify-content:space-between;
}

.info{max-width:70%;}
.resto{font-weight:bold;}
.formation{font-size:14px;color:#374151;}
.adresse{font-size:13px;color:#6b7280;}
.comment{color:#dc2626;font-size:13px;}

.qty{
font-size:22px;
font-weight:bold;
color:#2563eb;
}

/* ======================= */
/* MODE CUISINE */
/* ======================= */

.cuisine{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:white;
display:none;
flex-direction:column;
align-items:center;
padding:40px;
z-index:9999;
}

.cuisine-date{
font-size:60px;
font-weight:bold;
text-align:center;
margin-bottom:20px;
}

.cuisine-alert{
font-size:40px;
font-weight:bold;
text-align:center;
margin-bottom:10px;
}

.cuisine-list{
width:70%;
margin-top:30px;
}

.cuisine-row{
margin:20px 0;
}

.cuisine-line{
display:flex;
justify-content:space-between;
font-size:55px;
}

.cuisine-qty{
color:#22c55e;
font-weight:bold;
}

.cuisine-adresse{
font-size:28px;
color:#d1d5db;
margin-top:5px;
}

.cuisine-total{
font-size:65px;
font-weight:bold;
margin-top:40px;
text-align:center;
}

.closeCuisine{
position:absolute;
top:20px;
right:20px;
background:#ef4444;
color:white;
padding:10px 15px;
border-radius:8px;
font-size:18px;
}

</style>

</head>

<body>

<header>
Planning des livraisons

<div>
<button onclick="openCuisine()">📺 Mode cuisine</button>
<button onclick="printTicket()">🖨 Ticket cuisine</button>
</div>

</header>

<div class="container">

<div class="summary" id="summary">
Chargement...
</div>

<div id="planning">
Chargement...
</div>

</div>

<!-- MODE CUISINE -->

<div id="cuisine" class="cuisine">

<button class="closeCuisine" onclick="closeCuisine()">❌</button>

<div id="cuisineDate" class="cuisine-date"></div>

<div id="cuisineAlert" class="cuisine-alert"></div>

<div id="cuisineList" class="cuisine-list"></div>

<div id="cuisineTotal" class="cuisine-total"></div>

</div>

<script>

function normalize(d){
const n=new Date(d)
n.setHours(0,0,0,0)
return n
}

let todayEvents=[]

function getAlert(total){

if(total>80)
return `<div class="alert alert80">🚨 SERVICE EXCEPTIONNEL : ${total}</div>`

if(total>40)
return `<div class="alert alert40">🔴 GROS SERVICE : ${total}</div>`

if(total>20)
return `<div class="alert alert20">⚠️ ATTENTION : ${total}</div>`

return ""
}

async function load(){

try{

const config=await fetch("/api/config").then(r=>r.json())
const meals=await fetch("/api/meals").then(r=>r.json())

const formations=config.formations||[]
const livraisons=config.livraisons||{}

const today=normalize(new Date())
const tomorrow=new Date(today)
tomorrow.setDate(tomorrow.getDate()+1)

let events=[]
let todayTotal=0
let tomorrowTotal=0

todayEvents=[]

Object.entries(livraisons).forEach(([formationId,dates])=>{

const formation=formations.find(f=>f.id===formationId)
if(!formation) return

Object.entries(dates).forEach(([date,restos])=>{

const d=normalize(date)
if(d<today) return

Object.entries(restos).forEach(([resto,data])=>{

if(!data||data.mode!=="livraison") return

const qty=meals?.[formationId]?.[date]?.[resto]??0
if(qty<=0) return

const event={
date,
resto,
formation:formation.name,
adresse:data.adresse||"",
comment:data.comment||"",
qty
}

events.push(event)

if(d.getTime()===today.getTime()){
todayTotal+=qty
todayEvents.push(event)
}

if(d.getTime()===tomorrow.getTime())
tomorrowTotal+=qty

})

})

})

document.getElementById("summary").innerHTML=
`AUJOURD'HUI : ${todayTotal} repas &nbsp;&nbsp;&nbsp; DEMAIN : ${tomorrowTotal} repas`

events.sort((a,b)=>new Date(a.date)-new Date(b.date))

let grouped={}

events.forEach(e=>{
if(!grouped[e.date]) grouped[e.date]=[]
grouped[e.date].push(e)
})

let html=""

Object.entries(grouped).forEach(([date,list])=>{

let total=0
let adresses=new Set()

list.forEach(e=>{
total+=e.qty
if(e.adresse) adresses.add(e.adresse)
})

const label=new Date(date).toLocaleDateString("fr-FR",{
weekday:"long",
day:"2-digit",
month:"2-digit"
})

html+=`<div class="day">`

html+=getAlert(total)

if(adresses.size>1)
html+=`<div class="addressAlert">📍 ${adresses.size} adresses différentes</div>`

html+=`
<div class="date-header">
<div class="date">${label}</div>
<div>${total} repas</div>
</div>
`

list.forEach(e=>{

html+=`

<div class="row">

<div class="info">
<div class="resto">${e.resto}</div>
<div class="formation">${e.formation}</div>
<div class="adresse">${e.adresse}</div>
</div>

<div class="qty">${e.qty}</div>

</div>

`

})

html+=`</div>`

})

document.getElementById("planning").innerHTML=html

}catch(err){

document.getElementById("planning").innerHTML="Erreur"
console.error(err)

}

}

function openCuisine(){

if(todayEvents.length===0){
alert("Aucun repas aujourd'hui")
return
}

document.getElementById("cuisine").style.display="flex"

let total=0
let html=""
let adresses=new Set()

todayEvents.forEach(e=>{

total+=e.qty
if(e.adresse) adresses.add(e.adresse)

html+=`
<div class="cuisine-row">

<div class="cuisine-line">
<div>${e.formation}</div>
<div class="cuisine-qty">${e.qty}</div>
</div>

<div class="cuisine-adresse">${e.adresse}</div>

</div>
`
})

document.getElementById("cuisineList").innerHTML=html
document.getElementById("cuisineTotal").innerText="TOTAL : "+total+" repas"

const date=new Date().toLocaleDateString("fr-FR",{
weekday:"long",
day:"numeric",
month:"long"
})

document.getElementById("cuisineDate").innerText=date.toUpperCase()

let alert=""

if(total>80) alert="🚨 SERVICE EXCEPTIONNEL"
else if(total>40) alert="🔴 GROS SERVICE"
else if(total>20) alert="⚠️ ATTENTION"

document.getElementById("cuisineAlert").innerText=alert

}

function closeCuisine(){
document.getElementById("cuisine").style.display="none"
}

function printTicket(){
window.print()
}

load()
setInterval(load,30000)

</script>

</body>

</html>
