<!DOCTYPE html>
<html lang="fr">

<head>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2563eb">
  
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Planning livraisons</title>

<style>

body{
font-family:Arial;
background:#f3f4f6;
margin:0;
}

header{
background:#2563eb;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
background:white;
border:none;
padding:8px 12px;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.summary{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
display:flex;
justify-content:space-around;
font-weight:bold;
font-size:18px;
}

.day{
background:white;
border-radius:10px;
padding:15px;
margin-bottom:20px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.alert{
padding:10px;
border-radius:6px;
font-weight:bold;
text-align:center;
margin-bottom:10px;
color:white;
}

.alert20{background:#dc2626;}
.alert40{background:#b91c1c;}
.alert80{background:#7f1d1d;}

.addressAlert{
background:#f59e0b;
color:white;
padding:6px;
border-radius:6px;
text-align:center;
font-weight:bold;
margin-bottom:10px;
}

.date-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.date{
font-size:18px;
font-weight:bold;
color:#1e3a8a;
}

.row{
border-top:1px solid #eee;
padding:10px 0;
display:flex;
justify-content:space-between;
}

.info{max-width:70%;}
.resto{font-weight:bold;}
.formation{font-size:14px;color:#374151;}
.adresse{font-size:13px;color:#6b7280;}
.comment{color:#dc2626;font-size:13px;}

.qty{
font-size:22px;
font-weight:bold;
color:#2563eb;
}

</style>

</head>

<body>

<header>
Planning des livraisons
<button onclick="printTicket()">🖨 Ticket cuisine</button>
</header>

<div class="container">

<div class="summary" id="summary">
Chargement...
</div>

<div id="planning">
Chargement...
</div>

</div>

<script>

function normalize(d){
const n=new Date(d)
n.setHours(0,0,0,0)
return n
}

let todayEvents=[]

function getAlert(total){

if(total>80)
return `<div class="alert alert80">🚨 SERVICE EXCEPTIONNEL : ${total}</div>`

if(total>40)
return `<div class="alert alert40">🔴 GROS SERVICE : ${total}</div>`

if(total>20)
return `<div class="alert alert20">⚠️ ATTENTION : ${total}</div>`

return ""
}

async function load(){

try{

const config=await fetch("/api/config").then(r=>r.json())
const meals=await fetch("/api/meals").then(r=>r.json())

const formations=config.formations||[]
const livraisons=config.livraisons||{}

const today=normalize(new Date())
const tomorrow=new Date(today)
tomorrow.setDate(tomorrow.getDate()+1)

let events=[]
let todayTotal=0
let tomorrowTotal=0

todayEvents=[]

Object.entries(livraisons).forEach(([formationId,dates])=>{

const formation=formations.find(f=>f.id===formationId)
if(!formation) return

Object.entries(dates).forEach(([date,restos])=>{

const d=normalize(date)
if(d<today) return

Object.entries(restos).forEach(([resto,data])=>{

if(!data||data.mode!=="livraison") return

const qty=meals?.[formationId]?.[date]?.[resto]??0
if(qty<=0) return

const event={
date,
resto,
formation:formation.name,
adresse:data.adresse||"",
comment:data.comment||"",
qty
}

events.push(event)

if(d.getTime()===today.getTime()){
todayTotal+=qty
todayEvents.push(event)
}

if(d.getTime()===tomorrow.getTime())
tomorrowTotal+=qty

})

})

})

document.getElementById("summary").innerHTML=
`AUJOURD'HUI : ${todayTotal} repas &nbsp;&nbsp;&nbsp; DEMAIN : ${tomorrowTotal} repas`

events.sort((a,b)=>new Date(a.date)-new Date(b.date))

let grouped={}

events.forEach(e=>{
if(!grouped[e.date]) grouped[e.date]=[]
grouped[e.date].push(e)
})

let html=""

Object.entries(grouped).forEach(([date,list])=>{

let total=0
let adresses=new Set()

list.forEach(e=>{
total+=e.qty
if(e.adresse) adresses.add(e.adresse)
})

const label=new Date(date).toLocaleDateString("fr-FR",{
weekday:"long",
day:"2-digit",
month:"2-digit"
})

html+=`<div class="day">`

html+=getAlert(total)

if(adresses.size>1)
html+=`<div class="addressAlert">📍 ${adresses.size} adresses différentes</div>`

html+=`
<div class="date-header">
<div class="date">${label}</div>
<div>${total} repas</div>
</div>
`

list.forEach(e=>{

html+=`

<div class="row">

<div class="info">
<div class="resto">${e.resto}</div>
<div class="formation">${e.formation}</div>
</div>

<div class="qty">${e.qty}</div>

</div>

`

})

html+=`</div>`

})

document.getElementById("planning").innerHTML=html

}catch(err){

document.getElementById("planning").innerHTML="Erreur"
console.error(err)

}

}

function printTicket(){

if(todayEvents.length===0){
alert("Aucun repas aujourd'hui")
return
}

let total=0
let rows=""

todayEvents.forEach(e=>{

total+=e.qty

rows+=`
<tr>
<td>${e.formation}</td>
<td>${e.adresse || ""}</td>
<td>${e.comment || ""}</td>
<td style="text-align:center;font-weight:bold">${e.qty}</td>
</tr>
`

})

const date=new Date().toLocaleDateString("fr-FR",{
weekday:"long",
day:"numeric",
month:"long",
year:"numeric"
})

const html=`

<html>

<head>

<title>Commande repas</title>

<style>

body{
font-family:Arial;
padding:40px;
}

h1{
text-align:center;
margin-bottom:30px;
}

table{
width:100%;
border-collapse:collapse;
font-size:16px;
}

th,td{
border:1px solid #000;
padding:10px;
}

th{
background:#f3f4f6;
}

.total{
margin-top:20px;
font-size:20px;
font-weight:bold;
text-align:right;
}

</style>

</head>

<body>

<h1>Commandes repas</h1>

<p><strong>Date :</strong> ${date}</p>

<table>

<tr>
<th>Formation</th>
<th>Adresse</th>
<th>Commentaire</th>
<th>Repas</th>
</tr>

${rows}

</table>

<div class="total">
TOTAL : ${total} repas
</div>

</body>

</html>
`

const win=window.open("","","width=900,height=700")

win.document.write(html)

win.document.close()

win.print()

}


load()
setInterval(load,30000)

</script>

</body>

</html>
