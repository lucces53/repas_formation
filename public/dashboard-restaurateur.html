<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Planning livraisons</title>

<style>

body{
font-family:Arial;
background:#f3f4f6;
margin:0;
}

header{
background:#2563eb;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.day{
background:white;
border-radius:10px;
padding:15px;
margin-bottom:20px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.date{
font-size:18px;
font-weight:bold;
margin-bottom:10px;
color:#1e3a8a;
}

.row{
border-top:1px solid #eee;
padding:10px 0;
display:flex;
justify-content:space-between;
}

.info{
max-width:70%;
}

.resto{
font-weight:bold;
}

.formation{
color:#374151;
font-size:14px;
}

.adresse{
font-size:13px;
color:#6b7280;
}

.comment{
color:#dc2626;
font-size:13px;
}

.qty{
font-size:22px;
font-weight:bold;
color:#2563eb;
}

.error{
color:red;
font-weight:bold;
}

</style>

</head>

<body>

<header>
Planning des livraisons restaurateurs
</header>

<div class="container" id="planning">
Chargement...
</div>

<script>

async function load(){

try{

const configRes = await fetch("/api/config")
const mealsRes = await fetch("/api/meals")

if(!configRes.ok || !mealsRes.ok){
throw new Error("API non disponible")
}

const config = await configRes.json()
const meals = await mealsRes.json()

const formations = config.formations || []
const livraisons = config.livraisons || {}

let events=[]

Object.entries(livraisons).forEach(([formationId,dates])=>{

const formation = formations.find(f=>f.id===formationId)

if(!formation) return

Object.entries(dates).forEach(([date,restos])=>{

Object.entries(restos).forEach(([resto,data])=>{

if(!data || data.mode !== "livraison") return

const qty =
meals?.[formationId]?.[date]?.[resto] ?? 0

if(qty <= 0) return

events.push({
date,
resto,
formation:formation.name,
adresse:data.adresse || "",
comment:data.comment || "",
qty
})

})

})

})

events.sort((a,b)=> new Date(a.date)-new Date(b.date))

let grouped={}

events.forEach(e=>{

if(!grouped[e.date]) grouped[e.date]=[]

grouped[e.date].push(e)

})

let html=""

Object.entries(grouped).forEach(([date,list])=>{

const d=new Date(date)

const label=d.toLocaleDateString("fr-FR",{
weekday:"long",
day:"2-digit",
month:"2-digit",
year:"numeric"
})

html+=`<div class="day">`
html+=`<div class="date">${label}</div>`

list.forEach(e=>{

html+=`

<div class="row">

<div class="info">

<div class="resto">${e.resto}</div>
<div class="formation">${e.formation}</div>
<div class="adresse">${e.adresse}</div>

${e.comment ? `<div class="comment">${e.comment}</div>` : ""}

</div>

<div class="qty">
${e.qty}
</div>

</div>

`

})

html+=`</div>`

})

if(!html){
html="Aucune livraison prévue"
}

document.getElementById("planning").innerHTML=html

}catch(err){

document.getElementById("planning").innerHTML=
`<div class="error">Erreur chargement API</div>`

console.error(err)

}

}

load()

setInterval(load,30000)

</script>

</body>

</html>
