<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Planning livraisons</title>

<style>

body{
font-family:Arial;
background:#f3f4f6;
margin:0;
}

header{
background:#2563eb;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
background:white;
border:none;
padding:8px 12px;
border-radius:6px;
font-weight:bold;
cursor:pointer;
margin-left:5px;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.summary{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
display:flex;
justify-content:space-around;
font-weight:bold;
font-size:18px;
}

.day{
background:white;
border-radius:10px;
padding:15px;
margin-bottom:20px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.alert{
padding:10px;
border-radius:6px;
font-weight:bold;
text-align:center;
margin-bottom:10px;
color:white;
}

.alert20{background:#dc2626;}
.alert40{background:#b91c1c;}
.alert80{background:#7f1d1d;}

.addressAlert{
background:#f59e0b;
color:white;
padding:6px;
border-radius:6px;
text-align:center;
font-weight:bold;
margin-bottom:10px;
}

.date-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.date{
font-size:18px;
font-weight:bold;
color:#1e3a8a;
}

.row{
border-top:1px solid #eee;
padding:10px 0;
display:flex;
justify-content:space-between;
}

.info{max-width:70%;}
.resto{font-weight:bold;}
.formation{font-size:14px;color:#374151;}

.qty{
font-size:22px;
font-weight:bold;
color:#2563eb;
}

/* MODE CUISINE */

.cuisineMode{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:white;
display:none;
flex-direction:column;
justify-content:space-between;
align-items:center;
padding:40px;
z-index:9999;
}

.cuisine-top{
text-align:center;
}

.cuisine-date{
font-size:60px;
font-weight:bold;
margin-bottom:20px;
}

.cuisine-alert{
font-size:40px;
font-weight:bold;
margin:10px 0;
padding:15px 25px;
border-radius:10px;
text-align:center;
}

.cuisine-alert20{background:#dc2626;}
.cuisine-alert40{background:#b91c1c;}
.cuisine-alert80{background:#7f1d1d;}

.cuisine-address{
font-size:35px;
background:#f59e0b;
padding:12px 20px;
border-radius:10px;
margin-top:10px;
text-align:center;
}

.cuisine-list{
width:70%;
}

.cuisine-row{
display:flex;
justify-content:space-between;
font-size:55px;
margin:15px 0;
}

.cuisine-qty{
color:#22c55e;
font-weight:bold;
}

.cuisine-total{
font-size:70px;
font-weight:bold;
margin-bottom:20px;
}

.closeCuisine{
position:fixed;
top:20px;
right:20px;
background:#ef4444;
color:white;
border:none;
padding:15px 20px;
border-radius:10px;
font-size:22px;
font-weight:bold;
cursor:pointer;
z-index:10000;
}

</style>

</head>

<body>

<header>

Planning des livraisons

<div>
<button onclick="openCuisine()">📺 Mode cuisine</button>
<button onclick="printTicket()">🖨 Ticket cuisine</button>
</div>

</header>

<div class="container">

<div class="summary" id="summary"></div>

<div id="planning"></div>

</div>

<!-- MODE CUISINE -->

<div id="cuisineMode" class="cuisineMode">

<button class="closeCuisine" onclick="closeCuisine()">❌ Fermer</button>

<div class="cuisine-top">

<div id="cuisineDate" class="cuisine-date"></div>

<div id="cuisineAlert"></div>

</div>

<div id="cuisineList" class="cuisine-list"></div>

<div id="cuisineTotal" class="cuisine-total"></div>

</div>

<script>

function normalize(d){
const n=new Date(d)
n.setHours(0,0,0,0)
return n
}

let todayEvents=[]

async function load(){

const config=await fetch("/api/config").then(r=>r.json())
const meals=await fetch("/api/meals").then(r=>r.json())

const formations=config.formations||[]
const livraisons=config.livraisons||{}

const today=normalize(new Date())

let events=[]
let todayTotal=0

todayEvents=[]

Object.entries(livraisons).forEach(([formationId,dates])=>{

const formation=formations.find(f=>f.id===formationId)
if(!formation) return

Object.entries(dates).forEach(([date,restos])=>{

const d=normalize(date)
if(d.getTime()!==today.getTime()) return

Object.entries(restos).forEach(([resto,data])=>{

if(data.mode!=="livraison") return

const qty=meals?.[formationId]?.[date]?.[resto]??0
if(qty<=0) return

const event={
formation:formation.name,
adresse:data.adresse||"",
qty
}

todayEvents.push(event)
todayTotal+=qty

})

})

})

document.getElementById("summary").innerHTML=
`AUJOURD'HUI : ${todayTotal} repas`

}

function openCuisine(){

if(todayEvents.length===0){
alert("Aucune commande aujourd'hui")
return
}

document.getElementById("cuisineMode").style.display="flex"

if(document.documentElement.requestFullscreen)
document.documentElement.requestFullscreen()

let total=0
let html=""
let adresses=new Set()

todayEvents.forEach(e=>{

total+=e.qty
if(e.adresse) adresses.add(e.adresse)

html+=`
<div class="cuisine-row">
<div>${e.formation}</div>
<div class="cuisine-qty">${e.qty}</div>
</div>
`

})

document.getElementById("cuisineList").innerHTML=html
document.getElementById("cuisineTotal").innerText="TOTAL : "+total+" repas"

const date=new Date().toLocaleDateString("fr-FR",{
weekday:"long",
day:"numeric",
month:"long"
})

document.getElementById("cuisineDate").innerText=date.toUpperCase()

let alertHTML=""

if(total>80)
alertHTML=`<div class="cuisine-alert cuisine-alert80">🚨 SERVICE EXCEPTIONNEL : ${total} REPAS</div>`
else if(total>40)
alertHTML=`<div class="cuisine-alert cuisine-alert40">🔴 GROS SERVICE : ${total} REPAS</div>`
else if(total>20)
alertHTML=`<div class="cuisine-alert cuisine-alert20">⚠️ ATTENTION : ${total} REPAS</div>`

if(adresses.size>1)
alertHTML+=`<div class="cuisine-address">📍 ${adresses.size} ADRESSES DIFFÉRENTES</div>`

document.getElementById("cuisineAlert").innerHTML=alertHTML

}

function closeCuisine(){

document.getElementById("cuisineMode").style.display="none"

if(document.fullscreenElement)
document.exitFullscreen()

}

function printTicket(){
window.print()
}

load()

setInterval(load,30000)

</script>

</body>
</html>
