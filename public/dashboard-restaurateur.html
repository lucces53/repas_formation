<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Planning Restaurateurs</title>

<style>

body{
font-family:Arial;
background:#f1f5f9;
margin:0;
}

header{
background:#2563eb;
color:white;
padding:15px;
font-size:20px;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.day{
background:white;
margin-bottom:15px;
border-radius:10px;
padding:15px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.day-header{
display:flex;
justify-content:space-between;
font-weight:bold;
margin-bottom:10px;
}

.total{
background:#2563eb;
color:white;
padding:4px 10px;
border-radius:20px;
font-size:13px;
}

.formation{
display:flex;
justify-content:space-between;
border-top:1px solid #eee;
padding:8px 0;
}

.name{
font-weight:600;
}

.qty{
font-size:18px;
color:#2563eb;
font-weight:bold;
}

.empty{
text-align:center;
padding:50px;
color:#64748b;
}

</style>

</head>

<body>

<header>
Planning Restaurateurs
</header>

<div class="container" id="planning">
Chargement...
</div>

<script>

const S={
config:null,
meals:null
}

function formatDate(d){

const date=new Date(d)

return date.toLocaleDateString('fr-FR',{
weekday:'long',
day:'2-digit',
month:'2-digit'
})

}

function render(){

const formations=S.config.formations||[]
const meals=S.meals||{}

let html=''

formations.forEach(f=>{

if(!meals[f.id]) return

Object.keys(meals[f.id]).forEach(day=>{

let total=0

let items=[]

Object.entries(meals[f.id][day]).forEach(([resto,q])=>{

if(q>0){

items.push({
formation:f.name,
qty:q,
resto
})

total+=q

}

})

if(items.length){

html+=`
<div class="day">

<div class="day-header">
<div>${formatDate(day)}</div>
<div class="total">${total} repas</div>
</div>
`

items.forEach(i=>{

html+=`
<div class="formation">
<div class="name">${i.formation} - ${i.resto}</div>
<div class="qty">${i.qty}</div>
</div>
`

})

html+=`</div>`

}

})

})

if(!html){

html=`<div class="empty">Aucune livraison</div>`

}

document.getElementById('planning').innerHTML=html

}

async function init(){

const config=await fetch('/api/config').then(r=>r.json())
const meals=await fetch('/api/meals').then(r=>r.json())

S.config=config
S.meals=meals

render()

}

init()

setInterval(init,30000)

</script>

</body>
</html>
