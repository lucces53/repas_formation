<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Planning Livraisons Restaurateurs</title>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#f3f4f6;
margin:0;
}

header{
background:#2563eb;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.day{
background:white;
border-radius:10px;
padding:15px;
margin-bottom:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.day-title{
font-size:18px;
font-weight:bold;
margin-bottom:10px;
color:#1e3a8a;
}

.row{
display:flex;
justify-content:space-between;
padding:8px 0;
border-top:1px solid #eee;
}

.resto{
font-weight:bold;
}

.stage{
color:#374151;
}

.qty{
font-size:18px;
font-weight:bold;
color:#2563eb;
}

.empty{
text-align:center;
padding:40px;
color:#6b7280;
}

</style>

</head>

<body>

<header>
Planning des livraisons restaurateurs
</header>

<div class="container" id="planning">
Chargement...
</div>

<script>

const S={
config:null,
meals:null
}

function formatDate(d){

const date=new Date(d)

return date.toLocaleDateString('fr-FR',{
weekday:'long',
day:'2-digit',
month:'2-digit',
year:'numeric'
})

}

function buildPlanning(){

const formations=S.config.formations || []
const restaurants=S.config.restaurants || []
const meals=S.meals || {}

const restosLivraison=restaurants.filter(r=>r.delivery)

let days={}

formations.forEach(f=>{

if(!meals[f.id]) return

Object.keys(meals[f.id]).forEach(date=>{

restosLivraison.forEach(resto=>{

const qty=meals[f.id][date]?.[resto.id] || 0

if(qty>0){

if(!days[date]) days[date]=[]

days[date].push({
resto:resto.name,
stage:f.name,
qty
})

}

})

})

})

return days

}

function render(){

const planning=buildPlanning()

const dates=Object.keys(planning).sort((a,b)=>new Date(a)-new Date(b))

let html=""

dates.forEach(date=>{

html+=`
<div class="day">
<div class="day-title">${formatDate(date)}</div>
`

planning[date].forEach(item=>{

html+=`
<div class="row">
<div>
<div class="resto">${item.resto}</div>
<div class="stage">${item.stage}</div>
</div>
<div class="qty">${item.qty}</div>
</div>
`

})

html+=`</div>`

})

if(html===""){
html=`<div class="empty">Aucune livraison prévue</div>`
}

document.getElementById("planning").innerHTML=html

}

async function init(){

const config=await fetch('/api/config').then(r=>r.json())
const meals=await fetch('/api/meals').then(r=>r.json())

S.config=config
S.meals=meals

render()

}

init()

setInterval(init,30000)

</script>

</body>
</html>
