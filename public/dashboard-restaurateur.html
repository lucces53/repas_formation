<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Planning livraisons</title>

<style>

body{
font-family:Arial;
background:#f3f4f6;
margin:0;
}

header{
background:#2563eb;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.summary{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
display:flex;
justify-content:space-around;
font-weight:bold;
font-size:18px;
}

.day{
background:white;
border-radius:10px;
padding:15px;
margin-bottom:20px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.alert{
padding:10px;
border-radius:6px;
font-weight:bold;
text-align:center;
margin-bottom:10px;
color:white;
}

.alert20{background:#dc2626;}
.alert40{background:#b91c1c;font-size:16px;}
.alert80{background:#7f1d1d;font-size:18px;}

.addressAlert{
background:#f59e0b;
color:white;
padding:6px;
border-radius:6px;
text-align:center;
font-weight:bold;
margin-bottom:10px;
}

.date-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.date{
font-size:18px;
font-weight:bold;
color:#1e3a8a;
}

.right{
display:flex;
align-items:center;
gap:10px;
}

.total{
font-weight:bold;
color:#1d4ed8;
font-size:14px;
}

.badge{
padding:4px 10px;
border-radius:20px;
font-size:12px;
font-weight:bold;
}

.badge-today{background:#dcfce7;color:#15803d;}
.badge-tomorrow{background:#fef9c3;color:#854d0e;}
.badge-future{background:#e5e7eb;color:#374151;}

.row{
border-top:1px solid #eee;
padding:10px 0;
display:flex;
justify-content:space-between;
}

.info{max-width:70%;}

.resto{font-weight:bold;}

.formation{
color:#374151;
font-size:14px;
}

.adresse{
font-size:13px;
color:#6b7280;
}

.comment{
color:#dc2626;
font-size:13px;
}

.qty{
font-size:22px;
font-weight:bold;
color:#2563eb;
}

</style>

</head>

<body>

<header>
Planning des livraisons restaurateurs
</header>

<div class="container">

<div class="summary" id="summary">
Chargement...
</div>

<div id="planning">
Chargement...
</div>

</div>

<script>

function normalize(d){
const n=new Date(d)
n.setHours(0,0,0,0)
return n
}

function getBadge(date){

const today=normalize(new Date())
const tomorrow=new Date(today)
tomorrow.setDate(tomorrow.getDate()+1)

const d=normalize(date)

if(d.getTime()===today.getTime())
return `<span class="badge badge-today">Aujourd'hui</span>`

if(d.getTime()===tomorrow.getTime())
return `<span class="badge badge-tomorrow">Demain</span>`

return `<span class="badge badge-future">À venir</span>`
}

function getAlert(total){

if(total>80)
return `<div class="alert alert80">🚨 SERVICE EXCEPTIONNEL : ${total} REPAS</div>`

if(total>40)
return `<div class="alert alert40">🔴 GROS SERVICE : ${total} REPAS</div>`

if(total>20)
return `<div class="alert alert20">⚠️ ATTENTION : ${total} REPAS</div>`

return ""
}

async function load(){

try{

const config=await fetch("/api/config").then(r=>r.json())
const meals=await fetch("/api/meals").then(r=>r.json())

const formations=config.formations||[]
const livraisons=config.livraisons||{}

const today=normalize(new Date())
const tomorrow=new Date(today)
tomorrow.setDate(tomorrow.getDate()+1)

let events=[]
let todayTotal=0
let tomorrowTotal=0

Object.entries(livraisons).forEach(([formationId,dates])=>{

const formation=formations.find(f=>f.id===formationId)
if(!formation) return

Object.entries(dates).forEach(([date,restos])=>{

const d=normalize(date)
if(d<today) return

Object.entries(restos).forEach(([resto,data])=>{

if(!data||data.mode!=="livraison") return

const qty=meals?.[formationId]?.[date]?.[resto]??0
if(qty<=0) return

events.push({
date,
resto,
formation:formation.name,
adresse:data.adresse||"",
comment:data.comment||"",
qty
})

if(d.getTime()===today.getTime())
todayTotal+=qty

if(d.getTime()===tomorrow.getTime())
tomorrowTotal+=qty

})

})

})

document.getElementById("summary").innerHTML=
`AUJOURD'HUI : ${todayTotal} repas &nbsp;&nbsp;&nbsp; DEMAIN : ${tomorrowTotal} repas`

events.sort((a,b)=>new Date(a.date)-new Date(b.date))

let grouped={}

events.forEach(e=>{
if(!grouped[e.date]) grouped[e.date]=[]
grouped[e.date].push(e)
})

let html=""

Object.entries(grouped).forEach(([date,list])=>{

const d=new Date(date)

const label=d.toLocaleDateString("fr-FR",{
weekday:"long",
day:"2-digit",
month:"2-digit",
year:"numeric"
})

let total=0
let adresses=new Set()

list.forEach(e=>{
total+=e.qty
if(e.adresse) adresses.add(e.adresse)
})

html+=`<div class="day">`

html+=getAlert(total)

if(adresses.size>1){
html+=`<div class="addressAlert">📍 ${adresses.size} ADRESSES DE LIVRAISON DIFFÉRENTES</div>`
}

html+=`
<div class="date-header">
<div class="date">${label}</div>
<div class="right">
<div class="total">${total} repas</div>
${getBadge(date)}
</div>
</div>
`

list.forEach(e=>{

html+=`

<div class="row">

<div class="info">

<div class="resto">${e.resto}</div>
<div class="formation">${e.formation}</div>
<div class="adresse">${e.adresse}</div>

${e.comment ? `<div class="comment">${e.comment}</div>` : ""}

</div>

<div class="qty">${e.qty}</div>

</div>

`

})

html+=`</div>`

})

if(!html)
html="Aucune livraison prévue"

document.getElementById("planning").innerHTML=html

}catch(err){

document.getElementById("planning").innerHTML="Erreur chargement"
console.error(err)

}

}

load()
setInterval(load,30000)

</script>

</body>

</html>
