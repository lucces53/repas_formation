<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Repas Formation</title>
  <meta name="theme-color" content="#2563eb" />
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Repas Formation">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #2563eb; --primary-light: #eff6ff;
      --success: #16a34a; --danger: #dc2626;
      --bg: #f1f5f9; --card: #ffffff; --border: #e2e8f0;
      --text: #1e293b; --muted: #64748b; --radius: 10px;
    }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .topbar { background: var(--primary); color: #fff; padding: 12px 16px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px #0002; }
    .topbar h1 { font-size: 1.1rem; flex: 1; }
    .topbar button { background: #ffffff22; border: none; color: #fff; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
    .topbar button:hover { background: #ffffff44; }
    .tabs { display: flex; background: #fff; border-bottom: 1px solid var(--border); overflow-x: auto; position: sticky; top: 49px; z-index: 99; }
    .tab { padding: 12px 16px; cursor: pointer; font-size: 0.85rem; white-space: nowrap; border-bottom: 3px solid transparent; }
    .tab.active { border-bottom-color: var(--primary); color: var(--primary); font-weight: 600; }
    .page { display: none; padding: 12px; max-width: 900px; margin: 0 auto; }
    .page.active { display: block; }
    .card { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 4px #0001; border: 1px solid var(--border); }
    .card-title { font-weight: 700; font-size: 1rem; margin-bottom: 12px; color: var(--primary); }
    .form-row { display: flex; gap: 8px; flex-wrap: wrap; }
    label { font-size: 0.85rem; color: var(--muted); display: block; margin-bottom: 4px; }
    input, select { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.9rem; background: #fff; }
    .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.9rem; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-success { background: var(--success); color: #fff; }
    .btn-success:hover { background: #15803d; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { background: #b91c1c; }
    .btn-sm { padding: 4px 10px; font-size: 0.8rem; border: none; border-radius: 5px; cursor: pointer; font-weight: 500; }
    .btn-edit { background: #f1f5f9; color: var(--text); }
    .btn-del { background: #fee2e2; color: var(--danger); }
    .f-card { border-radius: var(--radius); border: 1px solid var(--border); background: #fff; overflow: hidden; margin-bottom: 10px; }
    .f-card-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px; }
    .f-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
    .f-card-body { padding: 0 14px 12px; font-size: 0.85rem; color: var(--muted); }
    .f-card-body .resto-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .tag { background: var(--primary-light); color: var(--primary); border-radius: 20px; padding: 3px 10px; font-size: 0.78rem; font-weight: 500; cursor: pointer; border: 1px solid #bfdbfe; }
    .tag.active { background: var(--primary); color: #fff; }
    .resto-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; background: #fff; margin-bottom: 6px; gap: 8px; }
    .meal-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .meal-table th { background: var(--primary); color: #fff; padding: 8px; text-align: center; }
    .meal-table td { padding: 8px; text-align: center; border-bottom: 1px solid var(--border); }
    .counter { display: flex; align-items: center; gap: 6px; justify-content: center; }
    .counter button { width: 28px; height: 28px; border: none; border-radius: 50%; cursor: pointer; font-size: 1rem; font-weight: 700; display: flex; align-items: center; justify-content: center; }
    .counter .minus { background: #fee2e2; color: var(--danger); }
    .counter .plus  { background: #dcfce7; color: var(--success); }
    .counter span   { min-width: 24px; text-align: center; font-weight: 600; }
    .counter.zero span { color: var(--muted); }
    .wf-btn { padding: 5px 12px; border: 1px solid var(--border); border-radius: 20px; background: #fff; cursor: pointer; font-size: 0.82rem; }
    .empty { text-align: center; color: var(--muted); font-style: italic; padding: 24px; }
    .badge-status { display: inline-block; font-size: 0.75rem; padding: 2px 8px; border-radius: 10px; font-weight: 600; margin-left: 8px; }
    .badge-active { background: #dcfce7; color: #16a34a; }
    .badge-future { background: #fef9c3; color: #854d0e; }
    .badge-past   { background: #f1f5f9; color: #94a3b8; }
    .modal-overlay { display:none; position:fixed; inset:0; background:#0006; z-index:200; align-items:center; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal { background:#fff; border-radius: var(--radius); padding:20px; width:90%; max-width:480px; max-height:90vh; overflow-y:auto; }
    .modal h3 { margin-bottom:14px; color:var(--primary); }
    .modal-footer { display:flex; gap:8px; justify-content:flex-end; margin-top:16px; }
    .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#1e293b; color:#fff; padding:10px 20px; border-radius:20px; font-size:0.9rem; opacity:0; pointer-events:none; transition:opacity 0.3s; z-index:999; }
    .toast.show { opacity:1; }
    .recap-table { width:100%; border-collapse:collapse; font-size:0.82rem; }
    .recap-table th { background:var(--primary); color:#fff; padding:7px 8px; text-align:center; white-space:nowrap; }
    .recap-table th:first-child { text-align:left; }
    .recap-table td { padding:6px 8px; text-align:center; border-bottom:1px solid var(--border); }
    .recap-table td:first-child { text-align:left; font-weight:500; }
    .recap-table tr.total-row td { font-weight:700; background:var(--bg); border-top:2px solid var(--border); }
    .filter-bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; align-items:center; }
    .filter-btn { padding:6px 14px; border-radius:20px; border:2px solid var(--primary); background:#fff; color:var(--primary); cursor:pointer; font-size:0.85rem; font-weight:600; transition: all 0.15s; }
    .filter-btn.active { background:var(--primary); color:#fff; }
    .info-box { background:#eff6ff; border:1px solid #bfdbfe; border-radius:8px; padding:10px 14px; font-size:0.85rem; color:#1e40af; margin-bottom:12px; }
    /* Historique */
    .histo-card { border-radius: var(--radius); border: 1px solid var(--border); background: #fff; overflow: hidden; margin-bottom: 12px; }
    .histo-header { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; background:var(--primary); color:#fff; }
    .histo-header strong { font-size:0.95rem; }
    .histo-header span { font-size:0.8rem; opacity:0.85; }
    .histo-body { padding:12px 14px; }
    .histo-row { display:flex; align-items:center; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--border); font-size:0.88rem; }
    .histo-row:last-child { border-bottom:none; }
    .histo-total { font-weight:700; color:var(--primary); font-size:1.1rem; }
    .stat-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:12px; margin-bottom:16px; }
    .stat-card { background:#fff; border:1px solid var(--border); border-radius:var(--radius); padding:16px; text-align:center; }
    .stat-card .stat-val { font-size:2rem; font-weight:800; color:var(--primary); }
    .stat-card .stat-lbl { font-size:0.8rem; color:var(--muted); margin-top:4px; }
    .progress-bar { height:8px; background:#e2e8f0; border-radius:4px; overflow:hidden; margin-top:6px; }
    .progress-fill { height:100%; background:var(--primary); border-radius:4px; transition:width 0.3s; }
    @media print {
      .topbar, .tabs, .no-print { display:none !important; }
      .page { display:block !important; padding:0; }
      body { background:#fff; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <h1>🍽️ Repas Formation</h1>
  <button onclick="exportCSV()">📊 CSV</button>
  <button onclick="exportAll()">📦 Export</button>
</div>

<div class="tabs">
  <div class="tab active" id="tab-saisie"       onclick="showPage('saisie')">✏️ Saisie</div>
  <div class="tab"        id="tab-recap"         onclick="showPage('recap')">📊 Récap</div>
  <div class="tab"        id="tab-historique"    onclick="showPage('historique')">📦 Historique</div>
  <div class="tab"        id="tab-formations"    onclick="showPage('formations')">🎓 Formations</div>
  <div class="tab"        id="tab-restaurateurs" onclick="showPage('restaurateurs')">🍴 Restaurateurs</div>
</div>

<div class="page active" id="page-saisie"></div>
<div class="page"        id="page-recap"></div>
<div class="page"        id="page-historique"></div>
<div class="page"        id="page-formations"></div>
<div class="page"        id="page-restaurateurs"></div>

<!-- Modal Formation -->
<div class="modal-overlay" id="modal-formation">
  <div class="modal">
    <h3 id="modal-formation-title">Nouvelle formation</h3>
    <div style="margin-bottom:12px"><label>Nom</label><input id="f-name" placeholder="Nom de la formation" /></div>
    <div style="margin-bottom:12px"><label>Couleur</label><input id="f-color" type="color" value="#2563eb" style="height:40px;padding:4px" /></div>
    <div class="form-row" style="margin-bottom:12px">
      <div style="flex:1"><label>Date début</label><input id="f-start" type="date" onchange="previewDays()" /></div>
      <div style="flex:1"><label>Date fin</label><input id="f-end" type="date" onchange="previewDays()" /></div>
    </div>
    <div id="days-preview" class="info-box" style="display:none"></div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="saveFormation()">Enregistrer</button>
      <button class="btn" style="background:#f1f5f9" onclick="closeModal('modal-formation')">Annuler</button>
    </div>
  </div>
</div>

<!-- Modal Restaurateur -->
<div class="modal-overlay" id="modal-resto">
  <div class="modal">
    <h3>Modifier le restaurateur</h3>
    <div style="margin-bottom:12px">
      <label>Nom</label>
      <input id="edit-resto-input" placeholder="Nom du restaurateur" />
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="saveResto()">Enregistrer</button>
      <button class="btn" style="background:#f1f5f9" onclick="closeModal('modal-resto')">Annuler</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
let S = { formations: [], restaurants: [], meals: {}, summaryWeek: 'w0', history: {} }
// history = { "RestoNom": { total: N, byFormation: { "fId": { name, total, lastDate } }, byMonth: { "2024-06": N } } }
let editingFormationId = null
let editingRestoOldName = null
let currentWeekOffset = 0

// ─── INIT ────────────────────────────────────────────────────────────────────
async function init() {
  await loadFromServer()
  cleanPastFormations()
  render()
}

async function loadFromServer() {
  try {
    const [cfg, meals, history] = await Promise.all([
      fetch('/api/config').then(r => r.json()),
      fetch('/api/meals').then(r => r.json()),
      fetch('/api/history').then(r => r.json()).catch(() => ({}))
    ])
    S.formations  = cfg.formations  || []
    S.restaurants = cfg.restaurants || []
    S.summaryWeek = cfg.summaryWeek || 'w0'
    S.meals       = meals   || {}
    S.history     = history || {}
  } catch(e) {
    const raw = localStorage.getItem('repas_data')
    if (raw) { const d = JSON.parse(raw); S = { ...S, ...d } }
  }
}

async function save() {
  const config = { formations: S.formations, restaurants: S.restaurants, summaryWeek: S.summaryWeek }
  try {
    await fetch('/api/config',  { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(config) })
    await fetch('/api/meals',   { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(S.meals) })
    await fetch('/api/history', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(S.history) })
  } catch(e) {
    localStorage.setItem('repas_data', JSON.stringify(S))
  }
}

// ─── HISTORIQUE : ARCHIVAGE AUTO ─────────────────────────────────────────────
// Appelé quand une formation est terminée (endDate < aujourd'hui)
// Archive les repas dans l'historique par restaurateur puis supprime de meals
function archiveFormation(f) {
  if (!S.meals[f.id]) return
  if (!S.history) S.history = {}

  Object.entries(S.meals[f.id]).forEach(([date, restos]) => {
    Object.entries(restos).forEach(([resto, qty]) => {
      if (!qty) return
      if (!S.history[resto]) S.history[resto] = { total: 0, byFormation: {}, byMonth: {} }
      const H = S.history[resto]
      H.total = (H.total || 0) + qty
      // Par formation
      if (!H.byFormation[f.id]) H.byFormation[f.id] = { name: f.name, color: f.color, total: 0, startDate: f.startDate, endDate: f.endDate }
      H.byFormation[f.id].total += qty
      // Par mois
      const month = date.slice(0, 7)
      H.byMonth[month] = (H.byMonth[month] || 0) + qty
    })
  })
}

function cleanPastFormations() {
  const t = today()
  const toArchive = S.formations.filter(f => parse(f.endDate) < t)
  if (!toArchive.length) return
  toArchive.forEach(f => {
    archiveFormation(f)
    delete S.meals[f.id]
  })
  S.formations = S.formations.filter(f => parse(f.endDate) >= t)
  save()
}

// ─── DATE UTILS ──────────────────────────────────────────────────────────────
function today()       { const d = new Date(); d.setHours(0,0,0,0); return d }
function parse(s)      { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d) }
function fmt(d)        { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}` }
function fmtDisplay(s) { const [y,m,d] = s.split('-'); return `${d}/${m}/${y}` }
function fmtShort(s)   { const [,m,d] = s.split('-'); return `${d}/${m}` }
function fmtMonth(s)   { const [y,m] = s.split('-'); const n=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc']; return `${n[parseInt(m)-1]} ${y}` }
function dayName(s)    { return ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'][parse(s).getDay()] }
function dateStamp()   { return fmt(today()).replace(/-/g,'') }
function esc(s)        { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
const DAY_NAMES = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam']

function getFormationDates(f) {
  const start = parse(f.startDate), end = parse(f.endDate)
  const result = []
  const cur = new Date(start)
  while (cur <= end) {
    if (cur.getDay() !== 0) result.push(fmt(cur))
    cur.setDate(cur.getDate() + 1)
  }
  return result
}

function getDaysLabel(startDate, endDate) {
  if (!startDate || !endDate) return ''
  const start = parse(startDate), end = parse(endDate)
  if (start > end) return ''
  const days = new Set()
  const cur = new Date(start)
  while (cur <= end) {
    if (cur.getDay() !== 0) days.add(cur.getDay())
    cur.setDate(cur.getDate() + 1)
  }
  const sorted = [...days].sort((a,b) => a-b)
  const count = getFormationDates({ startDate, endDate }).length
  return `📅 ${sorted.map(d => DAY_NAMES[d]).join(', ')} — ${count} jour(s) de formation`
}

function getMondayOf(offset) {
  const d = today()
  const dow = d.getDay() === 0 ? 7 : d.getDay()
  const mon = new Date(d)
  mon.setDate(d.getDate() - dow + 1 + offset * 7)
  mon.setHours(0,0,0,0)
  return mon
}

function weekDates(offset = 0) {
  const mon = getMondayOf(offset)
  const dates = []
  for (let i = 0; i < 6; i++) {
    const dd = new Date(mon); dd.setDate(mon.getDate() + i)
    if (dd.getDay() !== 0) dates.push(fmt(dd))
  }
  return dates
}

function weekBounds(offset) {
  const mon = getMondayOf(offset)
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6); sun.setHours(23,59,59,999)
  return { from: mon, to: sun }
}

function weekLabel(offset = 0) {
  const dates = weekDates(offset)
  if (offset === 0) return 'Cette semaine'
  return `Sem. du ${fmtShort(dates[0])} au ${fmtShort(dates[dates.length-1])}`
}

function isFormationActiveThisWeek(f, offset) {
  const { from, to } = weekBounds(offset)
  return parse(f.startDate) <= to && parse(f.endDate) >= from
}

// ─── MEALS ───────────────────────────────────────────────────────────────────
function getMeal(fid, date, resto) { return (S.meals[fid]?.[date]?.[resto]) || 0 }
function setMeal(fid, date, resto, val) {
  if (!S.meals[fid]) S.meals[fid] = {}
  if (!S.meals[fid][date]) S.meals[fid][date] = {}
  S.meals[fid][date][resto] = Math.max(0, val)
  save()
  const id = `cnt-${fid}-${date}-${resto}`
  const el = document.getElementById(id)
  if (el) {
    el.textContent = S.meals[fid][date][resto]
    el.parentElement.className = 'counter' + (S.meals[fid][date][resto] === 0 ? ' zero' : '')
  }
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  const active = document.querySelector('.tab.active')?.id?.replace('tab-','') || 'saisie'
  if (active === 'saisie')        renderSaisie()
  if (active === 'recap')         renderRecap()
  if (active === 'historique')    renderHistorique()
  if (active === 'formations')    renderFormations()
  if (active === 'restaurateurs') renderRestaurateurs()
}

// ─── PAGE SAISIE ─────────────────────────────────────────────────────────────
function renderSaisie() {
  const el = document.getElementById('page-saisie')
  const wDates = weekDates(currentWeekOffset)
  const activeFormations = S.formations.filter(f => isFormationActiveThisWeek(f, currentWeekOffset))

  let h = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;background:var(--card);padding:10px 14px;border-radius:var(--radius);border:1px solid var(--border)">`
  h += `<button class="wf-btn" onclick="changeWeek(-1)">◀</button>`
  h += `<span style="font-weight:600;font-size:0.9rem">${weekLabel(currentWeekOffset)}</span>`
  h += `<button class="wf-btn" onclick="changeWeek(1)">▶</button>`
  h += `</div>`

  if (!activeFormations.length) {
    h += '<div class="empty">Aucune formation cette semaine</div>'
    el.innerHTML = h; return
  }

  activeFormations.forEach(f => {
    const restos = f.restaurants || []
    if (!restos.length) return
    const fDates = getFormationDates(f).filter(d => wDates.includes(d))
    if (!fDates.length) return

    h += `<div class="card" style="border-top:4px solid ${f.color}">`
    h += `<div class="card-title" style="color:${f.color}">${esc(f.name)}</div>`
    h += `<div style="overflow-x:auto">`
    h += `<table class="meal-table"><thead><tr><th>Restaurateur</th>`
    fDates.forEach(d => { h += `<th>${dayName(d)}<br><small>${fmtShort(d)}</small></th>` })
    h += `<th>Total</th></tr></thead><tbody>`

    restos.forEach(r => {
      h += `<tr><td style="text-align:left;padding-left:10px;font-weight:500">${esc(r)}</td>`
      let total = 0
      fDates.forEach(d => {
        const v = getMeal(f.id, d, r)
        total += v
        const cntId = `cnt-${f.id}-${d}-${r}`
        h += `<td><div class="counter${v===0?' zero':''}">
          <button class="minus" onclick="setMeal('${f.id}','${d}','${r}',getMeal('${f.id}','${d}','${r}')-1)">−</button>
          <span id="${cntId}">${v}</span>
          <button class="plus"  onclick="setMeal('${f.id}','${d}','${r}',getMeal('${f.id}','${d}','${r}')+1)">+</button>
        </div></td>`
      })
      h += `<td><strong>${total}</strong></td></tr>`
    })

    h += `</tbody></table></div></div>`
  })

  el.innerHTML = h
}

function changeWeek(dir) { currentWeekOffset += dir; renderSaisie() }

// ─── PAGE RÉCAP ──────────────────────────────────────────────────────────────
function renderRecap() {
  const el = document.getElementById('page-recap')
  if (!S.formations.length) { el.innerHTML = '<div class="empty">Aucune formation configurée</div>'; return }

  const filters = [
    { key: 'w0', label: 'Cette semaine', offset: 0 },
    { key: 'w1', label: 'Sem. +1',       offset: 1 },
    { key: 'w2', label: 'Sem. +2',       offset: 2 },
    { key: 'w3', label: 'Sem. +3',       offset: 3 },
    { key: 'w4', label: 'Sem. +4',       offset: 4 },
    { key: 'all', label: 'Tout',         offset: null },
  ]

  const activeFilter = filters.find(f => f.key === S.summaryWeek) || filters[0]
  const bounds = activeFilter.offset !== null ? weekBounds(activeFilter.offset) : null

  const formations = S.formations.filter(f => {
    if (!bounds) return true
    return parse(f.startDate) <= bounds.to && parse(f.endDate) >= bounds.from
  })

  let h = `<div class="filter-bar no-print">`
  filters.forEach(flt => {
    h += `<button class="filter-btn${S.summaryWeek === flt.key ? ' active' : ''}" onclick="S.summaryWeek='${flt.key}';renderRecap()">${flt.label}</button>`
  })
  h += `<button class="btn btn-primary" style="margin-left:auto" onclick="window.print()">🖨️ Imprimer</button>`
  h += `</div>`

  if (!formations.length) {
    h += `<div class="empty">Aucune formation sur cette période</div>`
    el.innerHTML = h; return
  }

  formations.forEach(f => {
    const restos = f.restaurants || []
    const fDates = getFormationDates(f).filter(d => {
      if (!bounds) return true
      const dp = parse(d)
      return dp >= bounds.from && dp <= bounds.to
    })
    if (!fDates.length) return

    h += `<div style="background:var(--card);border-radius:var(--radius);margin-bottom:16px;overflow:hidden;box-shadow:0 1px 4px #0001;border:1px solid var(--border)">`
    h += `<div style="background:${f.color};color:#fff;padding:10px 14px;display:flex;justify-content:space-between;align-items:center">`
    h += `<strong>${esc(f.name)}</strong><span style="font-size:0.8rem">${fmtDisplay(f.startDate)} → ${fmtDisplay(f.endDate)}</span></div>`

    if (!restos.length) {
      h += `<div style="padding:12px 14px;font-size:0.85rem;color:var(--muted);font-style:italic">Aucun restaurateur assigné</div></div>`
      return
    }

    h += `<div style="overflow-x:auto"><table class="recap-table"><thead><tr>`
    h += `<th>Restaurateur</th>`
    fDates.forEach(d => { h += `<th>${dayName(d)}<br>${fmtShort(d)}</th>` })
    h += `<th>Total</th></tr></thead><tbody>`

    const dayTotals = {}
    fDates.forEach(d => { dayTotals[d] = 0 })
    let grandTotal = 0

    restos.forEach(r => {
      let rowTotal = 0
      let row = `<tr><td>${esc(r)}</td>`
      fDates.forEach(d => {
        const v = getMeal(f.id, d, r)
        rowTotal += v; dayTotals[d] += v
        row += `<td>${v > 0 ? `<strong>${v}</strong>` : '<span style="color:var(--muted)">—</span>'}</td>`
      })
      grandTotal += rowTotal
      row += `<td>${rowTotal}</td></tr>`
      h += row
    })

    h += `<tr class="total-row"><td>Total</td>`
    fDates.forEach(d => { h += `<td>${dayTotals[d] > 0 ? dayTotals[d] : '—'}</td>` })
    h += `<td>${grandTotal}</td></tr>`
    h += `</tbody></table></div></div>`
  })

  el.innerHTML = h
}

// ─── PAGE HISTORIQUE ─────────────────────────────────────────────────────────
function renderHistorique() {
  const el = document.getElementById('page-historique')
  const H = S.history || {}

  // Calcul des repas en cours (formations actives)
  const liveByResto = {}
  S.formations.forEach(f => {
    const restos = f.restaurants || []
    restos.forEach(r => {
      if (!liveByResto[r]) liveByResto[r] = 0
      getFormationDates(f).forEach(d => { liveByResto[r] += getMeal(f.id, d, r) })
    })
  })

  // Fusion historique + en cours pour les stats globales
  const allRestos = new Set([...Object.keys(H), ...Object.keys(liveByResto)])
  const totals = {}
  allRestos.forEach(r => {
    totals[r] = (H[r]?.total || 0) + (liveByResto[r] || 0)
  })

  const grandTotal = Object.values(totals).reduce((a,b) => a+b, 0)
  const maxVal = Math.max(...Object.values(totals), 1)

  if (!allRestos.size) {
    el.innerHTML = '<div class="empty">Aucun historique disponible</div>'; return
  }

  // Tri par total décroissant
  const sorted = [...allRestos].sort((a,b) => (totals[b]||0) - (totals[a]||0))

  let h = `<div class="no-print" style="display:flex;justify-content:flex-end;margin-bottom:12px">
    <button class="btn btn-primary" onclick="window.print()">🖨️ Imprimer</button>
    <button class="btn btn-danger" style="margin-left:8px" onclick="resetHistory()">🗑️ Effacer l'historique</button>
  </div>`

  // Stats globales
  h += `<div class="stat-grid">`
  h += `<div class="stat-card"><div class="stat-val">${grandTotal}</div><div class="stat-lbl">Repas commandés au total</div></div>`
  h += `<div class="stat-card"><div class="stat-val">${sorted.length}</div><div class="stat-lbl">Restaurateurs actifs</div></div>`
  if (sorted.length) {
    h += `<div class="stat-card"><div class="stat-val">${Math.round(grandTotal / sorted.length)}</div><div class="stat-lbl">Repas moyens / restaurateur</div></div>`
  }
  h += `</div>`

  // Tableau récap global
  h += `<div class="card">
    <div class="card-title">📊 Total par restaurateur</div>
    <table class="recap-table"><thead><tr>
      <th style="text-align:left">Restaurateur</th>
      <th>En cours</th>
      <th>Archivés</th>
      <th>Total</th>
      <th style="min-width:100px">Part</th>
    </tr></thead><tbody>`

  sorted.forEach(r => {
    const archived = H[r]?.total || 0
    const live     = liveByResto[r] || 0
    const total    = archived + live
    const pct      = grandTotal > 0 ? Math.round(total / grandTotal * 100) : 0
    h += `<tr>
      <td>${esc(r)}</td>
      <td>${live > 0 ? `<strong>${live}</strong>` : '—'}</td>
      <td>${archived > 0 ? archived : '—'}</td>
      <td><strong>${total}</strong></td>
      <td>
        <div style="display:flex;align-items:center;gap:6px">
          <div class="progress-bar" style="flex:1"><div class="progress-fill" style="width:${Math.round(total/maxVal*100)}%"></div></div>
          <span style="font-size:0.78rem;color:var(--muted);min-width:30px">${pct}%</span>
        </div>
      </td>
    </tr>`
  })
  h += `<tr class="total-row"><td>Total</td><td>${Object.values(liveByResto).reduce((a,b)=>a+b,0)||'—'}</td><td>${Object.values(H).reduce((a,r)=>a+(r.total||0),0)||'—'}</td><td>${grandTotal}</td><td></td></tr>`
  h += `</tbody></table></div>`

  // Détail par restaurateur
  h += `<div class="card-title" style="padding:4px 0 8px">🔍 Détail par restaurateur</div>`
  sorted.forEach(r => {
    const histo = H[r] || {}
    const live  = liveByResto[r] || 0
    const total = (histo.total || 0) + live
    h += `<div class="histo-card">`
    h += `<div class="histo-header"><strong>🍴 ${esc(r)}</strong><span>${total} repas au total</span></div>`
    h += `<div class="histo-body">`

    // Formations en cours
    const liveFormations = S.formations.filter(f => (f.restaurants||[]).includes(r))
    if (liveFormations.length) {
      h += `<div style="font-size:0.8rem;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em">Formations en cours</div>`
      liveFormations.forEach(f => {
        let fTotal = 0
        getFormationDates(f).forEach(d => { fTotal += getMeal(f.id, d, r) })
        h += `<div class="histo-row">
          <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${f.color};margin-right:6px"></span>${esc(f.name)}</span>
          <span style="color:var(--primary);font-weight:600">${fTotal} repas</span>
        </div>`
      })
    }

    // Formations archivées
    const byF = histo.byFormation || {}
    if (Object.keys(byF).length) {
      h += `<div style="font-size:0.8rem;font-weight:600;color:var(--muted);margin:10px 0 6px;text-transform:uppercase;letter-spacing:.05em">Formations archivées</div>`
      Object.values(byF).sort((a,b) => b.endDate?.localeCompare(a.endDate||'')||0).forEach(f => {
        h += `<div class="histo-row">
          <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${f.color||'#94a3b8'};margin-right:6px"></span>${esc(f.name)} <small style="color:var(--muted)">(${fmtDisplay(f.startDate||'')} → ${fmtDisplay(f.endDate||'')})</small></span>
          <span style="font-weight:600">${f.total} repas</span>
        </div>`
      })
    }

    // Par mois
    const byM = histo.byMonth || {}
    if (Object.keys(byM).length) {
      h += `<div style="font-size:0.8rem;font-weight:600;color:var(--muted);margin:10px 0 6px;text-transform:uppercase;letter-spacing:.05em">Par mois (archivés)</div>`
      Object.entries(byM).sort((a,b) => b[0].localeCompare(a[0])).forEach(([month, qty]) => {
        h += `<div class="histo-row"><span>📅 ${fmtMonth(month)}</span><span style="font-weight:600">${qty} repas</span></div>`
      })
    }

    h += `<div style="margin-top:10px;padding-top:10px;border-top:2px solid var(--border);display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:0.85rem;font-weight:700">Total cumulé</span>
      <span class="histo-total">${total} repas</span>
    </div>`
    h += `</div></div>`
  })

  el.innerHTML = h
}

function resetHistory() {
  if (!confirm('Effacer tout l\'historique archivé ? Les formations en cours ne sont pas affectées.')) return
  S.history = {}; save(); renderHistorique(); showToast('🗑️ Historique effacé')
}

// ─── PAGE FORMATIONS ─────────────────────────────────────────────────────────
function renderFormations() {
  const el = document.getElementById('page-formations')
  const t = today()

  let h = `<div class="card">
    <div class="card-title">🎓 Formations</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
      <button class="btn btn-primary" onclick="openFormation(null)">+ Nouvelle formation</button>
      <button class="btn" style="background:#f1f5f9" onclick="triggerImportCSV()">📂 Importer CSV</button>
    </div>
    <div class="info-box no-print">
      Format CSV : <strong>Nom;Couleur;DateDébut;DateFin</strong><br>
      Dates au format JJ/MM/AAAA — Les jours sont calculés automatiquement
    </div>
    <div id="import-preview"></div>`

  if (!S.formations.length) {
    h += '<div class="empty">Aucune formation</div>'
  } else {
    const sorted = [...S.formations].sort((a,b) => {
      const aStart = parse(a.startDate), bStart = parse(b.startDate)
      const aEnd = parse(a.endDate), bEnd = parse(b.endDate)
      const aActive = aStart <= t && aEnd >= t
      const bActive = bStart <= t && bEnd >= t
      if (aActive && !bActive) return -1
      if (!aActive && bActive) return 1
      return aStart - bStart
    })

    sorted.forEach(f => {
      const fStart = parse(f.startDate), fEnd = parse(f.endDate)
      let statusClass = 'badge-future', statusLabel = 'À venir'
      if (fStart <= t && fEnd >= t) { statusClass = 'badge-active'; statusLabel = 'En cours' }
      const restos = f.restaurants || []
      const datesCount = getFormationDates(f).length

      h += `<div class="f-card">
        <div class="f-card-header">
          <div class="f-dot" style="background:${f.color}"></div>
          <div style="flex:1">
            <strong>${esc(f.name)}</strong>
            <span class="badge-status ${statusClass}">${statusLabel}</span>
            <div style="font-size:0.8rem;color:var(--muted);margin-top:2px">
              ${fmtDisplay(f.startDate)} → ${fmtDisplay(f.endDate)} · ${datesCount} jour(s)
            </div>
          </div>
          <button class="btn-sm btn-edit" onclick="openFormation('${f.id}')">✏️</button>
          <button class="btn-sm btn-del"  onclick="delFormation('${f.id}')">🗑️</button>
        </div>
        <div class="f-card-body">
          <div class="resto-tags">`
      S.restaurants.forEach(r => {
        const active = restos.includes(r)
        h += `<span class="tag${active?' active':''}" onclick="toggleResto('${f.id}','${esc(r)}')">${esc(r)}</span>`
      })
      if (!S.restaurants.length) h += `<span style="color:var(--muted);font-size:0.8rem">Aucun restaurateur configuré</span>`
      h += `</div></div></div>`
    })
  }
  h += `</div>
  <div class="card" style="border-color:#fecaca">
    <div class="card-title" style="color:var(--danger)">⚠️ Zone de danger</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-danger" onclick="resetMeals()">🗑️ Effacer les repas</button>
      <button class="btn btn-danger" onclick="resetAll()">🔥 Tout réinitialiser</button>
    </div>
  </div>`
  el.innerHTML = h
}

// ─── MODAL FORMATION ─────────────────────────────────────────────────────────
function previewDays() {
  const start = document.getElementById('f-start').value
  const end   = document.getElementById('f-end').value
  const prev  = document.getElementById('days-preview')
  if (start && end && start <= end) {
    prev.style.display = 'block'
    prev.textContent = getDaysLabel(start, end)
  } else {
    prev.style.display = 'none'
  }
}

function openFormation(id) {
  editingFormationId = id
  document.getElementById('modal-formation-title').textContent = id ? 'Modifier la formation' : 'Nouvelle formation'
  document.getElementById('days-preview').style.display = 'none'
  if (id) {
    const f = S.formations.find(x => x.id === id)
    if (!f) return
    document.getElementById('f-name').value  = f.name
    document.getElementById('f-color').value = f.color || '#2563eb'
    document.getElementById('f-start').value = f.startDate
    document.getElementById('f-end').value   = f.endDate
    previewDays()
  } else {
    document.getElementById('f-name').value  = ''
    document.getElementById('f-color').value = '#2563eb'
    document.getElementById('f-start').value = ''
    document.getElementById('f-end').value   = ''
  }
  document.getElementById('modal-formation').classList.add('open')
}

function saveFormation() {
  const name  = document.getElementById('f-name').value.trim()
  const start = document.getElementById('f-start').value
  const end   = document.getElementById('f-end').value
  const color = document.getElementById('f-color').value
  if (!name || !start || !end) { showToast('⚠️ Remplissez tous les champs'); return }
  if (start > end) { showToast('⚠️ Date de fin avant début'); return }
  if (editingFormationId) {
    const f = S.formations.find(x => x.id === editingFormationId)
    if (f) { f.name = name; f.color = color; f.startDate = start; f.endDate = end }
  } else {
    S.formations.push({
      id: 'f_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
      name, color, startDate: start, endDate: end, restaurants: []
    })
  }
  save(); render(); closeModal('modal-formation')
  showToast(editingFormationId ? '✅ Formation modifiée' : '✅ Formation ajoutée')
}

function delFormation(id) {
  if (!confirm('Supprimer cette formation ? Les repas saisis seront archivés dans l\'historique.')) return
  const f = S.formations.find(x => x.id === id)
  if (f) { archiveFormation(f); delete S.meals[id] }
  S.formations = S.formations.filter(x => x.id !== id)
  save(); render(); showToast('🗑️ Formation supprimée et archivée')
}

function toggleResto(fid, r) {
  const f = S.formations.find(x => x.id === fid)
  if (!f) return
  if (!f.restaurants) f.restaurants = []
  if (f.restaurants.includes(r)) f.restaurants = f.restaurants.filter(x => x !== r)
  else f.restaurants.push(r)
  save(); renderFormations()
}

// ─── IMPORT CSV ──────────────────────────────────────────────────────────────
function triggerImportCSV() {
  const input = document.createElement('input')
  input.type = 'file'; input.accept = '.csv,.txt'
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return
    const reader = new FileReader()
    reader.onload = ev => parseFormationsCSV(ev.target.result)
    reader.readAsText(file, 'UTF-8')
  }
  input.click()
}

function parseFormationsCSV(text) {
  text = text.replace(/^\uFEFF/, '')
  const lines = text.split('\n').map(l => l.trim()).filter(l => l)
  lines.shift()
  let added = 0, skipped = 0
  lines.forEach(line => {
    const parts = line.split(';').map(s => s.trim())
    const [nom, couleur, dateDebut, dateFin] = parts
    if (!nom || !dateDebut || !dateFin) { skipped++; return }
    const existe = S.formations.find(f => f.name.toLowerCase() === nom.toLowerCase())
    if (existe) { skipped++; return }
    const toISO = d => {
      const p = d.split('/')
      return p.length !== 3 ? null : `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`
    }
    const start = toISO(dateDebut), end = toISO(dateFin)
    if (!start || !end || start > end) { skipped++; return }
    S.formations.push({
      id: 'f_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
      name: nom,
      color: couleur && couleur.startsWith('#') ? couleur : '#2563eb',
      startDate: start, endDate: end, restaurants: []
    })
    added++
  })
  save(); render()
  const preview = document.getElementById('import-preview')
  if (preview) preview.innerHTML = `<div style="padding:10px;background:#f0fdf4;border-radius:8px;color:var(--success);font-size:0.85rem;margin-bottom:8px">
    ✅ ${added} formation(s) importée(s)${skipped ? ` — ${skipped} ignorée(s)` : ''}</div>`
  showToast(`✅ ${added} formation(s) importée(s)`)
}

// ─── RESTAURATEURS CRUD ──────────────────────────────────────────────────────
function addResto() {
  const v = document.getElementById('new-resto').value.trim()
  if (!v) return
  if (S.restaurants.includes(v)) { showToast('⚠️ Déjà existant'); return }
  S.restaurants.push(v)
  save(); renderRestaurateurs()
  document.getElementById('new-resto').value = ''
  showToast('✅ Restaurateur ajouté')
}

function openEditResto(oldName) {
  editingRestoOldName = oldName
  document.getElementById('edit-resto-input').value = oldName
  document.getElementById('modal-resto').classList.add('open')
}

function saveResto() {
  const newName = document.getElementById('edit-resto-input').value.trim()
  if (!newName) { showToast('⚠️ Nom vide'); return }
  if (newName !== editingRestoOldName && S.restaurants.includes(newName)) {
    showToast('⚠️ Ce nom existe déjà'); return
  }
  const idx = S.restaurants.indexOf(editingRestoOldName)
  if (idx === -1) return
  S.restaurants[idx] = newName
  S.formations.forEach(f => {
    if (!f.restaurants) return
    const ri = f.restaurants.indexOf(editingRestoOldName)
    if (ri !== -1) f.restaurants[ri] = newName
  })
  Object.keys(S.meals).forEach(fid => {
    Object.keys(S.meals[fid]).forEach(date => {
      if (S.meals[fid][date][editingRestoOldName] !== undefined) {
        S.meals[fid][date][newName] = S.meals[fid][date][editingRestoOldName]
        delete S.meals[fid][date][editingRestoOldName]
      }
    })
  })
  // Mettre à jour l'historique
  if (S.history[editingRestoOldName]) {
    S.history[newName] = S.history[editingRestoOldName]
    delete S.history[editingRestoOldName]
  }
  save(); render(); closeModal('modal-resto')
  showToast('✅ Restaurateur modifié')
}

function delResto(r) {
  if (!confirm(`Supprimer "${r}" ?`)) return
  S.restaurants = S.restaurants.filter(x => x !== r)
  S.formations.forEach(f => { f.restaurants = (f.restaurants || []).filter(x => x !== r) })
  save(); render(); showToast('🗑️ Restaurateur supprimé')
}

function showToast(msg, dur = 2500) {

  t.textContent = msg; t.classList.add('show')
  setTimeout(() => t.classList.remove('show'), dur)
}

// ─── EXPORT ──────────────────────────────────────────────────────────────────
function exportCSV() {
  const filters = [
    { key: 'w0', offset: 0 }, { key: 'w1', offset: 1 }, { key: 'w2', offset: 2 },
    { key: 'w3', offset: 3 }, { key: 'w4', offset: 4 }, { key: 'all', offset: null }
  ]
  const activeFilter = filters.find(f => f.key === S.summaryWeek) || filters[0]
  const bounds = activeFilter.offset !== null ? weekBounds(activeFilter.offset) : null

  let datesSet = new Set()
  S.formations.forEach(f => {
    getFormationDates(f).forEach(d => {
      if (!bounds) { datesSet.add(d); return }
      const dp = parse(d)
      if (dp >= bounds.from && dp <= bounds.to) datesSet.add(d)
    })
  })
  const allDates = [...datesSet].sort()
  if (!allDates.length) { showToast('⚠️ Aucune donnée'); return }

  let csv = 'Restaurateur;' + allDates.map(d => `${dayName(d)} ${fmtShort(d)}`).join(';') + ';Total\n'
  S.restaurants.forEach(r => {
    let row = [r], total = 0
    allDates.forEach(d => {
      let sum = 0
      S.formations.forEach(f => { if ((f.restaurants||[]).includes(r)) sum += getMeal(f.id, d, r) })
      total += sum; row.push(sum)
    })
    row.push(total); csv += row.join(';') + '\n'
  })
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' })
  const a = document.createElement('a')
  a.href = URL.createObjectURL(blob); a.download = `repas-${dateStamp()}.csv`
  a.click(); URL.revokeObjectURL(a.href); showToast('📊 CSV exporté')
}

function exportAll() {
  const blob = new Blob([JSON.stringify({ formations: S.formations, restaurants: S.restaurants, meals: S.meals, history: S.history }, null, 2)], { type: 'application/json' })
  const a = document.createElement('a')
  a.href = URL.createObjectURL(blob); a.download = `repas-backup-${dateStamp()}.json`
  a.click(); URL.revokeObjectURL(a.href); showToast('📦 Export JSON effectué')
}

function resetMeals() {
  if (!confirm('Effacer TOUS les repas saisis ?')) return
  S.meals = {}; save(); render(); showToast('🗑️ Repas effacés')
}

function resetAll() {
  if (!confirm('Tout réinitialiser ? Cette action est irréversible.')) return
  S = { formations: [], restaurants: [], meals: {}, summaryWeek: 'w0', history: {} }
  save(); render(); showToast('🔥 Réinitialisé')
}

// ─── START ───────────────────────────────────────────────────────────────────
init()
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js')
  }
</script>
