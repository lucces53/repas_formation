<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Repas Formation</title>
  <meta name="theme-color" content="#2563eb" />
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Repas Formation">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #2563eb; --primary-light: #eff6ff;
      --success: #16a34a; --danger: #dc2626;
      --bg: #f1f5f9; --card: #ffffff; --border: #e2e8f0;
      --text: #1e293b; --muted: #64748b; --radius: 10px;
    }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .topbar { background: var(--primary); color: #fff; padding: 12px 16px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px #0002; }
    .topbar h1 { font-size: 1.1rem; flex: 1; }
    .topbar button { background: #ffffff22; border: none; color: #fff; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
    .topbar button:hover { background: #ffffff44; }
    .tabs { display: flex; background: #fff; border-bottom: 1px solid var(--border); overflow-x: auto; position: sticky; top: 49px; z-index: 99; }
    .tab { padding: 12px 16px; cursor: pointer; font-size: 0.85rem; white-space: nowrap; border-bottom: 3px solid transparent; transition: all .2s; }
    .tab:hover { background: var(--primary-light); }
    .tab.active { border-bottom-color: var(--primary); color: var(--primary); font-weight: 600; }
    .page { display: none; padding: 16px; max-width: 900px; margin: 0 auto; }
    .page.active { display: block; }
    .card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; margin-bottom: 16px; }
    .card-title { font-weight: 700; font-size: 1rem; margin-bottom: 12px; }
    label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--muted); margin-bottom: 4px; margin-top: 10px; }
    input, select, textarea { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.9rem; font-family: inherit; background: #fff; color: var(--text); }
    input:focus, select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px #2563eb22; }
    .btn { padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; font-size: 0.85rem; font-family: inherit; background: #fff; color: var(--text); transition: all .15s; }
    .btn:hover { background: #f8fafc; }
    .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-danger { background: var(--danger); color: #fff; border-color: var(--danger); }
    .btn-danger:hover { background: #b91c1c; }
    .btn-sm { padding: 4px 10px; font-size: 0.78rem; border-radius: 5px; border: 1px solid var(--border); cursor: pointer; background: #fff; }
    .btn-edit { color: var(--primary); }
    .btn-del  { color: var(--danger); }
    .resto-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .resto-item:last-child { border-bottom: none; }
    .formation-item { display: flex; align-items: flex-start; gap: 8px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .formation-item:last-child { border-bottom: none; }
    .formation-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
    .badge-active   { background: #dcfce7; color: #15803d; }
    .badge-upcoming { background: #fef9c3; color: #854d0e; }
    .modal-overlay { position: fixed; inset: 0; background: #0007; display: none; align-items: center; justify-content: center; z-index: 200; padding: 16px; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: var(--radius); padding: 20px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
    .modal h3 { margin-bottom: 16px; font-size: 1.1rem; }
    .modal-footer { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
    .form-row { display: flex; gap: 10px; }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1e293b; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 0.88rem; opacity: 0; transition: all .3s; z-index: 999; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
    .filter-btn { padding: 6px 12px; border: 1px solid var(--border); border-radius: 20px; background: #fff; cursor: pointer; font-size: 0.82rem; }
    .filter-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .empty { text-align: center; color: var(--muted); padding: 40px 20px; font-size: 0.9rem; }
    .info-box { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px; padding: 10px 14px; font-size: 0.85rem; color: var(--primary); margin-bottom: 12px; }
    .meal-table { width: 100%; border-collapse: collapse; min-width: 400px; }
    .meal-table th { background: var(--primary); color: #fff; padding: 8px; text-align: center; }
    .meal-table td { padding: 8px; text-align: center; border-bottom: 1px solid var(--border); }
    .counter { display: flex; align-items: center; gap: 6px; justify-content: center; }
    .counter button { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border); background: #fff; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .counter button:hover { background: var(--primary-light); }
    .counter span { min-width: 24px; text-align: center; font-weight: 600; }
    .histo-card { border-radius: var(--radius); border: 1px solid var(--border); background: #fff; overflow: hidden; margin-bottom: 12px; }
    .histo-header { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; background:var(--primary); color:#fff; }
    .histo-header strong { font-size:0.95rem; }
    .histo-header span { font-size:0.8rem; opacity:0.85; }
    .histo-body { padding:12px 14px; }
    .histo-row { display:flex; align-items:center; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--border); font-size:0.88rem; }
    .histo-row:last-child { border-bottom:none; }
    .histo-total { font-weight:700; color:white; font-size:1.1rem; }
    .stat-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:12px; margin-bottom:16px; }
    .stat-card { background:#fff; border:1px solid var(--border); border-radius:var(--radius); padding:16px; text-align:center; }
    .stat-card .stat-val { font-size:2rem; font-weight:800; color:var(--primary); }
    .stat-card .stat-lbl { font-size:0.8rem; color:var(--muted); margin-top:4px; }
    .livraison-box { background:#f0fdf4; border:1px solid #bbf7d0; border-radius:8px; padding:10px 14px; margin-top:8px; }
    .surplace-box  { background:#f8fafc; border:1px solid #e2e8f0; border-radius:8px; padding:10px 14px; margin-top:8px; }
    .livraison-badge { display:inline-flex; align-items:center; gap:4px; background:#dcfce7; color:#15803d; border-radius:20px; padding:2px 10px; font-size:0.78rem; font-weight:600; }
    .surplace-badge  { display:inline-flex; align-items:center; gap:4px; background:#f1f5f9; color:#475569; border-radius:20px; padding:2px 10px; font-size:0.78rem; font-weight:600; }
    .toggle-switch { display:flex; align-items:center; gap:8px; cursor:pointer; }
    .toggle-switch input[type=checkbox] { width:16px; height:16px; cursor:pointer; accent-color: var(--primary); }
    .adresse-item { display:flex; align-items:center; gap:6px; margin-bottom:6px; }
    .adresse-item input { flex:1; }
    /* Recap */
    .recap-resto-card { border-radius:var(--radius); border:1px solid var(--border); background:#fff; overflow:hidden; margin-bottom:16px; }
    .recap-resto-header { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; background:var(--primary); color:#fff; }
    .recap-resto-header strong { font-size:1rem; }
    .recap-resto-total { font-size:0.9rem; opacity:0.9; }
    .recap-formation-block { border-bottom:1px solid var(--border); padding:10px 16px; }
    .recap-formation-block:last-child { border-bottom:none; }
    .recap-formation-title { display:flex; align-items:center; gap:8px; font-weight:600; font-size:0.9rem; margin-bottom:8px; }
    .recap-date-row { display:flex; align-items:center; justify-content:space-between; padding:5px 0 5px 20px; font-size:0.85rem; border-bottom:1px solid #f1f5f9; }
    .recap-date-row:last-child { border-bottom:none; }
    .recap-mode { font-size:0.78rem; margin-top:2px; }
    @media print {
      .topbar, .tabs, .no-print { display:none !important; }
      .page { display:block !important; padding:0; }
      body { background:#fff; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <h1>🍽️ Repas Formation</h1>
  <button onclick="exportCSV()">📊 CSV</button>
  <button onclick="exportAll()">📦 Export</button>
</div>

<div class="tabs">
  <div class="tab active" id="tab-saisie"        onclick="showPage('saisie')">✏️ Saisie</div>
  <div class="tab"        id="tab-recap"          onclick="showPage('recap')">📊 Récap</div>
  <div class="tab"        id="tab-historique"     onclick="showPage('historique')">📦 Historique</div>
  <div class="tab"        id="tab-formations"     onclick="showPage('formations')">🎓 Formations</div>
  <div class="tab"        id="tab-restaurateurs"  onclick="showPage('restaurateurs')">🍴 Restaurateurs</div>
</div>

<div class="page active" id="page-saisie"></div>
<div class="page"        id="page-recap"></div>
<div class="page"        id="page-historique"></div>
<div class="page"        id="page-formations"></div>
<div class="page"        id="page-restaurateurs"></div>

<!-- Modal Formation -->
<div class="modal-overlay" id="modal-formation">
  <div class="modal">
    <h3 id="modal-formation-title">Nouvelle formation</h3>
    <label>Nom de la formation</label>
    <input id="f-name" placeholder="Ex: Formation React" />
    <label>Couleur</label>
    <input id="f-color" type="color" value="#2563eb" style="height:40px;padding:2px 6px" />
    <div class="form-row">
      <div style="flex:1"><label>Date début</label><input id="f-start" type="date" onchange="previewDays()" /></div>
      <div style="flex:1"><label>Date fin</label><input id="f-end" type="date" onchange="previewDays()" /></div>
    </div>
    <div id="days-preview" class="info-box" style="display:none;margin-top:10px"></div>
    <label>Restaurateurs associés</label>
    <div id="f-restos-list" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px"></div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="saveFormation()">Enregistrer</button>
      <button class="btn" style="background:#f1f5f9" onclick="closeModal('modal-formation')">Annuler</button>
    </div>
  </div>
</div>

<!-- Modal Restaurateur -->
<div class="modal-overlay" id="modal-resto">
  <div class="modal">
    <h3 id="modal-resto-title">Modifier le restaurateur</h3>
    <label>Nom</label>
    <input id="edit-resto-input" placeholder="Nom du restaurateur" />
    <div style="margin-top:12px">
      <label class="toggle-switch">
        <input type="checkbox" id="edit-resto-livraison" onchange="toggleLivraisonModal()" />
        <span>Propose la livraison</span>
      </label>
    </div>
    <div id="livraison-adresses-section" style="display:none;margin-top:12px">
      <label>Adresses de livraison</label>
      <div id="livraison-adresses-list"></div>
      <button class="btn" style="background:#f0fdf4;color:#15803d;margin-top:6px;width:100%" onclick="addAdresseModal()">+ Ajouter une adresse</button>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="saveResto()">Enregistrer</button>
      <button class="btn" style="background:#f1f5f9" onclick="closeModal('modal-resto')">Annuler</button>
    </div>
  </div>
</div>

<!-- Modal Livraison -->
<div class="modal-overlay" id="modal-livraison">
  <div class="modal">
    <h3>🚚 Mode de réception</h3>
    <p style="font-size:0.88rem;color:var(--muted);margin-bottom:16px" id="modal-livraison-desc"></p>

    <div style="display:flex;gap:10px;margin-bottom:16px">
      <button id="btn-mode-surplace" class="btn" style="flex:1;padding:14px;font-size:0.95rem" onclick="selectMode('surplace')">
        🏠 Sur place
      </button>
      <button id="btn-mode-livraison" class="btn" style="flex:1;padding:14px;font-size:0.95rem" onclick="selectMode('livraison')">
        🚚 Livraison
      </button>
    </div>

    <div id="livraison-options" style="display:none">
      <label>Adresse de livraison</label>
      <select id="modal-livraison-adresse"></select>
      <label>Commentaire (optionnel)</label>
      <input id="modal-livraison-comment" placeholder="Ex: Maison des situations" />
    </div>

    <div class="modal-footer">
      <button class="btn btn-primary" onclick="saveLivraison()">Confirmer</button>
      <button class="btn" style="background:#f1f5f9" onclick="closeModal('modal-livraison')">Annuler</button>
    </div>
  </div>
</div>

<!-- Import CSV hidden input -->
<input type="file" id="csv-import" accept=".csv" style="display:none" onchange="importCSV(event)" />

<div class="toast" id="toast"></div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
let S = { formations: [], restaurants: [], meals: {}, summaryWeek: 'w0', history: {}, livraisons: {} }
let editingFormationId = null
let editingRestoIndex  = null
let currentWeekOffset  = 0
let pendingLivraison   = null
let selectedMode       = null  // 'surplace' | 'livraison'

// ─── INIT ────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const [cfg, meals, history] = await Promise.all([
      fetch('/api/config').then(r => r.json()),
      fetch('/api/meals').then(r => r.json()),
      fetch('/api/history').then(r => r.json())
    ])
    S.formations  = cfg.formations  || []
    S.restaurants = cfg.restaurants || []
    S.summaryWeek = cfg.summaryWeek || 'w0'
    S.livraisons  = cfg.livraisons  || {}
    S.meals       = meals   || {}
    S.history     = history || {}
  } catch(e) {
    const raw = localStorage.getItem('repas_data')
    if (raw) S = { ...S, ...JSON.parse(raw) }
  }
  if (!S.livraisons) S.livraisons = {}
  cleanPastFormations()
  render()
}

// ─── SAVE ────────────────────────────────────────────────────────────────────
async function save() {
  const config = {
    formations:  S.formations,
    restaurants: S.restaurants,
    summaryWeek: S.summaryWeek,
    livraisons:  S.livraisons
  }
  try {
    await fetch('/api/config',  { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(config) })
    await fetch('/api/meals',   { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(S.meals) })
    await fetch('/api/history', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(S.history) })
  } catch(e) {
    localStorage.setItem('repas_data', JSON.stringify(S))
  }
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function restoName(r) { return typeof r === 'string' ? r : r.name }
function restoObj(r)  { return typeof r === 'string' ? { name: r, livraison: false, adresses: [] } : r }
function getRestos()  { return S.restaurants.map(restoObj) }

function getLivraison(fId, date, rName) {
  return S.livraisons?.[fId]?.[date]?.[rName] || null
}
function setLivraison(fId, date, rName, data) {
  if (!S.livraisons) S.livraisons = {}
  if (!S.livraisons[fId]) S.livraisons[fId] = {}
  if (!S.livraisons[fId][date]) S.livraisons[fId][date] = {}
  if (data === null) {
    delete S.livraisons[fId][date][rName]
  } else {
    S.livraisons[fId][date][rName] = data
  }
}

// ─── HISTORIQUE ──────────────────────────────────────────────────────────────
function archiveFormation(f) {
  if (!S.meals[f.id]) return
  if (!S.history) S.history = {}
  Object.entries(S.meals[f.id]).forEach(([date, restos]) => {
    Object.entries(restos).forEach(([resto, qty]) => {
      if (!qty) return
      if (!S.history[resto]) S.history[resto] = { total: 0, byFormation: {}, byMonth: {} }
      const H = S.history[resto]
      H.total = (H.total || 0) + qty
      if (!H.byFormation[f.id]) H.byFormation[f.id] = { name: f.name, color: f.color, total: 0, startDate: f.startDate, endDate: f.endDate }
      H.byFormation[f.id].total += qty
      const month = date.slice(0, 7)
      H.byMonth[month] = (H.byMonth[month] || 0) + qty
    })
  })
}

function cleanPastFormations() {
  const t = today()
  const toArchive = S.formations.filter(f => parse(f.endDate) < t)
  if (!toArchive.length) return
  toArchive.forEach(f => { archiveFormation(f); delete S.meals[f.id] })
  S.formations = S.formations.filter(f => parse(f.endDate) >= t)
  save()
}

// ─── DATE UTILS ──────────────────────────────────────────────────────────────
function today()       { const d = new Date(); d.setHours(0,0,0,0); return d }
function parse(s)      { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d) }
function fmt(d)        { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}` }
function fmtDisplay(s) { const [y,m,d] = s.split('-'); return `${d}/${m}/${y}` }
function fmtShort(s)   { const [,m,d] = s.split('-'); return `${d}/${m}` }
function fmtMonth(s)   { const [y,m] = s.split('-'); const n=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc']; return `${n[parseInt(m)-1]} ${y}` }
function dayName(s)    { return ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'][parse(s).getDay()] }
function dateStamp()   { return fmt(today()).replace(/-/g,'') }
function esc(s)        { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

function getFormationDates(f) {
  const start = parse(f.startDate), end = parse(f.endDate)
  const result = []
  const cur = new Date(start)
  while (cur <= end) {
    if (cur.getDay() !== 0) result.push(fmt(cur))
    cur.setDate(cur.getDate() + 1)
  }
  return result
}

function weekBounds(offset = 0) {
  const now = new Date(); now.setHours(0,0,0,0)
  const day = now.getDay()
  const monday = new Date(now); monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1) + offset * 7)
  const friday = new Date(monday); friday.setDate(monday.getDate() + 5)
  return { from: monday, to: friday }
}

// ─── MEALS ───────────────────────────────────────────────────────────────────
function getMeal(fId, date, resto) {
  return S.meals?.[fId]?.[date]?.[resto] || 0
}
function setMeal(fId, date, resto, val) {
  if (!S.meals[fId]) S.meals[fId] = {}
  if (!S.meals[fId][date]) S.meals[fId][date] = {}
  S.meals[fId][date][resto] = Math.max(0, val)
  save()
}

// ─── NAVIGATION ──────────────────────────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'))
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
  document.getElementById('page-' + name).classList.add('active')
  document.getElementById('tab-' + name).classList.add('active')
  const fns = { saisie: renderSaisie, recap: renderRecap, historique: renderHistorique, formations: renderFormations, restaurateurs: renderRestaurateurs }
  fns[name]?.()
}

function render() {
  const active = document.querySelector('.tab.active')?.id?.replace('tab-', '') || 'saisie'
  showPage(active)
}

function closeModal(id) { document.getElementById(id).classList.remove('open') }

function showToast(msg, dur = 2500) {
  const t = document.getElementById('toast')
  t.textContent = msg; t.classList.add('show')
  setTimeout(() => t.classList.remove('show'), dur)
}

// ─── PAGE SAISIE ─────────────────────────────────────────────────────────────
function renderSaisie() {
  const el = document.getElementById('page-saisie')
  const bounds = weekBounds(currentWeekOffset)
  const formations = S.formations.filter(f => parse(f.startDate) <= bounds.to && parse(f.endDate) >= bounds.from)

  const weekLabel = currentWeekOffset === 0 ? 'Cette semaine'
    : currentWeekOffset > 0 ? `Semaine +${currentWeekOffset}` : `Semaine ${currentWeekOffset}`

  let h = `<div class="filter-bar no-print">
    <button class="filter-btn" onclick="changeWeek(-1)">◀</button>
    <span style="font-weight:600;font-size:0.9rem">${weekLabel}</span>
    <button class="filter-btn" onclick="changeWeek(1)">▶</button>
    ${currentWeekOffset !== 0 ? `<button class="filter-btn active" onclick="currentWeekOffset=0;renderSaisie()">Aujourd'hui</button>` : ''}
  </div>`

  if (!formations.length) {
    h += `<div class="empty">Aucune formation cette semaine</div>`
    el.innerHTML = h; return
  }

  formations.forEach(f => {
    const dates = getFormationDates(f).filter(d => {
      const dp = parse(d); return dp >= bounds.from && dp <= bounds.to
    })
    const restos = getRestos().filter(r => (f.restaurants || []).includes(r.name))

    if (!dates.length || !restos.length) return

    h += `<div class="card">
      <div class="card-title" style="display:flex;align-items:center;gap:8px">
        <span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:${f.color}"></span>
        ${esc(f.name)}
        <span style="font-weight:400;color:var(--muted);font-size:0.82rem">· ${fmtDisplay(f.startDate)} → ${fmtDisplay(f.endDate)}</span>
      </div>
      <div style="overflow-x:auto">
      <table class="meal-table">
        <thead><tr>
          <th style="text-align:left">Restaurateur</th>

        const v = getMeal(f.id, d, r.name)
        const liv = getLivraison(f.id, d, r.name)

        if (r.livraison) {
          if (liv && liv.mode === 'livraison') {
            modeHtml = `<div><span class="livraison-badge" style="cursor:pointer;margin-top:4px" onclick="openLivraisonModal('${f.id}','${d}','${esc(r.name)}')">🚚 ${esc(liv.adresse||'')}</span></div>`

  })

// ─── MODAL LIVRAISON ─────────────────────────────────────────────────────────
function openLivraisonModal(fId, date, rName) {
  const r = getRestos().find(x => x.name === rName)
  if (!r || !r.livraison) return
  const liv = getLivraison(fId, date, rName)

  pendingLivraison = { fId, date, rName }
  selectedMode = liv?.mode || null

  const f = S.formations.find(f => f.id === fId)
  document.getElementById('modal-livraison-desc').textContent =
    `${f?.name || ''} — ${fmtDisplay(date)} — ${rName}`

  const sel = document.getElementById('modal-livraison-adresse')
  sel.innerHTML = (r.adresses || []).map(a => `<option value="${esc(a)}">${esc(a)}</option>`).join('')
  if (liv?.adresse) sel.value = liv.adresse

  document.getElementById('modal-livraison-comment').value = liv?.comment || ''

  // Afficher le bon mode sélectionné visuellement
  selectMode(liv?.mode || null, false)

  document.getElementById('modal-livraison').classList.add('open')
}

function selectMode(mode, updateState = true) {
  if (updateState) selectedMode = mode

  const btnSurplace  = document.getElementById('btn-mode-surplace')
  const btnLivraison = document.getElementById('btn-mode-livraison')
  const livraisonOpts = document.getElementById('livraison-options')

  // Reset styles

  btnLivraison.style.cssText = 'flex:1;padding:14px;font-size:0.95rem;background:#fff;border:2px solid var(--border);border-radius:6px;cursor:pointer'

  if (mode === 'surplace') {

    btnSurplace.style.borderColor = '#475569'

    livraisonOpts.style.display = 'block'

function saveLivraison() {
  if (!pendingLivraison) return
  if (!selectedMode) { showToast('⚠️ Choisir sur place ou livraison'); return }

  const { fId, date, rName } = pendingLivraison

  if (selectedMode === 'surplace') {
    setLivraison(fId, date, rName, { mode: 'surplace' })
  } else {
    const adresse = document.getElementById('modal-livraison-adresse').value
    const comment = document.getElementById('modal-livraison-comment').value.trim()

// ─── PAGE RÉCAP ──────────────────────────────────────────────────────────────
function renderRecap() {
  const el = document.getElementById('page-recap')
  const bounds = weekBounds(currentWeekOffset)
  const formations = S.formations.filter(f => parse(f.startDate) <= bounds.to && parse(f.endDate) >= bounds.from)

  const weekLabel = currentWeekOffset === 0 ? 'Cette semaine'
    : currentWeekOffset > 0 ? `Semaine +${currentWeekOffset}` : `Semaine ${currentWeekOffset}`

  let h = `<div class="filter-bar no-print">
    <button class="filter-btn" onclick="changeWeekRecap(-1)">◀</button>
    <span style="font-weight:600;font-size:0.9rem">${weekLabel}</span>
    <button class="filter-btn" onclick="changeWeekRecap(1)">▶</button>
    ${currentWeekOffset !== 0 ? `<button class="filter-btn active" onclick="currentWeekOffset=0;renderRecap()">Aujourd'hui</button>` : ''}
    <button class="filter-btn no-print" onclick="window.print()">🖨️ Imprimer</button>
  </div>`

  if (!formations.length) {
    h += `<div class="empty">Aucune formation cette semaine</div>`
    el.innerHTML = h; return
  }

  // Construire les données : par restaurateur → par formation → par date
  const byResto = {}

  formations.forEach(f => {
    const dates = getFormationDates(f).filter(d => {
      const dp = parse(d); return dp >= bounds.from && dp <= bounds.to
    })
    const restos = getRestos().filter(r => (f.restaurants || []).includes(r.name))

    restos.forEach(r => {
      if (!byResto[r.name]) byResto[r.name] = { total: 0, formations: {}, r }

      dates.forEach(d => {
        const v = getMeal(f.id, d, r.name)
        if (v > 0) {
          byResto[r.name].total += v
          if (!byResto[r.name].formations[f.id]) {
            byResto[r.name].formations[f.id] = { f, total: 0, dates: {} }
          }
          byResto[r.name].formations[f.id].total += v
          byResto[r.name].formations[f.id].dates[d] = {
            qty: v,
            liv: getLivraison(f.id, d, r.name)
          }
        }
      })
    })
  })

  if (!Object.keys(byResto).length) {
    h += `<div class="empty">Aucun repas saisi cette semaine</div>`
    el.innerHTML = h; return
  }

  Object.entries(byResto).forEach(([rName, data]) => {
    h += `<div class="recap-resto-card">
      <div class="recap-resto-header">
        <strong>🍴 ${esc(rName)}</strong>
        <span class="recap-resto-total">${data.total} repas au total</span>
      </div>`

    Object.values(data.formations).forEach(({ f, total, dates }) => {
      h += `<div class="recap-formation-block">
        <div class="recap-formation-title">
          <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${f.color};flex-shrink:0"></span>
          <span>${esc(f.name)}</span>
          <span style="font-weight:400;color:var(--muted);font-size:0.8rem">· ${total} repas</span>
        </div>`

      Object.entries(dates).sort().forEach(([d, { qty, liv }]) => {
        // Badge mode
        let modeBadge = ''
        if (data.r.livraison) {
          if (liv?.mode === 'livraison') {
            modeBadge = `<span class="livraison-badge">🚚 ${esc(liv.adresse||'')}${liv.comment ? ` · ${esc(liv.comment)}` : ''}</span>`
          } else if (liv?.mode === 'surplace') {
            modeBadge = `<span class="surplace-badge">🏠 Sur place</span>`
          } else {
            modeBadge = `<span class="surplace-badge" style="opacity:0.5">🏠 Sur place</span>`
          }
        }

        h += `<div class="recap-date-row">
          <div>
            <div style="font-weight:500">${dayName(d)} ${fmtDisplay(d)}</div>
            ${modeBadge ? `<div class="recap-mode">${modeBadge}</div>` : ''}
          </div>
          <strong style="color:var(--primary)">${qty} repas</strong>
        </div>`
      })

      h += `</div>`
    })

    h += `</div>`
  })

  el.innerHTML = h
}

function triggerImportCSV() { document.getElementById('csv-import').click() }
function importCSV(e) {
  const file = e.target.files[0]; if (!file) return
  const reader = new FileReader()
  reader.onload = ev => parseFormationsCSV(ev.target.result)
  reader.readAsText(file, 'utf-8')
  e.target.value = ''
}
function parseFormationsCSV(text) {
  text = text.replace(/^\uFEFF/, '')
  const lines = text.split('\n').map(l => l.trim()).filter(l => l)
  lines.shift()
  let added = 0, skipped = 0
  lines.forEach(line => {
    const [nom, couleur, dateDebut, dateFin] = line.split(';').map(s => s.trim())
    if (!nom || !dateDebut || !dateFin) { skipped++; return }
    if (S.formations.find(f => f.name.toLowerCase() === nom.toLowerCase())) { skipped++; return }
    const toISO = d => { const p = d.split('/'); return p.length !== 3 ? null : `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}` }
    const start = toISO(dateDebut), end = toISO(dateFin)
    if (!start || !end || start > end) { skipped++; return }
    S.formations.push({
      id: 'f_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
      name: nom, color: couleur?.startsWith('#') ? couleur : '#2563eb',
      startDate: start, endDate: end, restaurants: []
    })
    added++
  })
  save(); render()
  showToast(`✅ ${added} formation(s) importée(s)${skipped ? ` — ${skipped} ignorée(s)` : ''}`)
}

  const name = document.getElementById('edit-resto-input').value.trim()
  if (!name) { showToast('⚠️ Nom requis'); return }
  const livraison = document.getElementById('edit-resto-livraison').checked
  const adresses  = livraison ? getCurrentAdressesFromModal() : []

  const oldName = getRestos()[editingRestoIndex]?.name
  S.restaurants[editingRestoIndex] = { name, livraison, adresses }

  if (oldName && oldName !== name) {
    S.formations.forEach(f => {
      if (f.restaurants) {
        const idx = f.restaurants.indexOf(oldName)
        if (idx >= 0) f.restaurants[idx] = name
      }
    })
  }

  save(); closeModal('modal-resto'); renderRestaurateurs(); showToast('✅ Restaurateur enregistré')
}

function exportCSV() {
  const bounds = weekBounds(currentWeekOffset)
  let csv = 'Formation;Restaurateur;Date;Repas;Mode;Adresse;Commentaire\n'

  S.formations.forEach(f => {
    const dates = getFormationDates(f).filter(d => { const dp = parse(d); return dp >= bounds.from && dp <= bounds.to })
    const restos = getRestos().filter(r => (f.restaurants || []).includes(r.name))
    restos.forEach(r => {
      dates.forEach(d => {
        const v = getMeal(f.id, d, r.name)
        if (v > 0) {
          const liv = getLivraison(f.id, d, r.name)
          const mode = liv?.mode === 'livraison' ? 'Livraison' : 'Sur place'
          csv += `"${f.name}";"${r.name}";"${fmtDisplay(d)}";${v};"${mode}";"${liv?.adresse||''}";"${liv?.comment||''}"\n`
        }
      })
    })
  })

  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' })
  const a = document.createElement('a')
  a.href = URL.createObjectURL(blob); a.download = `repas-${dateStamp()}.csv`
  a.click(); URL.revokeObjectURL(a.href); showToast('📊 CSV exporté')
}

function exportAll() {
  const blob = new Blob([JSON.stringify({
    formations: S.formations, restaurants: S.restaurants,
    meals: S.meals, history: S.history, livraisons: S.livraisons
  }, null, 2)], { type: 'application/json' })
  const a = document.createElement('a')
  a.href = URL.createObjectURL(blob); a.download = `repas-backup-${dateStamp()}.json`
  a.click(); URL.revokeObjectURL(a.href); showToast('📦 Export JSON effectué')
}

function resetMeals() {
  if (!confirm('Effacer TOUS les repas saisis ?')) return
  S.meals = {}; S.livraisons = {}; save(); render(); showToast('🗑️ Repas effacés')
}

function resetAll() {
  if (!confirm('Tout réinitialiser ? Cette action est irréversible.')) return
  S = { formations: [], restaurants: [], meals: {}, summaryWeek: 'w0', history: {}, livraisons: {} }
  save(); render(); showToast('🔥 Réinitialisé')
}

// ─── RENDER SAISIE ───────────────────────────────────────────────────────────
function renderSaisie() {
  const el = document.getElementById('page-saisie')
  const bounds = weekBounds(currentWeekOffset)
  const weekLabel = currentWeekOffset === 0 ? 'Cette semaine'
    : currentWeekOffset > 0 ? `Semaine +${currentWeekOffset}` : `Semaine ${currentWeekOffset}`

  const formations = S.formations.filter(f =>
    parse(f.startDate) <= bounds.to && parse(f.endDate) >= bounds.from
  )

  let h = `<div class="filter-bar no-print">
    <button class="filter-btn" onclick="changeWeek(-1)">◀</button>
    <span style="font-weight:600;font-size:0.9rem">${weekLabel}</span>
    <button class="filter-btn" onclick="changeWeek(1)">▶</button>
    ${currentWeekOffset !== 0 ? `<button class="filter-btn active" onclick="currentWeekOffset=0;renderSaisie()">Aujourd'hui</button>` : ''}
  </div>`

  if (!formations.length) {
    h += `<div class="empty">Aucune formation cette semaine</div>`
    el.innerHTML = h; return
  }

  formations.forEach(f => {
    const dates = getFormationDates(f).filter(d => {
      const dp = parse(d); return dp >= bounds.from && dp <= bounds.to
    })
    if (!dates.length) return

    const restos = getRestos().filter(r => (f.restaurants || []).includes(r.name))

    h += `<div class="card">
      <div class="card-title" style="display:flex;align-items:center;gap:8px">
        <span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:${f.color}"></span>
        ${esc(f.name)}
      </div>`

    if (!restos.length) {
      h += `<div class="empty" style="padding:12px 0">Aucun restaurateur associé</div>`
    } else {
      h += `<div style="overflow-x:auto"><table class="meal-table">
        <thead><tr>
          <th style="text-align:left;min-width:120px">Restaurateur</th>
          ${dates.map(d => `<th>${dayName(d)}<br><span style="font-weight:400;font-size:0.78rem">${fmtShort(d)}</span></th>`).join('')}
          <th>Total</th>
        </tr></thead>
        <tbody>`

      restos.forEach(r => {
        let rowTotal = 0
        h += `<tr><td style="text-align:left;font-weight:500">${esc(r.name)}</td>`
        dates.forEach(d => {
          const v = getMeal(f.id, d, r.name)
          rowTotal += v
          const liv = getLivraison(f.id, d, r.name)

          // Badge livraison/surplace
          let modeHtml = ''
          if (r.livraison && v > 0) {
            if (liv?.mode === 'livraison') {
              modeHtml = `<div style="margin-top:4px"><span class="livraison-badge" style="font-size:0.7rem;cursor:pointer" onclick="openLivraison('${f.id}','${d}','${esc(r.name)}')">🚚</span></div>`
            } else {
              modeHtml = `<div style="margin-top:4px"><span class="surplace-badge" style="font-size:0.7rem;cursor:pointer" onclick="openLivraison('${f.id}','${d}','${esc(r.name)}')">🏠</span></div>`
            }
          }

          h += `<td>
            <div class="counter">
              <button onclick="changeMeal('${f.id}','${d}','${esc(r.name)}',-1)">−</button>
              <span>${v}</span>
              <button onclick="changeMeal('${f.id}','${d}','${esc(r.name)}',1)">+</button>
            </div>
            ${modeHtml}
          </td>`
        })
        h += `<td style="font-weight:700;color:var(--primary)">${rowTotal}</td></tr>`
      })

      h += `</tbody></table></div>`
    }

    h += `</div>`
  })

  el.innerHTML = h
}

function changeMeal(fId, date, rName, delta) {
  const cur = getMeal(fId, date, rName)
  const next = Math.max(0, cur + delta)
  setMeal(fId, date, rName, next)

  // Si on passe de 0 à 1 et que le resto propose livraison → ouvrir modal
  const r = getRestos().find(x => x.name === rName)
  if (r?.livraison && cur === 0 && next === 1) {
    openLivraison(fId, date, rName)
  } else if (next === 0) {
    setLivraison(fId, date, rName, null)
    renderSaisie()
  } else {
    renderSaisie()
  }
}

function changeWeek(dir) { currentWeekOffset += dir; renderSaisie() }

// ─── MODAL LIVRAISON ─────────────────────────────────────────────────────────
function openLivraison(fId, date, rName) {
  pendingLivraison = { fId, date, rName }
  selectedMode = null

  const r = getRestos().find(x => x.name === rName)
  const liv = getLivraison(fId, date, rName)
  const f = S.formations.find(x => x.id === fId)

  document.getElementById('modal-livraison-desc').textContent =
    `${f?.name || ''} · ${rName} · ${fmtDisplay(date)}`

  // Remplir adresses
  const sel = document.getElementById('modal-livraison-adresse')
  sel.innerHTML = (r?.adresses || []).map(a =>
    `<option value="${esc(a)}">${esc(a)}</option>`).join('')
  if (liv?.adresse) sel.value = liv.adresse

  document.getElementById('modal-livraison-comment').value = liv?.comment || ''

  selectMode(liv?.mode || null, true)

  document.getElementById('modal-livraison').classList.add('open')
}

function selectMode(mode, updateState = true) {
  if (updateState) selectedMode = mode

  const btnSurplace   = document.getElementById('btn-mode-surplace')
  const btnLivraison  = document.getElementById('btn-mode-livraison')
  const livraisonOpts = document.getElementById('livraison-options')

  btnSurplace.style.cssText  = 'flex:1;padding:14px;font-size:0.95rem;background:#fff;border:2px solid var(--border);border-radius:6px;cursor:pointer'
  btnLivraison.style.cssText = 'flex:1;padding:14px;font-size:0.95rem;background:#fff;border:2px solid var(--border);border-radius:6px;cursor:pointer'

  if (mode === 'surplace') {
    btnSurplace.style.background  = '#f1f5f9'
    btnSurplace.style.borderColor = '#475569'
    btnSurplace.style.fontWeight  = '700'
    livraisonOpts.style.display = 'none'
  } else if (mode === 'livraison') {
    btnLivraison.style.background  = '#f0fdf4'
    btnLivraison.style.borderColor = '#16a34a'
    btnLivraison.style.fontWeight  = '700'
    livraisonOpts.style.display = 'block'
  } else {
    livraisonOpts.style.display = 'none'
  }
}

function saveLivraison() {
  if (!pendingLivraison) return
  if (!selectedMode) { showToast('⚠️ Choisir sur place ou livraison'); return }

  const { fId, date, rName } = pendingLivraison

  if (selectedMode === 'surplace') {
    setLivraison(fId, date, rName, { mode: 'surplace' })
    showToast('🏠 Sur place enregistré')
  } else {
    const adresse = document.getElementById('modal-livraison-adresse').value
    const comment = document.getElementById('modal-livraison-comment').value.trim()
    if (!adresse) { showToast('⚠️ Choisir une adresse'); return }
    setLivraison(fId, date, rName, { mode: 'livraison', active: true, adresse, comment })
    showToast('🚚 Livraison configurée')
  }

  save()
  closeModal('modal-livraison')
  pendingLivraison = null
  selectedMode = null
  renderSaisie()
}

// ─── UTILS ───────────────────────────────────────────────────────────────────
function closeModal(id) {
  document.getElementById(id).classList.remove('open')
}

function showToast(msg) {
  const t = document.getElementById('toast')
  t.textContent = msg
  t.classList.add('show')
  setTimeout(() => t.classList.remove('show'), 2800)
}

function render() {
  const activePage = document.querySelector('.page.active')?.id?.replace('page-', '') || 'saisie'
  const fns = {
    saisie: renderSaisie,
    recap: renderRecap,
    historique: renderHistorique,
    formations: renderFormations,
    restaurateurs: renderRestaurateurs
  }
  if (fns[activePage]) fns[activePage]()
}

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'))
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
  document.getElementById('page-' + name).classList.add('active')
  document.getElementById('tab-' + name).classList.add('active')
  const fns = {
    saisie: renderSaisie,
    recap: renderRecap,
    historique: renderHistorique,
    formations: renderFormations,
    restaurateurs: renderRestaurateurs
  }
  if (fns[name]) fns[name]()
}

// ─── START ────────────────────────────────────────────────────────────────────
init()
</script>

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js')
  }
</script>
