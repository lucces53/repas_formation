<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Repas Formation</title>
  <meta name="theme-color" content="#2563eb" />
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Repas Formation">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #2563eb; --primary-light: #eff6ff;
      --success: #16a34a; --danger: #dc2626;
      --bg: #f1f5f9; --card: #ffffff; --border: #e2e8f0;
      --text: #1e293b; --muted: #64748b; --radius: 10px;
    }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .topbar { background: var(--primary); color: #fff; padding: 12px 16px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px #0002; }
    .topbar h1 { font-size: 1.1rem; flex: 1; }
    .topbar button { background: #ffffff22; border: none; color: #fff; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
    .topbar button:hover { background: #ffffff44; }
    .tabs { display: flex; background: #fff; border-bottom: 1px solid var(--border); overflow-x: auto; position: sticky; top: 49px; z-index: 99; }
    .tab { padding: 12px 16px; cursor: pointer; font-size: 0.85rem; white-space: nowrap; border-bottom: 3px solid transparent; transition: all .2s; }
    .tab:hover { background: var(--primary-light); }
    .tab.active { border-bottom-color: var(--primary); color: var(--primary); font-weight: 600; }
    .page { display: none; padding: 16px; max-width: 900px; margin: 0 auto; }
    .page.active { display: block; }
    .card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; margin-bottom: 16px; }
    .card-title { font-weight: 700; font-size: 1rem; margin-bottom: 12px; }
    label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--muted); margin-bottom: 4px; margin-top: 10px; }
    input, select, textarea { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.9rem; font-family: inherit; background: #fff; color: var(--text); }
    input:focus, select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px #2563eb22; }
    .btn { padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; font-size: 0.85rem; font-family: inherit; background: #fff; color: var(--text); transition: all .15s; }
    .btn:hover { background: #f8fafc; }
    .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-danger { background: var(--danger); color: #fff; border-color: var(--danger); }
    .btn-danger:hover { background: #b91c1c; }
    .btn-sm { padding: 4px 10px; font-size: 0.78rem; border-radius: 5px; border: 1px solid var(--border); cursor: pointer; background: #fff; }
    .btn-edit { color: var(--primary); }
    .btn-del  { color: var(--danger); }
    .resto-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .resto-item:last-child { border-bottom: none; }
    .formation-item { display: flex; align-items: flex-start; gap: 8px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .formation-item:last-child { border-bottom: none; }
    .formation-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
    .badge-active   { background: #dcfce7; color: #15803d; }
    .badge-upcoming { background: #fef9c3; color: #854d0e; }
    .modal-overlay { position: fixed; inset: 0; background: #0007; display: none; align-items: center; justify-content: center; z-index: 200; padding: 16px; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: var(--radius); padding: 20px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
    .modal h3 { margin-bottom: 16px; font-size: 1.1rem; }
    .modal-footer { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
    .form-row { display: flex; gap: 10px; }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1e293b; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 0.88rem; opacity: 0; transition: all .3s; z-index: 999; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
    .filter-btn { padding: 6px 12px; border: 1px solid var(--border); border-radius: 20px; background: #fff; cursor: pointer; font-size: 0.82rem; }
    .filter-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .empty { text-align: center; color: var(--muted); padding: 40px 20px; font-size: 0.9rem; }
    .info-box { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px; padding: 10px 14px; font-size: 0.85rem; color: var(--primary); margin-bottom: 12px; }
    .meal-table { width: 100%; border-collapse: collapse; min-width: 400px; }
    .meal-table th { background: var(--primary); color: #fff; padding: 8px; text-align: center; }
    .meal-table td { padding: 8px; text-align: center; border-bottom: 1px solid var(--border); }
    .counter { display: flex; align-items: center; gap: 6px; justify-content: center; }
    .counter button { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border); background: #fff; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .counter button:hover { background: var(--primary-light); }
    .counter span { min-width: 24px; text-align: center; font-weight: 600; }
    .histo-card { border-radius: var(--radius); border: 1px solid var(--border); background: #fff; overflow: hidden; margin-bottom: 12px; }
    .histo-header { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; background:var(--primary); color:#fff; }
    .histo-header strong { font-size:0.95rem; }
    .histo-header span { font-size:0.8rem; opacity:0.85; }
    .histo-body { padding:12px 14px; }
    .histo-row { display:flex; align-items:center; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--border); font-size:0.88rem; }
    .histo-row:last-child { border-bottom:none; }
    .histo-total { font-weight:700; color:white; font-size:1.1rem; }
    .stat-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:12px; margin-bottom:16px; }
    .stat-card { background:#fff; border:1px solid var(--border); border-radius:var(--radius); padding:16px; text-align:center; }
    .stat-card .stat-val { font-size:2rem; font-weight:800; color:var(--primary); }
    .stat-card .stat-lbl { font-size:0.8rem; color:var(--muted); margin-top:4px; }
    .livraison-box { background:#f0fdf4; border:1px solid #bbf7d0; border-radius:8px; padding:10px 14px; margin-top:8px; }
    .surplace-box { background:#f8fafc; border:1px solid #e2e8f0; border-radius:8px; padding:10px 14px; margin-top:8px; }
    .livraison-badge { display:inline-flex; align-items:center; gap:4px; background:#dcfce7; color:#15803d; border-radius:20px; padding:2px 10px; font-size:0.78rem; font-weight:600; }
    .surplace-badge { display:inline-flex; align-items:center; gap:4px; background:#f1f5f9; color:#475569; border-radius:20px; padding:2px 10px; font-size:0.78rem; font-weight:600; }
    .toggle-switch { display:flex; align-items:center; gap:8px; cursor:pointer; }
    .toggle-switch input[type=checkbox] { width:16px; height:16px; cursor:pointer; accent-color: var(--primary); }
    .adresse-item { display:flex; align-items:center; gap:6px; margin-bottom:6px; }
    .adresse-item input { flex:1; }
    .recap-resto-card { border-radius:var(--radius); border:1px solid var(--border); background:#fff; overflow:hidden; margin-bottom:16px; }
    .recap-resto-header { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; background:var(--primary); color:#fff; }
    .recap-resto-header strong { font-size:1rem; }
    .recap-resto-total { font-size:0.9rem; opacity:0.9; }
    .recap-formation-block { border-bottom:1px solid var(--border); padding:10px 16px; }
    .recap-formation-block:last-child { border-bottom:none; }
    .recap-formation-title { display:flex; align-items:center; gap:8px; font-weight:600; font-size:0.9rem; margin-bottom:8px; }
    .recap-date-row { display:flex; align-items:center; justify-content:space-between; padding:5px 0 5px 20px; font-size:0.85rem; border-bottom:1px solid #f1f5f9; }
    .recap-date-row:last-child { border-bottom:none; }
    .recap-mode { font-size:0.78rem; margin-top:2px; }
    .print-btn { background:#fff; border:1px solid var(--primary); color:var(--primary); padding:7px 16px; border-radius:6px; cursor:pointer; font-size:0.85rem; display:inline-flex; align-items:center; gap:6px; }
    .print-btn:hover { background:var(--primary-light); }
    .recap-print-header { display:none; font-size:1.1rem; font-weight:700; margin-bottom:16px; color:var(--primary); }
    @media print {
      .topbar, .tabs, .no-print { display:none !important; }
      .page { display:block !important; padding:0; }
      body { background:#fff; }
      .recap-print-header { display:block !important; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <h1>🍽️ Repas Formation</h1>
  <button onclick="exportCSV()">📊 CSV</button>
  <button onclick="exportAll()">📦 Export</button>
</div>

<div class="tabs">
  <div class="tab active" id="tab-saisie"        onclick="showPage('saisie')">✏️ Saisie</div>
  <div class="tab"        id="tab-recap"          onclick="showPage('recap')">📊 Récap</div>
  <div class="tab"        id="tab-historique"     onclick="showPage('historique')">📦 Historique</div>
  <div class="tab"        id="tab-formations"     onclick="showPage('formations')">🎓 Formations</div>
  <div class="tab"        id="tab-restaurateurs"  onclick="showPage('restaurateurs')">🍴 Restaurateurs</div>
</div>

<div class="page active" id="page-saisie"></div>
<div class="page"        id="page-recap"></div>
<div class="page"        id="page-historique"></div>
<div class="page"        id="page-formations"></div>
<div class="page"        id="page-restaurateurs"></div>

<!-- Modal Formation -->
<div class="modal-overlay" id="modal-formation">
  <div class="modal">
    <h3 id="modal-formation-title">Nouvelle formation</h3>
    <label>Nom de la formation</label>
    <input id="f-name" placeholder="Ex: Formation Excel" />
    <label>Couleur</label>
    <input type="color" id="f-color" value="#2563eb" style="height:38px;padding:2px 4px" />
    <div class="form-row">
      <div style="flex:1"><label>Date de début</label><input type="date" id="f-start" onchange="previewDays()" /></div>
      <div style="flex:1"><label>Date de fin</label><input type="date" id="f-end" onchange="previewDays()" /></div>
    </div>
    <div id="days-preview" style="display:none;margin-top:8px;font-size:0.85rem;color:var(--primary);background:#eff6ff;padding:8px 12px;border-radius:6px"></div>
    <label>Restaurateurs associés</label>
    <div id="f-restos-list" style="display:flex;flex-direction:column;gap:4px;margin-top:6px"></div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="saveFormation()">Enregistrer</button>
      <button class="btn" style="background:#f1f5f9" onclick="closeModal('modal-formation')">Annuler</button>

</div>

<!-- Modal Restaurateur -->
<div class="modal-overlay" id="modal-resto">
  <div class="modal">
    <h3 id="modal-resto-title">Modifier le restaurateur</h3>
    <label>Nom</label>
    <input id="edit-resto-input" placeholder="Nom du restaurateur" />
    <div style="margin-top:12px">
      <label class="toggle-switch">
        <input type="checkbox" id="edit-resto-livraison" onchange="toggleLivraisonModal()" />
        <span>Propose la livraison</span>
      </label>
    </div>
    <div id="livraison-adresses-section" style="display:none;margin-top:12px">
      <label>Adresses de livraison</label>
      <div id="livraison-adresses-list"></div>
      <button class="btn" style="background:#f0fdf4;color:#15803d;margin-top:6px;width:100%" onclick="addAdresseModal()">+ Ajouter une adresse</button>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="saveResto()">Enregistrer</button>
      <button class="btn" style="background:#f1f5f9" onclick="closeModal('modal-resto')">Annuler</button>

  </div>
</div>

<!-- Modal Livraison -->
<div class="modal-overlay" id="modal-livraison">
  <div class="modal">
    <h3>🚚 Mode de réception</h3>
    <p style="font-size:0.88rem;color:var(--muted);margin-bottom:16px" id="modal-livraison-desc"></p>
    <div style="display:flex;gap:10px;margin-bottom:16px">
      <button id="btn-mode-surplace" class="btn" style="flex:1;padding:14px;font-size:0.95rem" onclick="selectMode('surplace')">🏠 Sur place</button>
      <button id="btn-mode-livraison" class="btn" style="flex:1;padding:14px;font-size:0.95rem" onclick="selectMode('livraison')">🚚 Livraison</button>

    <div id="livraison-options" style="display:none">

      <input id="modal-livraison-comment" placeholder="Ex: Maison des situations" />

    <div class="modal-footer">
      <button class="btn btn-primary" onclick="saveLivraison()">Confirmer</button>

  </div>
</div>

<input type="file" id="csv-import" accept=".csv" style="display:none" onchange="importCSV(event)" />
<div class="toast" id="toast"></div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
let S = { formations: [], restaurants: [], meals: {}, summaryWeek: 'w0', history: {}, livraisons: {} }
let editingFormationId = null
let editingRestoIndex  = null
let currentWeekOffset  = 0
let pendingLivraison   = null
let selectedMode       = null

// ─── INIT ────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const [cfg, meals, history] = await Promise.all([
      fetch('/api/config').then(r => r.json()),
      fetch('/api/meals').then(r => r.json()),
      fetch('/api/history').then(r => r.json())
    ])
    S.formations  = cfg.formations  || []
    S.restaurants = cfg.restaurants || []
    S.summaryWeek = cfg.summaryWeek || 'w0'
    S.livraisons  = cfg.livraisons  || {}
    S.meals       = meals   || {}
    S.history     = history || {}
  } catch(e) {
    const raw = localStorage.getItem('repas_data')
    if (raw) S = { ...S, ...JSON.parse(raw) }
  }
  if (!S.livraisons) S.livraisons = {}
  if (!S.history) S.history = {}
  cleanPastFormations()
  render()
}

// ─── SAVE ────────────────────────────────────────────────────────────────────
async function save() {
  const config = {
    formations:  S.formations,
    restaurants: S.restaurants,
    summaryWeek: S.summaryWeek,
    livraisons:  S.livraisons
  }
  try {
    await fetch('/api/config',  { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(config) })
    await fetch('/api/meals',   { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(S.meals) })
    await fetch('/api/history', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(S.history) })
  } catch(e) {
    localStorage.setItem('repas_data', JSON.stringify(S))
  }
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function restoName(r) { return typeof r === 'string' ? r : r.name }
function restoObj(r)  { return typeof r === 'string' ? { name: r, livraison: false, adresses: [] } : r }
function getRestos()  { return S.restaurants.map(restoObj) }

function getLivraison(fId, date, rName) {
  return S.livraisons?.[fId]?.[date]?.[rName] || null
}
function setLivraison(fId, date, rName, data) {
  if (!S.livraisons) S.livraisons = {}
  if (!S.livraisons[fId]) S.livraisons[fId] = {}
  if (!S.livraisons[fId][date]) S.livraisons[fId][date] = {}
  if (data === null) {
    delete S.livraisons[fId][date][rName]
  } else {
    S.livraisons[fId][date][rName] = data
  }
}

// ─── DATE UTILS ──────────────────────────────────────────────────────────────
function today()       { const d = new Date(); d.setHours(0,0,0,0); return d }
function parse(s)      { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d) }
function fmt(d)        { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}` }
function fmtDisplay(s) { const [y,m,d] = s.split('-'); return `${d}/${m}/${y}` }
function fmtShort(s)   { const [,m,d] = s.split('-'); return `${d}/${m}` }
function fmtMonth(s)   { const [y,m] = s.split('-'); const n=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc']; return `${n[parseInt(m)-1]} ${y}` }
function dayName(s)    { return ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'][parse(s).getDay()] }
function dateStamp()   { return fmt(today()).replace(/-/g,'') }
function esc(s)        { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

function weekBounds(offset) {
  const d = today()
  const day = d.getDay() === 0 ? 6 : d.getDay() - 1
  const from = new Date(d); from.setDate(d.getDate() - day + offset * 7)
  const to   = new Date(from); to.setDate(from.getDate() + 5)
  return { from, to }
}

function weekLabel(offset) {
  const { from, to } = weekBounds(offset)
  const fmtD = d => `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`
  const label = `du ${fmtD(from)} au ${fmtD(to)}`
  if (offset === 0) return `Cette semaine · ${label}`
  if (offset > 0)   return `Semaine +${offset} · ${label}`
  return `Semaine ${offset} · ${label}`
}

// ─── MEALS ───────────────────────────────────────────────────────────────────
function getMeal(fId, date, rName) {
  return S.meals?.[fId]?.[date]?.[rName] || 0
}
function setMeal(fId, date, rName, val) {
  if (!S.meals[fId]) S.meals[fId] = {}
  if (!S.meals[fId][date]) S.meals[fId][date] = {}
  S.meals[fId][date][rName] = Math.max(0, val)
  save()
}

// ─── FORMATION DATES ─────────────────────────────────────────────────────────
function getFormationDates(f) {
  const dates = []
  const cur = new Date(parse(f.startDate))
  const end = parse(f.endDate)
  while (cur <= end) {
    if (cur.getDay() !== 0) dates.push(fmt(cur)) // exclure dimanches
    cur.setDate(cur.getDate() + 1)
  }
  return dates
}

// ─── HISTORIQUE ──────────────────────────────────────────────────────────────
function archiveFormation(f) {
  if (!S.meals[f.id]) return
  if (!S.history) S.history = {}
  Object.entries(S.meals[f.id]).forEach(([date, restos]) => {
    if (!restos || typeof restos !== 'object') return
    Object.entries(restos).forEach(([resto, qty]) => {
      if (!qty || qty <= 0) return
      if (!S.history[resto]) S.history[resto] = { total: 0, byFormation: {}, byMonth: {} }
      const H = S.history[resto]
      H.total = (H.total || 0) + qty
      if (!H.byFormation[f.id]) {
        H.byFormation[f.id] = { name: f.name, color: f.color, total: 0, startDate: f.startDate, endDate: f.endDate }
      }
      H.byFormation[f.id].total += qty
      const month = date.slice(0, 7)
      H.byMonth[month] = (H.byMonth[month] || 0) + qty
    })
  })
}

function cleanPastFormations() {
  const t = today()
  const toArchive = S.formations.filter(f => parse(f.endDate) < t)
  if (!toArchive.length) return
  toArchive.forEach(f => {
    archiveFormation(f)
    delete S.meals[f.id]
    if (S.livraisons && S.livraisons[f.id]) delete S.livraisons[f.id]
  })
  S.formations = S.formations.filter(f => parse(f.endDate) >= t)
  save()
}

// ─── RENDER SAISIE ───────────────────────────────────────────────────────────
function renderSaisie() {
  const el = document.getElementById('page-saisie')
  const bounds = weekBounds(currentWeekOffset)
  const label  = weekLabel(currentWeekOffset)

  const formations = S.formations.filter(f => {
    const s = parse(f.startDate), e = parse(f.endDate)
    return s <= bounds.to && e >= bounds.from
  })

  let h = `<div class="filter-bar no-print">
    <button class="filter-btn" onclick="changeWeek(-1)">◀</button>
    <span style="font-weight:600;font-size:0.9rem">${label}</span>
    <button class="filter-btn" onclick="changeWeek(1)">▶</button>
    ${currentWeekOffset !== 0 ? `<button class="filter-btn active" onclick="currentWeekOffset=0;renderSaisie()">Aujourd'hui</button>` : ''}
  </div>`

  if (!formations.length) {
    h += `<div class="empty">Aucune formation cette semaine</div>`
    el.innerHTML = h; return
  }

  formations.forEach(f => {
    const dates = getFormationDates(f).filter(d => {
      const dp = parse(d); return dp >= bounds.from && dp <= bounds.to
    })
    const restos = getRestos().filter(r => (f.restaurants || []).includes(r.name))

    if (!dates.length || !restos.length) return

    h += `<div class="card">
      <div class="card-title" style="display:flex;align-items:center;gap:8px">
        <span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:${f.color}"></span>
        ${esc(f.name)}
        <span style="font-weight:400;color:var(--muted);font-size:0.82rem">· ${fmtDisplay(f.startDate)} → ${fmtDisplay(f.endDate)}</span>
      </div>
      <div style="overflow-x:auto">
      <table class="meal-table">
        <thead><tr>
          <th style="text-align:left">Restaurateur</th>
          ${dates.map(d => `<th>${dayName(d)}<br><span style="font-weight:400;font-size:0.78rem">${fmtShort(d)}</span></th>`).join('')}
        </tr></thead>
        <tbody>`

    restos.forEach(r => {
      h += `<tr><td style="text-align:left;font-weight:500">
        ${esc(r.name)}
        ${r.livraison ? `<div style="font-size:0.72rem;color:var(--success)">🚚 livraison dispo</div>` : ''}
      </td>`
      dates.forEach(d => {
        const qty = getMeal(f.id, d, r.name)
        const liv = r.livraison ? getLivraison(f.id, d, r.name) : null
        let livrBadge = ''
        if (r.livraison) {
          if (liv?.mode === 'livraison') livrBadge = `<div style="font-size:0.68rem;color:var(--success);margin-top:2px">🚚</div>`
          else if (liv?.mode === 'surplace') livrBadge = `<div style="font-size:0.68rem;color:var(--muted);margin-top:2px">🏠</div>`
          else livrBadge = `<div style="font-size:0.68rem;color:#f59e0b;margin-top:2px">⚠️</div>`
        }
        h += `<td>
          <div class="counter">
            <button onclick="changeMeal('${f.id}','${d}','${esc(r.name)}',-1)">−</button>
            <span id="m_${f.id}_${d}_${r.name}">${qty}</span>
            <button onclick="changeMeal('${f.id}','${d}','${esc(r.name)}',1)">+</button>
          </div>
          ${livrBadge}
          ${r.livraison ? `<div style="margin-top:4px"><button class="btn-sm" style="font-size:0.7rem" onclick="openLivraisonModal('${f.id}','${d}','${esc(r.name)}')">📍</button></div>` : ''}
        </td>`
      })
      h += `</tr>`
    })

    h += `</tbody></table></div></div>`
  })

  el.innerHTML = h
}

function changeWeek(dir) { currentWeekOffset += dir; renderSaisie() }

function changeMeal(fId, date, rName, delta) {
  const cur = getMeal(fId, date, rName)
  setMeal(fId, date, rName, cur + delta)
  const el = document.getElementById(`m_${fId}_${date}_${rName}`)
  if (el) el.textContent = getMeal(fId, date, rName)
}

// ─── MODAL LIVRAISON ─────────────────────────────────────────────────────────
function openLivraisonModal(fId, date, rName) {
  const r = getRestos().find(x => x.name === rName)
  if (!r || !r.livraison) return
  const liv = getLivraison(fId, date, rName)
  pendingLivraison = { fId, date, rName }
  selectedMode = liv?.mode || null
  const f = S.formations.find(f => f.id === fId)
  document.getElementById('modal-livraison-desc').textContent =
    `${f?.name || ''} — ${fmtDisplay(date)} — ${rName}`
  const sel = document.getElementById('modal-livraison-adresse')
  sel.innerHTML = (r.adresses || []).map(a => `<option value="${esc(a)}">${esc(a)}</option>`).join('')
  if (liv?.adresse) sel.value = liv.adresse
  document.getElementById('modal-livraison-comment').value = liv?.comment || ''
  selectMode(liv?.mode || null, false)
  document.getElementById('modal-livraison').classList.add('open')
}

function selectMode(mode, updateState = true) {
  if (updateState) selectedMode = mode
  const btnS = document.getElementById('btn-mode-surplace')
  const btnL = document.getElementById('btn-mode-livraison')
  const opts = document.getElementById('livraison-options')
  if (btnS) btnS.style.background  = mode === 'surplace'  ? '#eff6ff' : ''
  if (btnS) btnS.style.borderColor = mode === 'surplace'  ? 'var(--primary)' : ''
  if (btnL) btnL.style.background  = mode === 'livraison' ? '#eff6ff' : ''
  if (btnL) btnL.style.borderColor = mode === 'livraison' ? 'var(--primary)' : ''
  if (opts) opts.style.display = mode === 'livraison' ? 'block' : 'none'
}

function saveLivraison() {
  if (!pendingLivraison || !selectedMode) { showToast('⚠️ Choisissez un mode'); return }
  const { fId, date, rName } = pendingLivraison
  if (selectedMode === 'livraison') {
    const adresse = document.getElementById('modal-livraison-adresse').value
    const comment = document.getElementById('modal-livraison-comment').value.trim()
    if (!adresse) { showToast('⚠️ Choisissez une adresse'); return }
    setLivraison(fId, date, rName, { mode: 'livraison', adresse, comment })
  } else {
    setLivraison(fId, date, rName, { mode: 'surplace' })
  }
  closeModal('modal-livraison')
  renderSaisie()
  showToast('✅ Mode enregistré')
}

// ─── RENDER RECAP ─────────────────────────────────────────────────────────────
function renderRecap() {
  const el = document.getElementById('page-recap')
  const bounds = weekBounds(currentWeekOffset)
  const label  = weekLabel(currentWeekOffset)

  const data = {}
  S.formations.forEach(f => {
    const dates = getFormationDates(f).filter(d => {
      const dp = parse(d); return dp >= bounds.from && dp <= bounds.to
    })
    dates.forEach(d => {
      const restos = getRestos().filter(r => (f.restaurants || []).includes(r.name))
      restos.forEach(r => {
        const qty = getMeal(f.id, d, r.name)
        if (!qty) return
        if (!data[r.name]) data[r.name] = { r, formations: {} }
        if (!data[r.name].formations[f.id]) data[r.name].formations[f.id] = { f, dates: {} }
        const liv = getLivraison(f.id, d, r.name)
        data[r.name].formations[f.id].dates[d] = { qty, liv }
      })
    })
  })

  let h = `<div class="filter-bar no-print">
    <button class="filter-btn" onclick="changeWeekRecap(-1)">◀</button>
    <span style="font-weight:600;font-size:0.9rem">${label}</span>
    <button class="filter-btn" onclick="changeWeekRecap(1)">▶</button>
    ${currentWeekOffset !== 0 ? `<button class="filter-btn active" onclick="currentWeekOffset=0;renderRecap()">Aujourd'hui</button>` : ''}
    <button class="print-btn no-print" onclick="printRecap()">🖨️ Imprimer / PDF</button>
  </div>`

  h += `<div class="recap-print-header">📊 Récapitulatif — ${label}</div>`

  if (!Object.keys(data).length) {
    h += `<div class="empty">Aucun repas saisi pour cette semaine</div>`
    el.innerHTML = h; return
  }

  Object.entries(data).forEach(([rName, rData]) => {
    let total = 0
    Object.values(rData.formations).forEach(fd => {
      Object.values(fd.dates).forEach(({ qty }) => { total += qty })
    })

    h += `<div class="recap-resto-card">
      <div class="recap-resto-header">
        <strong>🍴 ${esc(rName)}</strong>
        <span class="recap-resto-total">${total} repas au total</span>
      </div>`

    Object.values(rData.formations).forEach(({ f, dates }) => {
      let fTotal = 0
      Object.values(dates).forEach(({ qty }) => { fTotal += qty })

      h += `<div class="recap-formation-block">
        <div class="recap-formation-title">
          <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${f.color}"></span>
          ${esc(f.name)}
          <span style="font-weight:400;color:var(--muted);font-size:0.82rem">· ${fTotal} repas</span>
        </div>`

      Object.entries(dates).sort().forEach(([d, { qty, liv }]) => {
        let modeBadge = ''
        if (rData.r.livraison) {
          if (liv?.mode === 'livraison') {
            modeBadge = `<span class="livraison-badge">🚚 ${esc(liv.adresse||'')}${liv.comment ? ` · ${esc(liv.comment)}` : ''}</span>`
          } else if (liv?.mode === 'surplace') {
            modeBadge = `<span class="surplace-badge">🏠 Sur place</span>`
          } else {
            modeBadge = `<span class="surplace-badge" style="opacity:0.5">⚠️ Mode non défini</span>`
          }
        }
        h += `<div class="recap-date-row">
          <div>
            <div style="font-weight:500">${dayName(d)} ${fmtDisplay(d)}</div>
            ${modeBadge ? `<div class="recap-mode">${modeBadge}</div>` : ''}
          </div>
          <strong style="color:var(--primary)">${qty} repas</strong>
        </div>`
      })

      h += `</div>`
    })

    h += `</div>`
  })

  el.innerHTML = h
}

function changeWeekRecap(dir) { currentWeekOffset += dir; renderRecap() }

function printRecap() {
  document.querySelectorAll('.page').forEach(p => {
    p.style.display = p.id === 'page-recap' ? 'block' : 'none'
  })
  window.print()
  setTimeout(() => {
    document.querySelectorAll('.page').forEach(p => { p.style.display = '' })
  }, 500)
}

// ─── PAGE HISTORIQUE ─────────────────────────────────────────────────────────
function renderHistorique() {
  const el = document.getElementById('page-historique')
  const history = S.history || {}

  // Stats formations actives
  const activeMealsData = {}
  S.formations.forEach(f => {
    if (!S.meals[f.id]) return
    Object.entries(S.meals[f.id]).forEach(([date, restos]) => {
      if (!restos) return
      Object.entries(restos).forEach(([resto, qty]) => {
        if (!qty || qty <= 0) return
        if (!activeMealsData[resto]) activeMealsData[resto] = { total: 0, byFormation: {} }
        activeMealsData[resto].total += qty
        if (!activeMealsData[resto].byFormation[f.id]) {
          activeMealsData[resto].byFormation[f.id] = { name: f.name, color: f.color, total: 0 }
        }
        activeMealsData[resto].byFormation[f.id].total += qty
      })
    })
  })

  const hasArchive = Object.keys(history).length > 0
  const hasActive  = Object.keys(activeMealsData).length > 0

  if (!hasArchive && !hasActive) {
    el.innerHTML = `<div class="empty">Aucun historique disponible.<br><small style="color:var(--muted)">Les formations terminées sont archivées automatiquement.</small></div>`
    return
  }

  // Totaux globaux
  const merged = {}
  Object.entries(history).forEach(([n, d]) => { merged[n] = (merged[n]||0) + (d.total||0) })
  Object.entries(activeMealsData).forEach(([n, d]) => { merged[n] = (merged[n]||0) + d.total })
  const totalRepas  = Object.values(merged).reduce((a,b) => a+b, 0)
  const totalRestos = Object.keys(merged).length

  let h = `<div class="stat-grid">
    <div class="stat-card"><div class="stat-val">${totalRepas}</div><div class="stat-lbl">Repas au total</div></div>
    <div class="stat-card"><div class="stat-val">${totalRestos}</div><div class="stat-lbl">Restaurateurs</div></div>
  </div>`

  if (hasActive) {
    h += `<div class="card" style="border-left:4px solid var(--success)">
      <div class="card-title" style="color:var(--success)">📋 Formations en cours</div>`
    Object.entries(activeMealsData).sort((a,b) => b[1].total - a[1].total).forEach(([name, data]) => {
      h += `<div class="histo-card">
        <div class="histo-header" style="background:var(--success)">
          <strong>🍴 ${esc(name)}</strong>
          <span class="histo-total">${data.total} repas</span>
        </div>
        <div class="histo-body">`
      Object.values(data.byFormation).sort((a,b) => b.total - a.total).forEach(bf => {
        h += `<div class="histo-row">
          <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${bf.color};margin-right:6px"></span>${esc(bf.name)}</span>
          <strong>${bf.total} repas</strong>
        </div>`
      })
      h += `</div></div>`
    })
    h += `</div>`
  }

  if (hasArchive) {
    h += `<div class="card" style="border-left:4px solid var(--primary)">
      <div class="card-title" style="color:var(--primary)">📦 Formations archivées</div>`
    Object.entries(history).sort((a,b) => (b[1].total||0) - (a[1].total||0)).forEach(([name, data]) => {
      h += `<div class="histo-card">
        <div class="histo-header"><strong>🍴 ${esc(name)}</strong><span class="histo-total">${data.total} repas</span></div>
        <div class="histo-body">`

      if (data.byFormation && Object.keys(data.byFormation).length) {
        h += `<div style="font-size:0.8rem;color:var(--muted);font-weight:600;margin-bottom:6px">PAR FORMATION</div>`
        Object.values(data.byFormation).sort((a,b) => (b.total||0)-(a.total||0)).forEach(bf => {
          h += `<div class="histo-row">
            <span>
              <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${bf.color||'#ccc'};margin-right:6px"></span>
              ${esc(bf.name)}
              ${bf.startDate ? `<span style="color:var(--muted);font-size:0.78rem"> · ${fmtDisplay(bf.startDate)} → ${fmtDisplay(bf.endDate)}</span>` : ''}
            </span>
            <strong>${bf.total} repas</strong>
          </div>`
        })
      }

      if (data.byMonth && Object.keys(data.byMonth).length) {
        h += `<div style="font-size:0.8rem;color:var(--muted);font-weight:600;margin:10px 0 6px">PAR MOIS</div>`
        Object.entries(data.byMonth).sort((a,b) => b[0].localeCompare(a[0])).forEach(([month, qty]) => {
          h += `<div class="histo-row">
            <span>${fmtMonth(month)}</span>
            <strong>${qty} repas</strong>
          </div>`
        })
      }

      h += `</div></div>`
    })
    h += `</div>`
  }

  el.innerHTML = h
}

// ─── PAGE FORMATIONS ─────────────────────────────────────────────────────────
function renderFormations() {
  const el = document.getElementById('page-formations')
  const t = today()

  let h = `<div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div class="card-title" style="margin:0">🎓 Formations</div>
      <div style="display:flex;gap:8px">
        <button class="btn" onclick="triggerImportCSV()" style="font-size:0.8rem">📥 Import CSV</button>
        <button class="btn btn-primary" onclick="openFormation(null)">+ Ajouter</button>
      </div>
    </div>`

  if (!S.formations.length) {
    h += `<div class="empty">Aucune formation</div>`
  } else {
    const sorted = [...S.formations].sort((a,b) => a.startDate.localeCompare(b.startDate))
    sorted.forEach(f => {
      const s = parse(f.startDate), e = parse(f.endDate)
      const isActive   = s <= t && e >= t
      const isUpcoming = s > t
      const badge = isActive   ? `<span class="badge badge-active">En cours</span>`
                  : isUpcoming ? `<span class="badge badge-upcoming">À venir</span>` : ''
      h += `<div class="formation-item">
        <div class="formation-dot" style="background:${f.color}"></div>
        <div style="flex:1">
          <div style="font-weight:600;display:flex;align-items:center;gap:6px">${esc(f.name)} ${badge}</div>
          <div style="font-size:0.8rem;color:var(--muted)">${fmtDisplay(f.startDate)} → ${fmtDisplay(f.endDate)}</div>
          ${f.restaurants?.length ? `<div style="font-size:0.78rem;color:var(--muted);margin-top:2px">🍴 ${f.restaurants.map(esc).join(', ')}</div>` : ''}
        </div>
        <button class="btn-sm btn-edit" onclick="openFormation('${f.id}')">✏️</button>
        <button class="btn-sm btn-del" onclick="delFormation('${f.id}')">🗑️</button>
      </div>`
    })
  }

  h += `</div>
  <div class="card">
    <div class="card-title">⚙️ Actions</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-danger" onclick="resetMeals()">🗑️ Effacer les repas</button>
      <button class="btn btn-danger" onclick="resetAll()">🔥 Tout réinitialiser</button>
    </div>
  </div>`

  el.innerHTML = h
}

function openFormation(id) {
  editingFormationId = id
  const f = id ? S.formations.find(x => x.id === id) : null
  document.getElementById('modal-formation-title').textContent = id ? 'Modifier la formation' : 'Nouvelle formation'
  document.getElementById('f-name').value  = f?.name  || ''
  document.getElementById('f-color').value = f?.color || '#2563eb'
  document.getElementById('f-start').value = f?.startDate || ''
  document.getElementById('f-end').value   = f?.endDate   || ''

  const list = document.getElementById('f-restos-list')
  list.innerHTML = getRestos().map(r => `
    <label style="display:flex;align-items:center;gap:6px;font-weight:400;color:var(--text);cursor:pointer;margin-bottom:4px">
      <input type="checkbox" value="${esc(r.name)}" ${(f?.restaurants||[]).includes(r.name)?'checked':''} style="width:auto" />
      ${esc(r.name)}
    </label>`).join('')

  document.getElementById('days-preview').style.display = 'none'
  document.getElementById('modal-formation').classList.add('open')
}

function previewDays() {
  const s = document.getElementById('f-start').value
  const e = document.getElementById('f-end').value
  const box = document.getElementById('days-preview')
  if (!s || !e || s > e) { box.style.display = 'none'; return }
  const count = getFormationDates({ startDate: s, endDate: e }).length
  box.style.display = 'block'
  box.textContent = `📅 ${count} jour(s) de formation (dimanches exclus)`
}

function saveFormation() {
  const name  = document.getElementById('f-name').value.trim()
  const color = document.getElementById('f-color').value
  const start = document.getElementById('f-start').value
  const end   = document.getElementById('f-end').value
  if (!name || !start || !end || start > end) { showToast('⚠️ Remplissez tous les champs'); return }
  const restaurants = [...document.querySelectorAll('#f-restos-list input:checked')].map(i => i.value)
  if (editingFormationId) {
    const f = S.formations.find(x => x.id === editingFormationId)
    if (f) { f.name = name; f.color = color; f.startDate = start; f.endDate = end; f.restaurants = restaurants }
  } else {
    S.formations.push({
      id: 'f_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
      name, color, startDate: start, endDate: end, restaurants
    })
  }
  save(); render(); closeModal('modal-formation')
  showToast(editingFormationId ? '✅ Formation modifiée' : '✅ Formation ajoutée')
}

function delFormation(id) {
  if (!confirm('Supprimer cette formation et ses repas ?')) return
  const f = S.formations.find(x => x.id === id)
  if (f) archiveFormation(f)
  S.formations = S.formations.filter(x => x.id !== id)
  delete S.meals[id]
  if (S.livraisons) delete S.livraisons[id]
  save(); render(); showToast('🗑️ Formation supprimée')
}

// ─── PAGE RESTAURATEURS ──────────────────────────────────────────────────────
function renderRestaurateurs() {
  const el = document.getElementById('page-restaurateurs')
  const restos = getRestos()

  let h = `<div class="card">
    <div class="card-title">🍴 Restaurateurs</div>
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <input id="new-resto-input" placeholder="Nom du restaurateur" style="flex:1" onkeydown="if(event.key==='Enter')addResto()" />
      <button class="btn btn-primary" onclick="addResto()">+ Ajouter</button>
    </div>`

  if (!restos.length) {
    h += `<div class="empty">Aucun restaurateur</div>`
  } else {
    restos.forEach((r, i) => {
      h += `<div class="resto-item">
        <div style="flex:1">
          <div style="font-weight:600">${esc(r.name)}</div>
          <div style="font-size:0.78rem;color:var(--muted);margin-top:2px">`
      if (r.livraison) {
        h += `<span class="livraison-badge">🚚 Livraison active</span>`
        if (r.adresses?.length) h += ` · ${r.adresses.length} adresse(s)`
      } else {
        h += `<span class="surplace-badge">🏠 Sur place uniquement</span>`
      }
      h += `</div></div>
        <button class="btn-sm btn-edit" onclick="openResto(${i})">✏️</button>
        <button class="btn-sm btn-del" onclick="delResto(${i})">🗑️</button>
      </div>`
    })
  }

  h += `</div>`
  el.innerHTML = h
}

function addResto() {
  const inp = document.getElementById('new-resto-input')
  const name = inp.value.trim()
  if (!name) return
  if (getRestos().find(r => r.name.toLowerCase() === name.toLowerCase())) {
    showToast('⚠️ Ce restaurateur existe déjà'); return
  }
  S.restaurants.push({ name, livraison: false, adresses: [] })
  inp.value = ''
  save(); renderRestaurateurs(); showToast('✅ Restaurateur ajouté')
}

function openResto(i) {
  editingRestoIndex = i
  const r = getRestos()[i]
  document.getElementById('modal-resto-title').textContent = 'Modifier le restaurateur'
  document.getElementById('edit-resto-input').value = r.name
  document.getElementById('edit-resto-livraison').checked = r.livraison || false
  const adrs = document.getElementById('livraison-adresses-list')
  adrs.innerHTML = (r.adresses || []).map((a, j) => `
    <div class="adresse-item">
      <input value="${esc(a)}" id="adresse-${j}" placeholder="Adresse" />
      <button class="btn-sm btn-del" onclick="removeAdresseModal(${j})">🗑️</button>
    </div>`).join('')
  document.getElementById('livraison-adresses-section').style.display = r.livraison ? 'block' : 'none'
  document.getElementById('modal-resto').classList.add('open')
}

function toggleLivraisonModal() {
  const checked = document.getElementById('edit-resto-livraison').checked
  document.getElementById('livraison-adresses-section').style.display = checked ? 'block' : 'none'
}

function addAdresseModal() {
  const list = document.getElementById('livraison-adresses-list')
  const j = list.children.length
  const div = document.createElement('div')
  div.className = 'adresse-item'
  div.innerHTML = `<input id="adresse-${j}" placeholder="Adresse" /><button class="btn-sm btn-del" onclick="removeAdresseModal(${j})">🗑️</button>`
  list.appendChild(div)
}

function removeAdresseModal(j) {
  const inp = document.getElementById(`adresse-${j}`)
  if (inp) inp.closest('.adresse-item').remove()
}

function saveResto() {
  const name = document.getElementById('edit-resto-input').value.trim()
  if (!name) { showToast('⚠️ Nom requis'); return }
  const livraison = document.getElementById('edit-resto-livraison').checked
  const adresses  = [...document.querySelectorAll('#livraison-adresses-list input')].map(i => i.value.trim()).filter(Boolean)
  const oldName   = getRestos()[editingRestoIndex]?.name
  S.restaurants[editingRestoIndex] = { name, livraison, adresses }
  // Mettre à jour les références dans les formations
  if (oldName && oldName !== name) {
    S.formations.forEach(f => {
      if (f.restaurants) {
        const idx = f.restaurants.indexOf(oldName)
        if (idx !== -1) f.restaurants[idx] = name
      }
    })
    // Mettre à jour les repas
    Object.keys(S.meals).forEach(fId => {
      Object.keys(S.meals[fId]).forEach(date => {
        if (S.meals[fId][date][oldName] !== undefined) {
          S.meals[fId][date][name] = S.meals[fId][date][oldName]
          delete S.meals[fId][date][oldName]
        }
      })
    })
  }
  save(); renderRestaurateurs(); closeModal('modal-resto')
  showToast('✅ Restaurateur modifié')
}

function delResto(i) {
  if (!confirm('Supprimer ce restaurateur ?')) return
  const name = getRestos()[i].name
  S.restaurants.splice(i, 1)
  S.formations.forEach(f => {
    if (f.restaurants) f.restaurants = f.restaurants.filter(r => r !== name)
  })
  save(); renderRestaurateurs(); showToast('🗑️ Restaurateur supprimé')
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open')
}

// ─── IMPORT / EXPORT CSV ─────────────────────────────────────────────────────
function triggerImportCSV() { document.getElementById('csv-import').click() }

function importCSV(e) {
  const file = e.target.files[0]; if (!file) return
  const reader = new FileReader()
  reader.onload = ev => parseFormationsCSV(ev.target.result)
  reader.readAsText(file, 'utf-8')
  e.target.value = ''
}

function parseFormationsCSV(text) {
  text = text.replace(/^\uFEFF/, '')
  const lines = text.split('\n').map(l => l.trim()).filter(l => l)
  lines.shift()
  let added = 0, skipped = 0
  lines.forEach(line => {
    const [nom, couleur, dateDebut, dateFin] = line.split(';').map(s => s.trim())
    if (!nom || !dateDebut || !dateFin) { skipped++; return }
    if (S.formations.find(f => f.name.toLowerCase() === nom.toLowerCase())) { skipped++; return }
    const toISO = d => { const p = d.split('/'); return p.length !== 3 ? null : `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}` }
    const start = toISO(dateDebut), end = toISO(dateFin)
    if (!start || !end || start > end) { skipped++; return }
    S.formations.push({
      id: 'f_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
      name: nom, color: couleur?.startsWith('#') ? couleur : '#2563eb',
      startDate: start, endDate: end, restaurants: []
    })
    added++
  })
  save(); render()
  showToast(`✅ ${added} formation(s) importée(s)${skipped ? ` — ${skipped} ignorée(s)` : ''}`)
}

function exportCSV() {
  let csv = 'Restaurateur;Formation;Date;Repas;Mode;Adresse;Commentaire\n'
  S.formations.forEach(f => {
    if (!S.meals[f.id]) return
    Object.entries(S.meals[f.id]).forEach(([date, restos]) => {
      if (!restos) return
      Object.entries(restos).forEach(([rName, qty]) => {
        if (!qty) return
        const liv = getLivraison(f.id, date, rName)
        csv += `${rName};${f.name};${fmtDisplay(date)};${qty};${liv?.mode||''};${liv?.adresse||''};${liv?.comment||''}\n`
      })
    })
  })
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' })
  const a = document.createElement('a')
  a.href = URL.createObjectURL(blob); a.download = `repas-${dateStamp()}.csv`
  a.click(); URL.revokeObjectURL(a.href); showToast('📊 CSV exporté')
}

function exportAll() {
  const blob = new Blob([JSON.stringify({
    formations: S.formations, restaurants: S.restaurants,
    meals: S.meals, history: S.history, livraisons: S.livraisons
  }, null, 2)], { type: 'application/json' })
  const a = document.createElement('a')
  a.href = URL.createObjectURL(blob); a.download = `repas-backup-${dateStamp()}.json`
  a.click(); URL.revokeObjectURL(a.href); showToast('📦 Export JSON effectué')
}

function resetMeals() {
  if (!confirm('Effacer TOUS les repas saisis ?')) return
  S.meals = {}; S.livraisons = {}; save(); render(); showToast('🗑️ Repas effacés')
}

function resetAll() {
  if (!confirm('Tout réinitialiser ? Cette action est irréversible.')) return
  S = { formations: [], restaurants: [], meals: {}, summaryWeek: 'w0', history: {}, livraisons: {} }
  save(); render(); showToast('🔥 Réinitialisé')
}

// ─── ARCHIVE ─────────────────────────────────────────────────────────────────
function archiveFormation(f) {
  if (!S.meals[f.id]) return
  if (!S.history) S.history = {}
  Object.entries(S.meals[f.id]).forEach(([date, restos]) => {
    if (!restos || typeof restos !== 'object') return
    Object.entries(restos).forEach(([resto, qty]) => {
      if (!qty || qty <= 0) return
      if (!S.history[resto]) S.history[resto] = { total: 0, byFormation: {}, byMonth: {} }
      const H = S.history[resto]
      H.total = (H.total || 0) + qty
      if (!H.byFormation[f.id]) {
        H.byFormation[f.id] = { name: f.name, color: f.color, total: 0, startDate: f.startDate, endDate: f.endDate }
      }
      H.byFormation[f.id].total += qty
      const month = date.slice(0, 7)
      if (!H.byMonth) H.byMonth = {}
      H.byMonth[month] = (H.byMonth[month] || 0) + qty
    })
  })
}

function cleanPastFormations() {
  const t = today()
  const toArchive = S.formations.filter(f => parse(f.endDate) < t)
  if (!toArchive.length) return
  toArchive.forEach(f => { archiveFormation(f); delete S.meals[f.id] })
  S.formations = S.formations.filter(f => parse(f.endDate) >= t)
  save()
}

// ─── RENDER SAISIE ───────────────────────────────────────────────────────────
function renderSaisie() {
  const el = document.getElementById('page-saisie')
  const bounds = weekBounds(currentWeekOffset)
  const label  = weekLabel(currentWeekOffset)

  const formations = S.formations.filter(f => {
    const s = parse(f.startDate), e = parse(f.endDate)
    return s <= bounds.to && e >= bounds.from
  })

  let h = `<div class="filter-bar no-print">
    <button class="filter-btn" onclick="changeWeek(-1)">◀</button>
    <span style="font-weight:600;font-size:0.9rem">${label}</span>
    <button class="filter-btn" onclick="changeWeek(1)">▶</button>
    ${currentWeekOffset !== 0 ? `<button class="filter-btn active" onclick="currentWeekOffset=0;renderSaisie()">Aujourd'hui</button>` : ''}
  </div>`

  if (!formations.length) {
    h += `<div class="empty">Aucune formation cette semaine</div>`
    el.innerHTML = h; return
  }

  formations.forEach(f => {
    const dates = getFormationDates(f).filter(d => {
      const dp = parse(d); return dp >= bounds.from && dp <= bounds.to
    })
    const restos = getRestos().filter(r => (f.restaurants || []).includes(r.name))

    if (!dates.length || !restos.length) return

    h += `<div class="card">
      <div class="card-title" style="display:flex;align-items:center;gap:8px">
        <span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:${f.color}"></span>
        ${esc(f.name)}
        <span style="font-weight:400;color:var(--muted);font-size:0.82rem">· ${fmtDisplay(f.startDate)} → ${fmtDisplay(f.endDate)}</span>
      </div>
      <div style="overflow-x:auto">
      <table class="meal-table">
        <thead><tr>
          <th style="text-align:left">Restaurateur</th>
          ${dates.map(d => `<th>${dayName(d)}<br><span style="font-weight:400;font-size:0.78rem">${fmtShort(d)}</span></th>`).join('')}
        </tr></thead>
        <tbody>`

    restos.forEach(r => {
      h += `<tr><td style="text-align:left;font-weight:600">${esc(r.name)}`
      if (r.livraison) h += ` <span class="livraison-badge" style="font-size:0.7rem">🚚</span>`
      h += `</td>`

      dates.forEach(d => {
        const qty = getMeal(f.id, d, r.name)
        const liv = r.livraison ? getLivraison(f.id, d, r.name) : null
        let cellBg = ''
        if (r.livraison && qty > 0) {
          cellBg = liv?.mode === 'livraison' ? 'background:#f0fdf4' : liv?.mode === 'surplace' ? 'background:#f8fafc' : 'background:#fff7ed'
        }
        h += `<td style="${cellBg}">`
        h += `<div class="counter">
          <button onclick="changeMeal('${f.id}','${d}','${esc(r.name)}',-1)">−</button>
          <span>${qty}</span>
          <button onclick="changeMeal('${f.id}','${d}','${esc(r.name)}',1)">+</button>
        </div>`
        if (r.livraison && qty > 0) {
          const badge = liv?.mode === 'livraison'
            ? `<div style="margin-top:4px"><span class="livraison-badge" style="font-size:0.7rem;cursor:pointer" onclick="openLivraison('${f.id}','${d}','${esc(r.name)}')">🚚 ${esc(liv.adresse||'?')}</span></div>`
            : liv?.mode === 'surplace'
            ? `<div style="margin-top:4px"><span class="surplace-badge" style="font-size:0.7rem;cursor:pointer" onclick="openLivraison('${f.id}','${d}','${esc(r.name)}')">🏠 Sur place</span></div>`
            : `<div style="margin-top:4px"><span style="font-size:0.7rem;color:#b45309;cursor:pointer;background:#fef3c7;padding:2px 6px;border-radius:10px" onclick="openLivraison('${f.id}','${d}','${esc(r.name)}')">⚠️ Définir mode</span></div>`
          h += badge
        }
        h += `</td>`
      })
      h += `</tr>`
    })

    h += `</tbody></table></div></div>`
  })

  el.innerHTML = h
}

function changeMeal(fId, date, rName, delta) {
  const cur = getMeal(fId, date, rName)
  const nxt = Math.max(0, cur + delta)
  setMeal(fId, date, rName, nxt)
  const r = getRestos().find(x => x.name === rName)
  if (r?.livraison && nxt > 0 && !getLivraison(fId, date, rName)) {
    pendingLivraison = { fId, date, rName }
    openLivraison(fId, date, rName)
  } else {
    renderSaisie()
  }
}

function changeWeek(dir) { currentWeekOffset += dir; renderSaisie() }

// ─── MODAL LIVRAISON ─────────────────────────────────────────────────────────
function openLivraison(fId, date, rName) {
  const r   = getRestos().find(x => x.name === rName)
  const liv = getLivraison(fId, date, rName)
  const f   = S.formations.find(x => x.id === fId)
  pendingLivraison = { fId, date, rName }
  selectedMode = liv?.mode || null
  document.getElementById('modal-livraison-desc').textContent =
    `${f?.name || ''} — ${fmtDisplay(date)} — ${rName}`
  const sel = document.getElementById('modal-livraison-adresse')
  sel.innerHTML = (r?.adresses || []).map(a => `<option value="${esc(a)}">${esc(a)}</option>`).join('')
  if (liv?.adresse) sel.value = liv.adresse
  document.getElementById('modal-livraison-comment').value = liv?.comment || ''
  selectMode(liv?.mode || null, false)
  document.getElementById('modal-livraison').classList.add('open')
}

function selectMode(mode, updateState = true) {
  if (updateState) selectedMode = mode
  const btnS = document.getElementById('btn-mode-surplace')
  const btnL = document.getElementById('btn-mode-livraison')
  const opts = document.getElementById('livraison-options')
  if (btnS) { btnS.style.background = mode === 'surplace' ? '#eff6ff' : ''; btnS.style.borderColor = mode === 'surplace' ? 'var(--primary)' : '' }
  if (btnL) { btnL.style.background = mode === 'livraison' ? '#f0fdf4' : ''; btnL.style.borderColor = mode === 'livraison' ? 'var(--success)' : '' }
  if (opts) opts.style.display = mode === 'livraison' ? 'block' : 'none'
}

function saveLivraison() {
  if (!pendingLivraison || !selectedMode) { showToast('⚠️ Choisissez un mode'); return }
  const { fId, date, rName } = pendingLivraison
  if (selectedMode === 'livraison') {
    const adresse = document.getElementById('modal-livraison-adresse').value
    const comment = document.getElementById('modal-livraison-comment').value.trim()
    if (!adresse) { showToast('⚠️ Choisissez une adresse'); return }
    setLivraison(fId, date, rName, { mode: 'livraison', adresse, comment })
  } else {
    setLivraison(fId, date, rName, { mode: 'surplace' })
  }
  save()
  closeModal('modal-livraison')
  renderSaisie()
  showToast('✅ Mode enregistré')
}

// ─── TOAST / RENDER / SHOWPAGE ───────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast')
  t.textContent = msg
  t.classList.add('show')
  setTimeout(() => t.classList.remove('show'), 2800)
}

function render() {
  const activePage = document.querySelector('.page.active')?.id?.replace('page-', '') || 'saisie'
  const fns = { saisie: renderSaisie, recap: renderRecap, historique: renderHistorique, formations: renderFormations, restaurateurs: renderRestaurateurs }
  if (fns[activePage]) fns[activePage]()
}

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'))
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
  document.getElementById('page-' + name).classList.add('active')
  document.getElementById('tab-' + name).classList.add('active')
  const fns = { saisie: renderSaisie, recap: renderRecap, historique: renderHistorique, formations: renderFormations, restaurateurs: renderRestaurateurs }
  if (fns[name]) fns[name]()
}

// ─── START ────────────────────────────────────────────────────────────────────
init()
</script>

  }
