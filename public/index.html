<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Repas Formation</title>
  <meta name="theme-color" content="#2563eb" />
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Repas Formation">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #2563eb; --primary-light: #eff6ff;
      --success: #16a34a; --danger: #dc2626;
      --bg: #f1f5f9; --card: #ffffff; --border: #e2e8f0;
      --text: #1e293b; --muted: #64748b; --radius: 10px;
    }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .topbar { background: var(--primary); color: #fff; padding: 12px 16px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px #0002; }
    .topbar h1 { font-size: 1.1rem; flex: 1; }
    .topbar button { background: #ffffff22; border: none; color: #fff; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
    .topbar button:hover { background: #ffffff44; }
    .tabs { display: flex; background: #fff; border-bottom: 1px solid var(--border); overflow-x: auto; position: sticky; top: 49px; z-index: 99; }
    .tab { padding: 12px 16px; cursor: pointer; font-size: 0.85rem; white-space: nowrap; border-bottom: 3px solid transparent; }
    .tab.active { border-bottom-color: var(--primary); color: var(--primary); font-weight: 600; }
    .page { display: none; padding: 16px; max-width: 900px; margin: 0 auto; }
    .page.active { display: block; }
    .card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; margin-bottom: 16px; }
    .card-title { font-weight: 700; font-size: 1rem; margin-bottom: 12px; }
    label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--muted); margin-bottom: 4px; }
    input, select, textarea { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.9rem; outline: none; font-family: inherit; }
    input:focus, select:focus { border-color: var(--primary); }
    .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.88rem; font-weight: 500; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-danger { background: var(--danger); color: #fff; }
    .badge-status { display: inline-block; font-size: 0.72rem; padding: 2px 8px; border-radius: 20px; margin-left: 6px; font-weight: 600; }
    .badge-ongoing { background: #dcfce7; color: var(--success); }
    .badge-upcoming { background: #fef9c3; color: #854d0e; }
    .modal-overlay { position: fixed; inset: 0; background: #0007; display: none; align-items: center; justify-content: center; z-index: 200; padding: 16px; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: var(--radius); padding: 20px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
    .modal h3 { margin-bottom: 16px; font-size: 1.1rem; }
    .modal-footer { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
    .form-row { display: flex; gap: 10px; }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1e293b; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 0.88rem; opacity: 0; transition: all .3s; z-index: 999; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
    .filter-btn { padding: 6px 12px; border: 1px solid var(--border); border-radius: 20px; background: #fff; cursor: pointer; font-size: 0.82rem; }
    .filter-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .empty { text-align: center; color: var(--muted); padding: 40px 20px; font-size: 0.9rem; }
    .info-box { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px; padding: 10px 14px; font-size: 0.85rem; color: #1e40af; margin-bottom: 12px; }
    .btn-sm { padding: 4px 8px; font-size: 0.78rem; border: none; border-radius: 5px; cursor: pointer; font-weight: 500; }
    .btn-edit { background: #f1f5f9; color: var(--text); }
    .btn-del { background: #fee2e2; color: var(--danger); }
    .f-card { border-radius: var(--radius); border: 1px solid var(--border); background: #fff; overflow: hidden; margin-bottom: 10px; }
    .f-card-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px; }
    .f-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
    .f-card-body { padding: 0 14px 12px; font-size: 0.85rem; color: var(--muted); }
    .f-card-body .resto-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .tag { background: var(--primary-light); color: var(--primary); border-radius: 20px; padding: 3px 10px; font-size: 0.78rem; font-weight: 500; cursor: pointer; border: 1px solid #bfdbfe; }
    .tag.active { background: var(--primary); color: #fff; }
    .resto-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; background: #fff; margin-bottom: 6px; gap: 8px; }
    .meal-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .meal-table th { background: var(--primary); color: #fff; padding: 8px; text-align: center; }
    .meal-table td { padding: 8px; text-align: center; border-bottom: 1px solid var(--border); }
    .counter { display: flex; align-items: center; gap: 6px; justify-content: center; }
    .counter button { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border); background: #fff; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .counter button:hover { background: var(--primary-light); }
    .counter span { min-width: 24px; text-align: center; font-weight: 600; }
    .histo-card { border-radius: var(--radius); border: 1px solid var(--border); background: #fff; overflow: hidden; margin-bottom: 12px; }
    .histo-header { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; background:var(--primary); color:#fff; }
    .histo-header strong { font-size:0.95rem; }
    .histo-header span { font-size:0.8rem; opacity:0.85; }
    .histo-body { padding:12px 14px; }
    .histo-row { display:flex; align-items:center; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--border); font-size:0.88rem; }
    .histo-row:last-child { border-bottom:none; }
    .histo-total { font-weight:700; color:var(--primary); font-size:1.1rem; }
    .stat-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:12px; margin-bottom:16px; }
    .stat-card { background:#fff; border:1px solid var(--border); border-radius:var(--radius); padding:16px; text-align:center; }
    .stat-card .stat-val { font-size:2rem; font-weight:800; color:var(--primary); }
    .stat-card .stat-lbl { font-size:0.8rem; color:var(--muted); margin-top:4px; }
    /* Livraison */
    .livraison-box { background:#f0fdf4; border:1px solid #bbf7d0; border-radius:8px; padding:10px 14px; margin-top:8px; }
    .livraison-badge { display:inline-flex; align-items:center; gap:4px; background:#dcfce7; color:#15803d; border-radius:20px; padding:2px 10px; font-size:0.78rem; font-weight:600; }
    .toggle-switch { display:flex; align-items:center; gap:8px; cursor:pointer; }
    .toggle-switch input[type=checkbox] { width:auto; accent-color: var(--primary); width:16px; height:16px; cursor:pointer; }
    .adresse-item { display:flex; align-items:center; gap:6px; margin-bottom:6px; }
    .adresse-item input { flex:1; }
    @media print {
      .topbar, .tabs, .no-print { display:none !important; }
      .page { display:block !important; padding:0; }
      body { background:#fff; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <h1>🍽️ Repas Formation</h1>
  <button onclick="exportCSV()">📊 CSV</button>
  <button onclick="exportAll()">📦 Export</button>
</div>

<div class="tabs">
  <div class="tab active" id="tab-saisie"       onclick="showPage('saisie')">✏️ Saisie</div>
  <div class="tab"        id="tab-recap"         onclick="showPage('recap')">📊 Récap</div>
  <div class="tab"        id="tab-historique"    onclick="showPage('historique')">📦 Historique</div>
  <div class="tab"        id="tab-formations"    onclick="showPage('formations')">🎓 Formations</div>
  <div class="tab"        id="tab-restaurateurs" onclick="showPage('restaurateurs')">🍴 Restaurateurs</div>
</div>

<div class="page active" id="page-saisie"></div>
<div class="page"        id="page-recap"></div>
<div class="page"        id="page-historique"></div>
<div class="page"        id="page-formations"></div>
<div class="page"        id="page-restaurateurs"></div>

<!-- Modal Formation -->
<div class="modal-overlay" id="modal-formation">
  <div class="modal">
    <h3 id="modal-formation-title">Nouvelle formation</h3>
    <div style="margin-bottom:12px"><label>Nom</label><input id="f-name" placeholder="Nom de la formation" /></div>
    <div style="margin-bottom:12px"><label>Couleur</label><input id="f-color" type="color" value="#2563eb" style="height:40px;padding:4px" /></div>
    <div class="form-row" style="margin-bottom:12px">
      <div style="flex:1"><label>Date début</label><input id="f-start" type="date" onchange="previewDays()" /></div>
      <div style="flex:1"><label>Date fin</label><input id="f-end" type="date" onchange="previewDays()" /></div>
    </div>
    <div id="days-preview" class="info-box" style="display:none"></div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="saveFormation()">Enregistrer</button>
      <button class="btn" style="background:#f1f5f9" onclick="closeModal('modal-formation')">Annuler</button>
    </div>
  </div>
</div>

<!-- Modal Restaurateur -->
<div class="modal-overlay" id="modal-resto">
  <div class="modal">
    <h3 id="modal-resto-title">Modifier le restaurateur</h3>
    <div style="margin-bottom:12px">
      <label>Nom</label>
      <input id="edit-resto-input" placeholder="Nom du restaurateur" />
    </div>
    <!-- Livraison -->
    <div style="margin-bottom:12px">
      <label class="toggle-switch">
        <input type="checkbox" id="edit-resto-livraison" onchange="toggleLivraisonModal()" />
        <span>Propose la livraison</span>
      </label>
    </div>
    <div id="livraison-adresses-section" style="display:none;margin-bottom:12px">
      <label>Adresses de livraison</label>
      <div id="livraison-adresses-list"></div>
      <button class="btn" style="background:#f0fdf4;color:#15803d;margin-top:6px;width:100%" onclick="addAdresseModal()">+ Ajouter une adresse</button>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="saveResto()">Enregistrer</button>
      <button class="btn" style="background:#f1f5f9" onclick="closeModal('modal-resto')">Annuler</button>
    </div>
  </div>
</div>

<!-- Modal Livraison (saisie) -->
<div class="modal-overlay" id="modal-livraison">
  <div class="modal">
    <h3>🚚 Livraison</h3>
    <p style="font-size:0.88rem;color:var(--muted);margin-bottom:12px" id="modal-livraison-desc"></p>
    <div style="margin-bottom:12px">
      <label>Adresse de livraison</label>
      <select id="modal-livraison-adresse"></select>
    </div>
    <div style="margin-bottom:12px">
      <label>Commentaire (optionnel)</label>
      <input id="modal-livraison-comment" placeholder="Ex: Sonner à l'interphone..." />
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="saveLivraison()">Confirmer</button>
      <button class="btn" style="background:#f1f5f9" onclick="cancelLivraison()">Annuler / Pas de livraison</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
let S = { formations: [], restaurants: [], meals: {}, summaryWeek: 'w0', history: {}, livraisons: {} }
// livraisons = { "fId": { "date": { "restoName": { active: true, adresse: "...", comment: "..." } } } }
// restaurants = [{ name, livraison: false, adresses: [] }]  ← nouveau format
let editingFormationId = null
let editingRestoIndex  = null
let currentWeekOffset  = 0
let pendingLivraison   = null // { fId, date, restoName, resolve }

// ─── INIT ────────────────────────────────────────────────────────────────────
async function init() {
  await loadFromServer()
  migrateRestaurants()
  cleanPastFormations()
  render()
}

// Migration : si restaurants = ["nom",...] → [{ name, livraison:false, adresses:[] },...]
function migrateRestaurants() {
  if (!S.restaurants.length) return
  if (typeof S.restaurants[0] === 'string') {
    S.restaurants = S.restaurants.map(r => ({ name: r, livraison: false, adresses: [] }))
    save()
  }
}

async function loadFromServer() {
  try {
    const [cfg, meals, history] = await Promise.all([
      fetch('/api/config').then(r => r.json()),
      fetch('/api/meals').then(r => r.json()),
      fetch('/api/history').then(r => r.json()).catch(() => ({}))
    ])
    S.formations  = cfg.formations  || []
    S.restaurants = cfg.restaurants || []
    S.summaryWeek = cfg.summaryWeek || 'w0'
    S.livraisons  = cfg.livraisons  || {}
    S.meals       = meals   || {}
    S.history     = history || {}
  } catch(e) {
    const raw = localStorage.getItem('repas_data')
    if (raw) { const d = JSON.parse(raw); S = { ...S, ...d } }
  }
}

async function save() {
  const config = {
    formations:  S.formations,
    restaurants: S.restaurants,
    summaryWeek: S.summaryWeek,
    livraisons:  S.livraisons
  }
  try {
    await fetch('/api/config',  { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(config) })
    await fetch('/api/meals',   { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(S.meals) })
    await fetch('/api/history', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(S.history) })
  } catch(e) {
    localStorage.setItem('repas_data', JSON.stringify(S))
  }
}

// ─── HELPERS RESTAURANTS ─────────────────────────────────────────────────────
function restoName(r) { return typeof r === 'string' ? r : r.name }
function restoObj(r)  { return typeof r === 'string' ? { name: r, livraison: false, adresses: [] } : r }
function getRestos()  { return S.restaurants.map(restoObj) }

// ─── LIVRAISON STATE ─────────────────────────────────────────────────────────
function getLivraison(fId, date, rName) {
  return S.livraisons?.[fId]?.[date]?.[rName] || null
}
function setLivraison(fId, date, rName, data) {
  if (!S.livraisons) S.livraisons = {}
  if (!S.livraisons[fId]) S.livraisons[fId] = {}
  if (!S.livraisons[fId][date]) S.livraisons[fId][date] = {}
  if (data === null) {
    delete S.livraisons[fId][date][rName]
  } else {
    S.livraisons[fId][date][rName] = data
  }
}

// ─── HISTORIQUE ──────────────────────────────────────────────────────────────
function archiveFormation(f) {
  if (!S.meals[f.id]) return
  if (!S.history) S.history = {}
  Object.entries(S.meals[f.id]).forEach(([date, restos]) => {
    Object.entries(restos).forEach(([resto, qty]) => {
      if (!qty) return
      if (!S.history[resto]) S.history[resto] = { total: 0, byFormation: {}, byMonth: {} }
      const H = S.history[resto]
      H.total = (H.total || 0) + qty
      if (!H.byFormation[f.id]) H.byFormation[f.id] = { name: f.name, color: f.color, total: 0, startDate: f.startDate, endDate: f.endDate }
      H.byFormation[f.id].total += qty
      const month = date.slice(0, 7)
      H.byMonth[month] = (H.byMonth[month] || 0) + qty
    })
  })
}

function cleanPastFormations() {
  const t = today()
  const toArchive = S.formations.filter(f => parse(f.endDate) < t)
  if (!toArchive.length) return
  toArchive.forEach(f => { archiveFormation(f); delete S.meals[f.id] })
  S.formations = S.formations.filter(f => parse(f.endDate) >= t)
  save()
}

// ─── DATE UTILS ──────────────────────────────────────────────────────────────
function today()       { const d = new Date(); d.setHours(0,0,0,0); return d }
function parse(s)      { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d) }
function fmt(d)        { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}` }
function fmtDisplay(s) { const [y,m,d] = s.split('-'); return `${d}/${m}/${y}` }
function fmtShort(s)   { const [,m,d] = s.split('-'); return `${d}/${m}` }
function fmtMonth(s)   { const [y,m] = s.split('-'); const n=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc']; return `${n[parseInt(m)-1]} ${y}` }
function dayName(s)    { return ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'][parse(s).getDay()] }
function dateStamp()   { return fmt(today()).replace(/-/g,'') }
function esc(s)        { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

function getFormationDates(f) {
  const start = parse(f.startDate), end = parse(f.endDate)
  const result = []
  const cur = new Date(start)
  while (cur <= end) {
    if (cur.getDay() !== 0) result.push(fmt(cur))
    cur.setDate(cur.getDate() + 1)
  }
  return result
}

function weekBounds(offset = 0) {
  const now = new Date(); now.setHours(0,0,0,0)
  const day = now.getDay()
  const monday = new Date(now); monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1) + offset * 7)
  const friday = new Date(monday); friday.setDate(monday.getDate() + 5)
  return { from: monday, to: friday }
}

// ─── MEALS ───────────────────────────────────────────────────────────────────
function getMeal(fId, date, resto) {
  return S.meals?.[fId]?.[date]?.[resto] || 0
}
function setMeal(fId, date, resto, val) {
  if (!S.meals[fId]) S.meals[fId] = {}
  if (!S.meals[fId][date]) S.meals[fId][date] = {}
  S.meals[fId][date][resto] = Math.max(0, val)
  save()
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  const active = document.querySelector('.tab.active')?.id?.replace('tab-', '') || 'saisie'
  showPage(active)
}

// ─── PAGE SAISIE ─────────────────────────────────────────────────────────────
function renderSaisie() {
  const el = document.getElementById('page-saisie')
  const t = today()

  // Formations actives cette semaine
  const bounds = weekBounds(currentWeekOffset)
  const formations = S.formations.filter(f => {
    return parse(f.startDate) <= bounds.to && parse(f.endDate) >= bounds.from
  })

  const weekLabel = currentWeekOffset === 0 ? 'Cette semaine'
    : currentWeekOffset > 0 ? `Semaine +${currentWeekOffset}`
    : `Semaine ${currentWeekOffset}`

  let h = `<div class="filter-bar no-print">
    <button class="filter-btn" onclick="changeWeek(-1)">◀</button>
    <span style="font-weight:600;font-size:0.9rem">${weekLabel}</span>
    <button class="filter-btn" onclick="changeWeek(1)">▶</button>
    ${currentWeekOffset !== 0 ? `<button class="filter-btn active" onclick="currentWeekOffset=0;renderSaisie()">Aujourd'hui</button>` : ''}
  </div>`

  if (!formations.length) {
    h += `<div class="empty">Aucune formation cette semaine</div>`
    el.innerHTML = h; return
  }

  formations.forEach(f => {
    const restos = getRestos().filter(r => (f.restaurants || []).includes(r.name))
    if (!restos.length) return

    const dates = getFormationDates(f).filter(d => {
      const dp = parse(d)
      return dp >= bounds.from && dp <= bounds.to
    })
    if (!dates.length) return

    h += `<div class="card">
      <div class="card-title">
        <span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:${f.color};margin-right:6px;vertical-align:middle"></span>
        ${esc(f.name)}
        <span style="font-size:0.78rem;color:var(--muted);font-weight:400;margin-left:6px">${fmtDisplay(f.startDate)} → ${fmtDisplay(f.endDate)}</span>
      </div>
      <div style="overflow-x:auto">
      <table class="meal-table">
        <thead><tr>
          <th style="text-align:left;min-width:120px">Restaurateur</th>`
    dates.forEach(d => {
      const isToday = fmt(t) === d
      h += `<th style="${isToday ? 'background:#1d4ed8' : ''}">${dayName(d)}<br><span style="font-weight:400;font-size:0.78rem">${fmtShort(d)}</span></th>`
    })
    h += `<th>Total</th></tr></thead><tbody>`

    restos.forEach(r => {
      let rowTotal = 0
      h += `<tr><td style="text-align:left;font-weight:500">`
      h += `<div>${esc(r.name)}`
      if (r.livraison) h += ` <span class="livraison-badge">🚚</span>`
      h += `</div>`
      h += `</td>`
      dates.forEach(d => {
        const qty = getMeal(f.id, d, r.name)
        rowTotal += qty
        const liv = getLivraison(f.id, d, r.name)
        h += `<td>
          <div class="counter">
            <button onclick="adj('${f.id}','${d}','${esc(r.name)}',-1)">−</button>
            <span>${qty}</span>
            <button onclick="adj('${f.id}','${d}','${esc(r.name)}',1)">+</button>
          </div>`
        if (r.livraison && qty > 0) {
          if (liv && liv.active) {
            h += `<div style="margin-top:4px">
              <span class="livraison-badge" style="cursor:pointer" onclick="openLivraisonModal('${f.id}','${d}','${esc(r.name)}')">🚚 ${esc(liv.adresse)}</span>
            </div>`
          } else {
            h += `<div style="margin-top:4px">
              <button class="btn-sm" style="background:#f0fdf4;color:#15803d;width:100%" onclick="openLivraisonModal('${f.id}','${d}','${esc(r.name)}')">🚚 Livrer ?</button>
            </div>`
          }
        }
        h += `</td>`
      })
      h += `<td style="font-weight:700;color:var(--primary)">${rowTotal}</td></tr>`
    })

    // Totaux par jour
    h += `<tr style="background:#f8fafc;font-weight:700"><td style="text-align:left">Total</td>`
    let grandTotal = 0
    dates.forEach(d => {
      let dayTotal = 0
      restos.forEach(r => { dayTotal += getMeal(f.id, d, r.name) })
      grandTotal += dayTotal
      h += `<td style="color:var(--primary)">${dayTotal}</td>`
    })
    h += `<td style="color:var(--primary)">${grandTotal}</td></tr>`
    h += `</tbody></table></div></div>`
  })

  el.innerHTML = h
}

function adj(fId, date, resto, delta) {
  const cur = getMeal(fId, date, resto)
  const next = Math.max(0, cur + delta)
  setMeal(fId, date, resto, next)
  // Si on passe à 0, supprimer la livraison
  if (next === 0) setLivraison(fId, date, resto, null)
  renderSaisie()
}

function changeWeek(dir) { currentWeekOffset += dir; renderSaisie() }

// ─── MODAL LIVRAISON ─────────────────────────────────────────────────────────
function openLivraisonModal(fId, date, restoName) {
  const r = getRestos().find(x => x.name === restoName)
  if (!r || !r.livraison) return
  const liv = getLivraison(fId, date, restoName)

  document.getElementById('modal-livraison-desc').textContent =
    `Formation : ${S.formations.find(f=>f.id===fId)?.name || ''} — ${fmtDisplay(date)}`

  const sel = document.getElementById('modal-livraison-adresse')
  sel.innerHTML = (r.adresses || []).map(a => `<option value="${esc(a)}" ${liv?.adresse===a?'selected':''}>${esc(a)}</option>`).join('')
  if (!r.adresses?.length) sel.innerHTML = `<option value="">Aucune adresse configurée</option>`

  document.getElementById('modal-livraison-comment').value = liv?.comment || ''

  pendingLivraison = { fId, date, restoName }
  document.getElementById('modal-livraison').classList.add('open')
}

function saveLivraison() {
  if (!pendingLivraison) return
  const { fId, date, restoName } = pendingLivraison
  const adresse = document.getElementById('modal-livraison-adresse').value
  const comment = document.getElementById('modal-livraison-comment').value.trim()
  if (!adresse) { showToast('⚠️ Aucune adresse sélectionnée'); return }
  setLivraison(fId, date, restoName, { active: true, adresse, comment })
  save()
  closeModal('modal-livraison')
  pendingLivraison = null
  renderSaisie()
  showToast('🚚 Livraison enregistrée')
}

function cancelLivraison() {
  if (pendingLivraison) {
    const { fId, date, restoName } = pendingLivraison
    setLivraison(fId, date, restoName, null)
    save()
    pendingLivraison = null
  }
  closeModal('modal-livraison')
  renderSaisie()
}

// ─── PAGE RÉCAP ──────────────────────────────────────────────────────────────
function renderRecap() {
  const el = document.getElementById('page-recap')
  if (!S.formations.length) { el.innerHTML = '<div class="empty">Aucune formation configurée</div>'; return }

  const filters = [
    { key: 'w0', label: 'Cette semaine', offset: 0 },
    { key: 'w1', label: 'Sem. +1',       offset: 1 },
    { key: 'w2', label: 'Sem. +2',       offset: 2 },
    { key: 'w3', label: 'Sem. +3',       offset: 3 },
    { key: 'w4', label: 'Sem. +4',       offset: 4 },
    { key: 'all', label: 'Tout',         offset: null },
  ]
  const activeFilter = filters.find(f => f.key === S.summaryWeek) || filters[0]
  const bounds = activeFilter.offset !== null ? weekBounds(activeFilter.offset) : null

  const formations = S.formations.filter(f => {
    if (!bounds) return true
    return parse(f.startDate) <= bounds.to && parse(f.endDate) >= bounds.from
  })

  let h = `<div class="filter-bar no-print">`
  filters.forEach(flt => {
    h += `<button class="filter-btn${S.summaryWeek === flt.key ? ' active' : ''}" onclick="S.summaryWeek='${flt.key}';save();renderRecap()">${flt.label}</button>`
  })
  h += `<button class="btn btn-primary" style="margin-left:auto" onclick="window.print()">🖨️ Imprimer</button>`
  h += `</div>`

  formations.forEach(f => {
    const restos = getRestos().filter(r => (f.restaurants || []).includes(r.name))
    if (!restos.length) return

    const allDates = getFormationDates(f).filter(d => {
      if (!bounds) return true
      const dp = parse(d)
      return dp >= bounds.from && dp <= bounds.to
    })
    if (!allDates.length) return

    h += `<div class="card">
      <div class="card-title">
        <span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:${f.color};margin-right:6px;vertical-align:middle"></span>
        ${esc(f.name)}
      </div>
      <div style="overflow-x:auto">
      <table class="meal-table">
        <thead><tr>
          <th style="text-align:left">Restaurateur</th>`
    allDates.forEach(d => {
      h += `<th>${dayName(d)}<br><span style="font-weight:400;font-size:0.78rem">${fmtShort(d)}</span></th>`
    })
    h += `<th>Total</th></tr></thead><tbody>`

    restos.forEach(r => {
      let rowTotal = 0
      h += `<tr><td style="text-align:left">
        ${esc(r.name)}${r.livraison ? ' <span class="livraison-badge">🚚</span>' : ''}
      </td>`
      allDates.forEach(d => {
        const qty = getMeal(f.id, d, r.name)
        rowTotal += qty
        const liv = getLivraison(f.id, d, r.name)
        h += `<td>${qty}`
        if (liv && liv.active && qty > 0) {
          h += `<br><span style="font-size:0.72rem;color:#15803d">🚚 ${esc(liv.adresse)}</span>`
          if (liv.comment) h += `<br><span style="font-size:0.7rem;color:var(--muted)">${esc(liv.comment)}</span>`
        }
        h += `</td>`
      })
      h += `<td style="font-weight:700">${rowTotal}</td></tr>`
    })

    h += `<tr style="background:#f8fafc;font-weight:700"><td style="text-align:left">Total</td>`
    let grandTotal = 0
    allDates.forEach(d => {
      let dayTotal = 0
      restos.forEach(r => { dayTotal += getMeal(f.id, d, r.name) })
      grandTotal += dayTotal
      h += `<td style="color:var(--primary)">${dayTotal}</td>`
    })
    h += `<td style="color:var(--primary)">${grandTotal}</td></tr>`
    h += `</tbody></table></div></div>`
  })

  if (!h.includes('<table')) h += `<div class="empty">Aucune donnée pour cette période</div>`
  el.innerHTML = h
}

// ─── PAGE HISTORIQUE ─────────────────────────────────────────────────────────
function renderHistorique() {
  const el = document.getElementById('page-historique')
  const H = S.history || {}
  const restos = Object.keys(H)

  // Stats live
  let liveByResto = {}
  S.formations.forEach(f => {
    getFormationDates(f).forEach(d => {
      getRestos().forEach(r => {
        const q = getMeal(f.id, d, r.name)
        if (q) liveByResto[r.name] = (liveByResto[r.name] || 0) + q
      })
    })
  })

  const allRestos = [...new Set([...restos, ...Object.keys(liveByResto)])]
  const sorted = allRestos.sort()

  if (!sorted.length) {
    el.innerHTML = `<div class="empty">Aucun historique disponible</div>`; return
  }

  let totalAll = 0
  sorted.forEach(r => {
    totalAll += (H[r]?.total || 0) + (liveByResto[r] || 0)
  })

  let h = `<div class="stat-grid">
    <div class="stat-card"><div class="stat-val">${totalAll}</div><div class="stat-lbl">Repas total (archivés + en cours)</div></div>
    <div class="stat-card"><div class="stat-val">${sorted.length}</div><div class="stat-lbl">Restaurateurs actifs</div></div>
  </div>`

  h += `<div style="text-align:right;margin-bottom:12px">
    <button class="btn btn-danger no-print" onclick="resetHistory()">🗑️ Effacer l'historique archivé</button>
  </div>`

  sorted.forEach(r => {
    const histo = H[r] || {}
    const live  = liveByResto[r] || 0
    const total = (histo.total || 0) + live
    const rObj  = getRestos().find(x => x.name === r)
    h += `<div class="histo-card">`
    h += `<div class="histo-header"><strong>🍴 ${esc(r)}${rObj?.livraison ? ' 🚚' : ''}</strong><span>${total} repas au total</span></div>`
    h += `<div class="histo-body">`

    const liveFormations = S.formations.filter(f => (f.restaurants || []).includes(r))
    if (liveFormations.length) {
      h += `<div style="font-size:0.8rem;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase">Formations en cours</div>`
      liveFormations.forEach(f => {
        let fTotal = 0
        getFormationDates(f).forEach(d => { fTotal += getMeal(f.id, d, r) })
        h += `<div class="histo-row">
          <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${f.color};margin-right:6px"></span>${esc(f.name)}</span>
          <span style="color:var(--primary);font-weight:600">${fTotal} repas</span>
        </div>`
      })
    }

    if (Object.keys(histo.byFormation || {}).length) {
      h += `<div style="font-size:0.8rem;font-weight:600;color:var(--muted);margin:10px 0 6px;text-transform:uppercase">Formations archivées</div>`
      Object.values(histo.byFormation).forEach(bf => {
        h += `<div class="histo-row">
          <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${bf.color||'#94a3b8'};margin-right:6px"></span>${esc(bf.name)}</span>
          <span>${bf.total} repas</span>
        </div>`
      })
    }

    if (Object.keys(histo.byMonth || {}).length) {
      h += `<div style="font-size:0.8rem;font-weight:600;color:var(--muted);margin:10px 0 6px;text-transform:uppercase">Par mois</div>`
      Object.entries(histo.byMonth).sort().forEach(([m, qty]) => {
        h += `<div class="histo-row"><span>${fmtMonth(m)}</span><span>${qty} repas</span></div>`
      })
    }

    h += `<div style="margin-top:10px;padding-top:10px;border-top:2px solid var(--border);display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:0.85rem;font-weight:700">Total cumulé</span>
      <span class="histo-total">${total} repas</span>
    </div>`
    h += `</div></div>`
  })

  el.innerHTML = h
}

function resetHistory() {
  if (!confirm('Effacer tout l\'historique archivé ?')) return
  S.history = {}; save(); renderHistorique(); showToast('🗑️ Historique effacé')
}

  const box = document.getElementById('days-preview')
  if (!s || !e || s > e) { box.style.display = 'none'; return }

  const end   = document.getElementById('f-end').value
  const color = document.getElementById('f-color').value

function delFormation(id) {
  if (!confirm('Supprimer cette formation ?')) return
  const f = S.formations.find(x => x.id === id)
  if (f) { archiveFormation(f); delete S.meals[id] }
  S.formations = S.formations.filter(x => x.id !== id)
  save(); render(); showToast('🗑️ Formation supprimée et archivée')
}

function toggleResto(fId, rName) {
  const f = S.formations.find(x => x.id === fId)
  if (!f) return
  if (!f.restaurants) f.restaurants = []
  const idx = f.restaurants.indexOf(rName)
  if (idx >= 0) f.restaurants.splice(idx, 1)
  else f.restaurants.push(rName)
  save(); renderFormations()
}

function triggerImportCSV() { document.getElementById('csv-import').click() }
function importCSV(e) {
  const file = e.target.files[0]; if (!file) return
  const reader = new FileReader()
  reader.onload = ev => parseFormationsCSV(ev.target.result)
  reader.readAsText(file, 'utf-8')
}
function parseFormationsCSV(text) {
  text = text.replace(/^\uFEFF/, '')
  const lines = text.split('\n').map(l => l.trim()).filter(l => l)
  lines.shift()
  let added = 0, skipped = 0
  lines.forEach(line => {
    const [nom, couleur, dateDebut, dateFin] = line.split(';').map(s => s.trim())
    if (!nom || !dateDebut || !dateFin) { skipped++; return }
    if (S.formations.find(f => f.name.toLowerCase() === nom.toLowerCase())) { skipped++; return }
    const toISO = d => { const p = d.split('/'); return p.length !== 3 ? null : `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}` }
    const start = toISO(dateDebut), end = toISO(dateFin)
    if (!start || !end || start > end) { skipped++; return }
    S.formations.push({
      id: 'f_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
      name: nom, color: couleur?.startsWith('#') ? couleur : '#2563eb',
      startDate: start, endDate: end, restaurants: []
    })
    added++
  })
  save(); render()
  const preview = document.getElementById('import-preview')
  if (preview) preview.innerHTML = `<div style="padding:10px;background:#f0fdf4;border-radius:8px;color:var(--success);font-size:0.85rem;margin-bottom:8px">✅ ${added} formation(s) importée(s)${skipped ? ` — ${skipped} ignorée(s)` : ''}</div>`
  showToast(`✅ ${added} formation(s) importée(s)`)
}

function openResto(index) {
  editingRestoIndex = index
  const r = getRestos()[index]

  document.getElementById('edit-resto-input').value = r.name

  document.getElementById('modal-resto').classList.add('open')

function toggleLivraisonModal() {
  const checked = document.getElementById('edit-resto-livraison').checked
  document.getElementById('livraison-adresses-section').style.display = checked ? 'block' : 'none'
}

function renderAdressesModal(adresses) {
  const list = document.getElementById('livraison-adresses-list')
  list.innerHTML = adresses.map((a, i) => `
    <div class="adresse-item">
      <input value="${esc(a)}" id="adresse-${i}" placeholder="Ex: 12 rue de la Paix, Lyon" />
      <button class="btn-sm btn-del" onclick="removeAdresse(${i})">🗑️</button>
    </div>`).join('')
}

function addAdresseModal() {
  const r = getRestos()[editingRestoIndex]
  const adresses = getCurrentAdressesFromModal()
  adresses.push('')
  renderAdressesModal(adresses)
  // Focus sur le dernier input
  setTimeout(() => {
    const inputs = document.querySelectorAll('#livraison-adresses-list input')
    if (inputs.length) inputs[inputs.length - 1].focus()
  }, 50)
}

function removeAdresse(i) {
  const adresses = getCurrentAdressesFromModal()
  adresses.splice(i, 1)
  renderAdressesModal(adresses)
}

function getCurrentAdressesFromModal() {
  const inputs = document.querySelectorAll('#livraison-adresses-list input')
  return [...inputs].map(inp => inp.value.trim()).filter(v => v)
}

function saveResto() {
  const name = document.getElementById('edit-resto-input').value.trim()
  if (!name) { showToast('⚠️ Nom requis'); return }
  const livraison = document.getElementById('edit-resto-livraison').checked
  const adresses  = livraison ? getCurrentAdressesFromModal() : []

  const oldName = getRestos()[editingRestoIndex]?.name
  S.restaurants[editingRestoIndex] = { name, livraison, adresses }

  // Mettre à jour les références dans les formations si renommé
  if (oldName && oldName !== name) {
    S.formations.forEach(f => {
      if (!f.restaurants) return
      const idx = f.restaurants.indexOf(oldName)
      if (idx >= 0) f.restaurants[idx] = name
    })
    // Mise à jour meals
    Object.values(S.meals).forEach(byDate => {
      Object.values(byDate).forEach(byResto => {
        if (byResto[oldName] !== undefined) {
          byResto[name] = byResto[oldName]
          delete byResto[oldName]
        }
      })
    })
  }

  save(); render(); closeModal('modal-resto')
  showToast('✅ Restaurateur modifié')
}

function delResto(index) {
  const r = getRestos()[index]
  if (!confirm(`Supprimer "${r.name}" ?`)) return
  S.restaurants.splice(index, 1)
  S.formations.forEach(f => {
    if (f.restaurants) f.restaurants = f.restaurants.filter(x => x !== r.name)
  })
  save(); render(); showTo  save(); render(); showToast('🗑️ Restaurateur supprimé')
}

// ─── PAGE SAISIE (suite) ──────────────────────────────────────────────────────
function renderSaisie() {
  const el = document.getElementById('page-saisie')
  const bounds = weekBounds(currentWeekOffset)

  const formations = S.formations.filter(f => {
    return parse(f.startDate) <= bounds.to && parse(f.endDate) >= bounds.from
  })

  const weekLabel = currentWeekOffset === 0 ? 'Cette semaine'
    : currentWeekOffset > 0 ? `Semaine +${currentWeekOffset}`
    : `Semaine ${currentWeekOffset}`

  let h = `<div class="filter-bar no-print">
    <button class="filter-btn" onclick="changeWeek(-1)">◀</button>
    <span style="font-weight:600;font-size:0.9rem">${weekLabel}</span>
    <button class="filter-btn" onclick="changeWeek(1)">▶</button>
    ${currentWeekOffset !== 0 ? `<button class="filter-btn active" onclick="currentWeekOffset=0;renderSaisie()">Aujourd'hui</button>` : ''}
  </div>`

  if (!formations.length) {
    h += `<div class="empty">Aucune formation cette semaine</div>`
    el.innerHTML = h; return
  }

  formations.forEach(f => {
    const restos = getRestos().filter(r => (f.restaurants || []).includes(r.name))
    if (!restos.length) return

    const fDates = getFormationDates(f).filter(d => {
      const dp = parse(d)
      return dp >= bounds.from && dp <= bounds.to
    })
    if (!fDates.length) return

    h += `<div class="card" style="border-top:4px solid ${f.color}">`
    h += `<div class="card-title" style="color:${f.color}">${esc(f.name)}</div>`
    h += `<div style="overflow-x:auto">`
    h += `<table class="meal-table"><thead><tr><th style="text-align:left;padding-left:10px">Restaurateur</th>`
    fDates.forEach(d => { h += `<th>${dayName(d)}<br><small>${fmtShort(d)}</small></th>` })
    h += `<th>Total</th></tr></thead><tbody>`

    restos.forEach(r => {
      h += `<tr><td style="text-align:left;padding-left:10px;font-weight:500">
        ${esc(r.name)}${r.livraison ? ' <span style="font-size:0.75rem">🚚</span>' : ''}
      </td>`

      let total = 0
      fDates.forEach(d => {
        const v = getMeal(f.id, d, r.name)
        total += v
        const cntId = `cnt-${f.id}-${d}-${r.name}`
        const liv = r.livraison ? getLivraison(f.id, d, r.name) : null

        h += `<td>
          <div class="counter">
            <button class="minus" onclick="changeMeal('${f.id}','${d}','${esc(r.name)}',-1)">−</button>
            <span id="${cntId}">${v}</span>
            <button class="plus"  onclick="changeMeal('${f.id}','${d}','${esc(r.name)}',+1)">+</button>
          </div>`

        // Badge livraison sous le compteur
        if (r.livraison && v > 0) {
          if (liv && liv.active) {
            h += `<div style="margin-top:4px">
              <span class="livraison-badge" style="cursor:pointer" onclick="openLivraisonModal('${f.id}','${d}','${esc(r.name)}')">
                🚚 ${esc(liv.adresse.length > 15 ? liv.adresse.slice(0,15)+'…' : liv.adresse)}
              </span>
            </div>`
          } else {
            h += `<div style="margin-top:4px">
              <button onclick="openLivraisonModal('${f.id}','${d}','${esc(r.name)}')"
                style="font-size:0.72rem;padding:2px 8px;border:1px dashed #15803d;background:#f0fdf4;color:#15803d;border-radius:12px;cursor:pointer">
                + Livraison ?
              </button>
            </div>`
          }
        }

        h += `</td>`
      })

      h += `<td><strong>${total}</strong></td></tr>`
    })

    h += `</tbody></table></div></div>`
  })

  if (!h.includes('<table')) {
    h += `<div class="empty">Aucun restaurateur associé aux formations de cette semaine</div>`
  }

  el.innerHTML = h
}

function changeMeal(fId, date, rName, delta) {
  const current = getMeal(fId, date, rName)
  const newVal  = Math.max(0, current + delta)
  setMeal(fId, date, rName, newVal)

  // Mise à jour compteur sans re-render complet
  const el = document.getElementById(`cnt-${fId}-${date}-${rName}`)
  if (el) el.textContent = newVal

  // Si on passe à 0, supprimer la livraison
  if (newVal === 0) {
    setLivraison(fId, date, rName, null)
    save()
    renderSaisie()
    return
  }

  // Si le resto livre et qu'on vient d'ajouter (+1 depuis 0), proposer livraison
  const r = getRestos().find(x => x.name === rName)
  if (r?.livraison && current === 0 && delta > 0) {
    openLivraisonModal(fId, date, rName)
  } else {
    save()
    renderSaisie()
  }
}

function changeWeek(dir) { currentWeekOffset += dir; renderSaisie() }

// ─── MODAL LIVRAISON ─────────────────────────────────────────────────────────
function openLivraisonModal(fId, date, rName) {
  const r = getRestos().find(x => x.name === rName)
  if (!r || !r.livraison) return

  pendingLivraison = { fId, date, restoName: rName }

  const existing = getLivraison(fId, date, rName)
  const f = S.formations.find(x => x.id === fId)

  document.getElementById('modal-livraison-desc').textContent =
    `${r.name} · ${f?.name || ''} · ${fmtDisplay(date)}`

  const sel = document.getElementById('modal-livraison-adresse')
  sel.innerHTML = (r.adresses || []).map(a => `<option value="${esc(a)}">${esc(a)}</option>`).join('')
  if (r.adresses?.length === 0) {
    sel.innerHTML = `<option value="">Aucune adresse enregistrée</option>`
  }

  // Pré-remplir si déjà une livraison
  if (existing) {
    sel.value = existing.adresse
    document.getElementById('modal-livraison-comment').value = existing.comment || ''
  } else {
    document.getElementById('modal-livraison-comment').value = ''
  }

  document.getElementById('modal-livraison').classList.add('open')
}

function saveLivraison() {
  if (!pendingLivraison) return
  const { fId, date, restoName } = pendingLivraison
  const adresse = document.getElementById('modal-livraison-adresse').value.trim()
  const comment = document.getElementById('modal-livraison-comment').value.trim()

  if (!adresse) { showToast('⚠️ Sélectionnez une adresse'); return }

  setLivraison(fId, date, restoName, { active: true, adresse, comment })
  save()
  closeModal('modal-livraison')
  pendingLivraison = null
  renderSaisie()
  showToast('🚚 Livraison enregistrée')
}

function cancelLivraison() {
  if (pendingLivraison) {
    const { fId, date, restoName } = pendingLivraison
    setLivraison(fId, date, restoName, null)
    save()
    pendingLivraison = null
  }
  closeModal('modal-livraison')
  renderSaisie()
}

// ─── UI HELPERS ──────────────────────────────────────────────────────────────
function showPage(p) {
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'))
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'))
  document.getElementById('page-' + p).classList.add('active')
  document.getElementById('tab-' + p)?.classList.add('active')
  if (p === 'saisie')         renderSaisie()
  if (p === 'recap')          renderRecap()
  if (p === 'historique')     renderHistorique()
  if (p === 'formations')     renderFormations()
  if (p === 'restaurateurs')  renderRestaurateurs()
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open')
}

function showToast(msg, dur = 2500) {
  const t = document.getElementById('toast')
  t.textContent = msg; t.classList.add('show')
  setTimeout(() => t.classList.remove('show'), dur)
}

// ─── EXPORT CSV ──────────────────────────────────────────────────────────────
function exportCSV() {
  const filters = [
    { key: 'w0', offset: 0 }, { key: 'w1', offset: 1 }, { key: 'w2', offset: 2 },
    { key: 'w3', offset: 3 }, { key: 'w4', offset: 4 }, { key: 'all', offset: null }
  ]
  const activeFilter = filters.find(f => f.key === S.summaryWeek) || filters[0]
  const bounds = activeFilter.offset !== null ? weekBounds(activeFilter.offset) : null

  const datesSet = new Set()
  S.formations.forEach(f => {
    getFormationDates(f).forEach(d => {
      if (!bounds) { datesSet.add(d); return }
      const dp = parse(d)
      if (dp >= bounds.from && dp <= bounds.to) datesSet.add(d)
    })
  })
  const allDates = [...datesSet].sort()
  if (!allDates.length) { showToast('⚠️ Aucune donnée'); return }

  let csv = 'Restaurateur;' + allDates.map(d => `${dayName(d)} ${fmtShort(d)}`).join(';') + ';Total\n'
  getRestos().forEach(r => {
    let row = [r.name], total = 0
    allDates.forEach(d => {
      let sum = 0
      S.formations.forEach(f => {
        if ((f.restaurants || []).includes(r.name)) sum += getMeal(f.id, d, r.name)
      })
      total += sum; row.push(sum)
    })
    row.push(total); csv += row.join(';') + '\n'
  })

  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' })
  const a = document.createElement('a')
  a.href = URL.createObjectURL(blob); a.download = `repas-${dateStamp()}.csv`
  a.click(); URL.revokeObjectURL(a.href); showToast('📊 CSV exporté')
}

function exportAll() {
  const blob = new Blob([JSON.stringify({
    formations: S.formations, restaurants: S.restaurants,
    meals: S.meals, history: S.history, livraisons: S.livraisons
  }, null, 2)], { type: 'application/json' })
  const a = document.createElement('a')
  a.href = URL.createObjectURL(blob); a.download = `repas-backup-${dateStamp()}.json`
  a.click(); URL.revokeObjectURL(a.href); showToast('📦 Export JSON effectué')
}

function resetMeals() {
  if (!confirm('Effacer TOUS les repas saisis ?')) return
  S.meals = {}; S.livraisons = {}; save(); render(); showToast('🗑️ Repas effacés')
}

function resetAll() {
  if (!confirm('Tout réinitialiser ? Cette action est irréversible.')) return
  S = { formations: [], restaurants: [], meals: {}, summaryWeek: 'w0', history: {}, livraisons: {} }
  save(); render(); showToast('🔥 Réinitialisé')
}
